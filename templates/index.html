<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat-Feed | Security Threat Feed</title>

    <!-- Favicon — // monogram in accent red -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080c10'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='700' font-size='14' fill='%23e63946'>//</text></svg>">

    <!-- Open Graph -->
    <meta property="og:title"       content="Threat-Feed — Open Source Threat Intelligence">
    <meta property="og:description" content="Real-time cybersecurity threat intelligence aggregated from 30+ RSS sources. Ransomware, CVEs, APTs, AI security and more.">
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://threat-feed.up.railway.app">

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary">
    <meta name="twitter:title"       content="Threat-Feed — Open Source Threat Intelligence">
    <meta name="twitter:description" content="Real-time cybersecurity threat intelligence aggregated from 30+ RSS sources.">

    <link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>

    <header>
        <div class="header-brand">
            <h1><span class="slash">//</span> Threat-Feed</h1>
            <p class="subtitle">Open Source Cybersecurity Threat Feed</p>
        </div>
        <div class="header-right">
            <span class="article-count-pill" id="article-count"></span>
            <div class="header-status">
                <span class="status-dot" aria-hidden="true"></span>
                <span>Live</span>
            </div>
        </div>
    </header>

    <main>
        <section class="filters" id="filters" aria-label="Filter by category">
            <button class="filter-btn active" data-category="All">All</button>
            <button
                class="filter-btn filter-ghost"
                data-category="Industry/Policy"
                aria-label="Filter: Industry and Policy"
            >Industry&#8203;/&#8203;Policy</button>
        </section>

        <div class="search-bar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
                type="search"
                id="search-input"
                class="search-input"
                placeholder="Search titles and summaries…"
                autocomplete="off"
                spellcheck="false"
                aria-label="Search articles"
            >
            <button class="search-clear" id="search-clear" aria-label="Clear search">✕</button>
        </div>

        <div class="filter-stats" id="filter-stats" aria-live="polite"></div>

        <div class="toolbar">
            <div class="date-filters" aria-label="Filter by date range">
                <button class="tool-btn active" data-range="all">All time</button>
                <button class="tool-btn" data-range="today">Today</button>
                <button class="tool-btn" data-range="7days">7 days</button>
                <button class="tool-btn" data-range="30days">30 days</button>
            </div>
            <div class="toolbar-right">
                <select id="source-filter" class="source-select" aria-label="Filter by source">
                    <option value="All">All sources</option>
                </select>
                <button class="sort-btn" id="sort-toggle" data-sort="newest" aria-label="Toggle sort order">↓ Newest</button>
            </div>
        </div>

        <section class="article-list" id="article-list" aria-label="Threat intelligence articles">
            <div class="loading">Fetching latest threat intelligence...</div>
        </section>
    </main>

    <footer>
        <p>
            Threat-Feed &mdash; Open Source &middot; RSS only &middot; Updates every 4 hours
            <span class="footer-badge">
                <span class="footer-badge__name">Aegis</span><span class="footer-badge__role">Contributor</span>
            </span>
        </p>
    </footer>

    <script type="text/javascript" src="/static/main.js" defer></script>
</body>
</html>
