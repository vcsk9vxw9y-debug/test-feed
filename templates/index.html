<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat-Feed | Security Threat Feed</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>

    <header>
        <div class="header-brand">
            <h1><span class="slash">//</span> Threat-Feed</h1>
            <p class="subtitle">Open Source Cybersecurity Threat Feed</p>
        </div>
        <div class="header-status">
            <span class="status-dot" aria-hidden="true"></span>
            <span>Live</span>
        </div>
    </header>

    <main>
        <section class="filters" id="filters" aria-label="Filter by category">
            <button class="filter-btn active" data-category="All">All</button>
        </section>

        <div class="toolbar">
            <div class="date-filters" aria-label="Filter by date range">
                <button class="tool-btn active" data-range="all">All time</button>
                <button class="tool-btn" data-range="today">Today</button>
                <button class="tool-btn" data-range="7days">7 days</button>
                <button class="tool-btn" data-range="30days">30 days</button>
            </div>
            <div class="toolbar-right">
                <select id="source-filter" class="source-select" aria-label="Filter by source">
                    <option value="All">All sources</option>
                </select>
                <button class="sort-btn" id="sort-toggle" data-sort="newest" aria-label="Toggle sort order">↓ Newest</button>
            </div>
        </div>

        <section class="stats" aria-live="polite">
            <span id="article-count"></span>
        </section>

        <section class="article-list" id="article-list" aria-label="Threat intelligence articles">
            <div class="loading">Fetching latest threat intelligence...</div>
        </section>
    </main>

    <footer>
        <p>Threat-Feed &mdash; Open Source &middot; RSS only &middot; Updates every 4 hours</p>
    </footer>

    <script type="text/javascript" src="/static/main.js" defer></script>
</body>
</html>
