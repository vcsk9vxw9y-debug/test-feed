<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat-Feed | Security Threat Feed</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>

    <header>
        <h1>Threat-Feed</h1>
        <p class="subtitle">Open Source Cybersecurity Threat Feed</p>
    </header>

    <main>
        <section class="filters" id="filters">
            <button class="filter-btn active" data-category="All">All</button>
        </section>

        <section class="stats">
            <span id="article-count"></span>
        </section>

        <section class="article-list" id="article-list">
            <div class="loading">Fetching latest threat intelligence...</div>
        </section>
    </main>

    <footer>
        <p>Threat-Feed &mdash; Open Source | Data sourced from public RSS feeds | Updates every 4 hours</p>
    </footer>

    <script type="text/javascript" src="/static/main.js"></script>
</body>
</html>
