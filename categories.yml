# Threat-Feed Category Keywords
#
# THE DECLARATION ORDER OF CATEGORIES IN THIS FILE IS THE PRIORITY ORDER.
# Python 3.7+ dicts preserve insertion order, and the classifier iterates
# rules in that order — first match wins. To re-prioritize a category,
# move its block up or down in this file. Single source of truth.
#
# Current priority (top = highest):
#   OT/ICS > Cloud Breach > SaaS Breach > Ransomware > Identity & Access
#   > Vulnerability/CVE > Nation State/APT > Malware/Infostealer > AI Security
#   > Phishing & Social Engineering > Supply Chain > Mobile Security
#   > Industry/Policy > Consumer Awareness > Uncategorized (fallback)
#
# Consumer Awareness sits second-to-last on purpose: sharper categories
# (Phishing, Malware, AI Security, etc.) should still win when they apply.
# A phishing scam lands in Phishing; a consumer-hygiene tips piece without
# a sharper hook lands here.

