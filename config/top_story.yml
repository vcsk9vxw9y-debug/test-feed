key_points:
  - "Campaign scale Day 2 — 1,055 versions / 502 packages / 25,000+ repos credential-leaked: Full Mini Shai-Hulud campaign tracking (Sysdig, Phoenix Security, SafeDep) confirms 1,055 compromised versions across 502 unique packages (npm: 1,048 versions, PyPI: 6, Composer: 1). 25,000+ GitHub repositories have had credentials leaked. TeamPCP created 2,500+ new malicious repositories using those exfiltrated tokens — these repos use Dune-universe naming conventions (same as prior Shai-Hulud waves) and serve as C2 staging and exfiltration endpoints. This is a significant escalation from the Day 1 stat of 518M combined downloads / 170+ packages: the worm's spread through the maintainer ecosystem is now quantified."
  - "AntV/atool wave (May 19) — largest single-hour incident in campaign history: npm maintainer account 'atool' compromised; 639 malicious versions published across 323 unique packages in 22 minutes in an automated burst. Key affected AntV packages: size-sensor (4.2M downloads/month), echarts-for-react (3.8M), @antv/scale (2.2M), timeago.js (1.15M). The payload is a 498KB obfuscated Bun script: identical scanner architecture, credential regex set, and obfuscation pattern to the earlier SAP compromise, confirming a single unified Mini Shai-Hulud toolkit deployed across all waves. Credential harvest scope: AWS full chain (env vars, config files, EC2 IMDS, ECS container metadata, Secrets Manager), Kubernetes service account tokens, HashiCorp Vault, GitHub PATs, npm tokens, SSH keys, 1Password/Bitwarden/pass/gopass local vaults. Exfiltration via fake OpenTelemetry (OTel) C2 infrastructure."
  - "CRITICAL ESCALATION — TeamPCP open-sourced the Mini Shai-Hulud toolkit on BreachForums: The full weaponized toolkit — CI cache-poisoning scripts, OIDC token extractor, and credential stealer with propagation logic — has been published to a supply chain attack contest on BreachForums and has already been taken down once from public GitHub. The toolchain is now in circulation among independent threat actors. Copycat attacks using identical techniques are expected imminently. This transforms Mini Shai-Hulud from a single-actor campaign into a persistent, multi-actor threat class. Any organization with CI/CD pipelines installing packages from npm or PyPI should implement systematic defenses (hash pinning via pip install --require-hashes or npm ci with lockfile integrity, registry mirroring with a vetted internal proxy, runtime egress monitoring during package install) — not just one-time blocklist checks."
  - "Defender remediation — Day 2 emphasis on completeness and hash pinning: (1) Audit ALL pipelines that ran npm install or pip install since May 11 against the FULL 502-package confirmed list (not just the original TanStack/mistralai/guardrails-ai subset — AntV namespace, atool-related packages now included). (2) Check your OWN package release history since May 11 for unauthorized versions published without your knowledge — an infected pipeline may have published backdoored versions of your packages. (3) Implement pip install --require-hashes via pip-tools and npm ci with lockfile integrity IMMEDIATELY — this is the single most effective currently available mitigation. (4) Restrict GitHub Actions permissions: id-token: write to only workflows that explicitly require it, scoped to minimum audience. (5) Search GitHub for any repositories created since May 11 with Dune-universe naming (sandworm, arrakis, spice, shai-hulud variants) that may have used credentials from your pipelines."
  - "Full TeamPCP campaign timeline to Day 2 (May 24): March 19 — Aqua Trivy GitHub Actions compromise, SANDCLOCK credential harvester deployed. May 11 — TanStack (42 packages in 6 minutes), Mini Shai-Hulud worm activated, SLSA L3 attestation defeated. May 12 — mistralai 2.4.6 and guardrails-ai 0.10.1 PyPI injections; Mini Shai-Hulud source code briefly published to GitHub then taken down. May 18 AM — Nx Console v18.95.0 poisoned VS Code extension (2.2M installs, 3,800 GitHub internal repos exfiltrated). May 18 PM — Megalodon: 5,718 commits to 5,561 repos in 6 hours, 449 GB exfiltrated. May 19 — AntV/atool wave (639 versions of 323 packages in 22 minutes, largest single-hour incident). May 19-20 — durabletask PyPI backdoor via hijacked OIDC tokens. May 22 — Laravel-Lang Composer (233 versions, 700+ repos, 15-module stealer). May 23 — Mini Shai-Hulud expansion wave confirmed. May 24 — Toolkit open-sourced on BreachForums; campaign total: 1,055 versions across 502 packages, 25,000+ GitHub repos credential-leaked, 2,500+ malicious repos created."
notes: "RETAIN+UPDATE on 2026-05-24 AM. Decision: RETAIN with Day 2 upgrade — no challenger story clearly beats Mini Shai-Hulud on all four scoring axes. Updated stats: 1,055 versions / 502 packages (Sysdig/SafeDep), 25,000+ GitHub repos credential-leaked, AntV/atool wave detail, toolkit open-sourcing on BreachForums (major escalation — copycat risk now activated). Candidates evaluated (AM May 24): CVE-2026-48172 LiteSpeed cPanel CVSS 10.0 government targeting (strong — added to daily briefing action #4; narrower hosting-provider audience vs. Python/npm ecosystem); MiniPlasma Windows LPE public PoC no patch (high interest but narrower Windows-only audience, Day 11 story); Canvas/Instructure ShinyHunters 275M breach (resolved May 11, too old). RETAIN criterion: Mini Shai-Hulud directly affects our Python/npm ecosystem audience, toolkit open-sourcing today adds genuine new urgency, and the 25,000+ GitHub repo leak stat is the freshest quantitative finding from Sysdig. REPLACE on 2026-05-25 AM if worm expansion subsides or a stronger breaking story emerges."
