title: "CISA Emergency Directive: FIRESTARTER Backdoor Persists on Cisco ASA/FTD Through Firmware Updates — Physical Power Cycle Required"
summary: "CISA and NCSC issued a joint advisory on April 24 revealing that a custom ELF backdoor dubbed FIRESTARTER has been found on Cisco Firepower and ASA devices running ASA or FTD software. The malware survives firmware updates and reboots — only a hard power cycle (physically unplugging the device) removes it. A U.S. federal agency was compromised since September 2025 via CVE-2025-20333 and CVE-2025-20362. CISA updated Emergency Directive 25-03 requiring federal agencies to apply Cisco patches by April 24 and perform hard resets by April 30. All organizations running Cisco ASA/FTD/Firepower should audit for FIRESTARTER IOCs immediately and plan physical power cycles for confirmed-infected devices."
source_name: "CISA"
url: "https://www.cisa.gov/news-events/analysis-reports/ar26-113a"
published_at: "2026-04-24T12:00:00Z"
category: "Nation State/APT"
key_points:
  - "FIRESTARTER is a Linux ELF backdoor designed for Cisco Firepower and Secure Firewall devices. It establishes a C2 channel for remote access, detects termination signals to relaunch itself, and persists through firmware updates and standard reboots. Only a hard power cycle (physically unplugging power) removes it."
  - "A U.S. federal civilian agency was compromised since September 2025 via CVE-2025-20333 and CVE-2025-20362 in Cisco ASA/FTD software. CISA and NCSC assess a wider campaign targeting government and critical national infrastructure is likely underway."
  - "CISA updated Emergency Directive 25-03: federal agencies must apply Cisco patches (addressing CVE-2025-20333, CVE-2025-20362, and the persistence issue) by April 24, 2026, and perform hard resets by physically unplugging affected devices by April 30, 2026."
  - "Defender actions: (1) Download and apply latest Cisco-provided software updates for ASA/FTD/Firepower devices. (2) Audit all Cisco ASA/FTD/Firepower devices for FIRESTARTER IOCs per CISA MAR AR26-113A. (3) Submit memory snapshots per CISA directive. (4) Schedule hard power cycles (physical unplug) for confirmed-infected devices. (5) Monitor for anomalous C2 traffic from firewall appliances."
  - "Cisco's standard patches alone are insufficient — devices compromised before patching retain the backdoor. The persistence mechanism is novel: FIRESTARTER survives the same firmware update process that is supposed to remediate the initial vulnerability. This fundamentally changes the remediation playbook for Cisco ASA/FTD incidents."
notes: "RETAINED on 2026-04-28 morning review. Now day 4 but the CISA Emergency Directive 25-03 hard deadline for physical power cycles is April 30 — just 2 days out. This deadline makes the story more actionable today than when first curated. Candidates evaluated: TeamPCP triple supply chain campaign (Checkmarx KICS/Bitwarden CLI/xinference, April 27) — significant but less immediately actionable; CISA added 12 new KEVs this week including Quest KACE SMA CVSS 10.0; Windows Shell CVE-2026-32202 actively exploited but low CVSS (4.3). None clearly beat FIRESTARTER with its imminent deadline. Will reassess after April 30 deadline passes."
