title: "TeamPCP Mini Shai-Hulud Worm Day 2 — Full Campaign Now 1,055 Compromised Package Versions Across 502 npm/PyPI Packages, 25,000+ GitHub Repos Credential-Leaked, 2,500+ Malicious Repos Created, Toolkit Open-Sourced on BreachForums: Implement pip install --require-hashes Before Next Deployment"
summary: "The TeamPCP Mini Shai-Hulud supply chain worm (CVE-2026-45321) has expanded dramatically overnight. Full campaign accounting as of May 24 AM: 1,055 confirmed compromised versions across 502 unique packages spanning npm, PyPI, and Composer — up from 500+ versions / 170+ packages reported at the Day 1 launch. Sysdig's overnight analysis reveals the worm has leaked credentials for over 25,000 GitHub repositories; TeamPCP used exfiltrated tokens to create 2,500+ new malicious repositories following Dune-universe naming conventions for C2 staging and exfiltration. The campaign's most significant overnight development is that TeamPCP has open-sourced the full Mini Shai-Hulud toolkit — CI cache-poisoning scripts, OIDC token extractor, and credential stealer with propagation logic — to a supply chain attack contest on BreachForums, meaning copycat variants from independent threat actors are expected imminently. The worm is no longer TeamPCP-exclusive. The May 19 AntV/atool wave is confirmed as the campaign's largest single-hour incident: npm maintainer account 'atool' was compromised and 639 malicious versions of 323 packages were published in 22 minutes. Key AntV packages affected include size-sensor (4.2M monthly downloads), echarts-for-react (3.8M), @antv/scale (2.2M), and timeago.js (1.15M). The payload is a 498KB obfuscated Bun script — identical scanner architecture, credential regex set, and obfuscation pattern to the SAP compromise three weeks earlier — confirming a single unified toolkit deployed across all campaign waves. Credential harvest scope is comprehensive: full AWS chain (env vars, config files, EC2 IMDS, ECS container metadata, Secrets Manager), Kubernetes service account tokens, HashiCorp Vault, GitHub PATs, npm tokens, SSH keys, and local password manager vaults (1Password, Bitwarden, pass, gopass). The worm's defining structural capabilities remain: OIDC token hijack self-propagation (defeating maintainer authentication by stealing short-lived CI tokens and using them to publish backdoored packages), defeat of SLSA Build Level 3 attestations (by injecting into source repos before the legitimate SLSA L3 build pipeline runs, producing cryptographically valid attestations for malicious source), and autonomous spread with no further attacker involvement after each wave. Any CI/CD pipeline that ran npm install or pip install against any of the 502 confirmed packages since May 11 must be treated as potentially credential-exfiltrated and a propagation node. Implementing pip install --require-hashes via pip-tools is the single highest-leverage defensive action currently available to Python shops."
