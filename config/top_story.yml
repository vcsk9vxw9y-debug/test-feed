key_points:
  - "PSA-2026-05-18 — Drupal advance security advisory issued May 18; the security release for all supported branches lands today (May 20) between 17:00 and 21:00 UTC. Severity 20/25 ('highly critical') on Drupal's NIST-aligned scoring model — Access Complexity: None, Authentication: None. The vulnerability lives in Drupal core itself, not a contrib module."
  - "Affected core branches: 11.3.x, 11.2.x, 10.6.x, and 10.5.x receive standard releases. Drupal will additionally publish best-effort patches for 11.1.x and 10.4.x, plus manual patch files for unsupported Drupal 8.9 and 9.5 — an unusual back-port window that signals exceptional severity. Drupal 7 is not affected."
  - "Per the Drupal Security Team: a successful attacker could access all non-public data on the affected site and modify or delete arbitrary data. Exploitation is described as trivial, requires no authentication, and depends on no user interaction. The advisory deliberately withholds details until the patch lands to limit reverse-engineering opportunity."
  - "Exploit timeline: the Drupal Security Team warns that functional exploits may emerge 'within hours or days' of public disclosure. Drupal has a history of in-the-wild exploitation following PSAs of this severity (Drupalgeddon, Drupalgeddon2) — both saw mass scanning within 24 hours of patch release."
  - "Defender actions: (1) Before the 17:00 UTC window opens, update to the latest patch release on your current branch so the emergency security fix applies cleanly. (2) Reserve operator coverage for 17:00-21:00 UTC May 20 and patch the moment the advisory publishes. (3) Inventory ALL Drupal instances including legacy 8.x and 9.x sites — manual patches are being provided for them. (4) Stage rollback for any custom or contrib modules that may break against patched core. (5) After patching, audit logs for anomalous data access during the 48-hour pre-patch window."
notes: "REPLACE on 2026-05-20. NGINX Rift (CVE-2026-42945) Day 8 — still being exploited but the news cycle has matured and the lead has already run multiple cycles (Days 1-6). The Drupal PSA-2026-05-18 emergency release is the breaking event of today: highest-severity Drupal advisory in recent memory (20/25), unauthenticated, no user interaction, with back-ports as far as Drupal 8.9 signaling extraordinary severity. Release window 17:00-21:00 UTC today; exploits expected within hours. Candidates evaluated: Nx Console VS Code extension compromise (May 18-19, nrwl.angular-console v18.95.0, 2.2M installs, multi-stage credential stealer + macOS Python backdoor) — strong supply-chain story but the malicious version was live only 11 minutes, limiting exposure; Fox Tempest malware-signing-as-a-service disrupted by Microsoft (May 19) — significant takedown but limited concrete defender action since Microsoft has already revoked 1000+ certs; Grafana Labs breach scoped to GitHub env only (May 19) — contained; Exchange CVE-2026-42897 (T-9 days from KEV deadline) — still no permanent patch but story has been covered; NGINX Rift Day 8 — relegated to high-priority briefing item, still in threat_context.yml. NGINX Rift yields the hero slot but stays in the daily briefing."
