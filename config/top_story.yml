title: "CVE-2026-0300: PAN-OS Zero-Day Still Unpatched — CISA Deadline Passed, Patch in 2 Days (May 13)"
summary: "CVE-2026-0300 remains an unpatched CVSS 9.3 buffer overflow in PAN-OS User-ID Authentication Portal granting unauthenticated remote root on PA-Series and VM-Series firewalls. State-sponsored exploitation by CL-STA-1132 (likely China-nexus, per tooling overlap with Volt Typhoon and APT41) has been active since April 9. CISA FCEB deadline passed May 9 — organizations without mitigations are non-compliant. First patch wave arrives May 13 (2 days). Restrict or disable User-ID Authentication Portal now and hunt for compromise back to April 9."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/pan-os-firewall-rce-zero-day-exploited-in-attacks-since-april-9/"
published_at: "2026-05-06T09:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-0300 is a buffer overflow in the User-ID Authentication Portal (Captive Portal) of PAN-OS. CVSS 9.3 (Critical). Unauthenticated remote attackers achieve root-level code execution on the firewall via specially crafted packets. No authentication or user interaction required."
  - "State-sponsored exploitation confirmed by Unit 42, tracked as CL-STA-1132, active since April 9 — over a month before public disclosure May 6. SecurityWeek reports campaign bears hallmarks of Chinese state hacking: Earthworm and ReverseSocks5 tooling overlap with Volt Typhoon and APT41."
  - "CISA FCEB deadline PASSED (May 9). BOD 22-01 deadline is May 27. Organizations that have not applied mitigations are now non-compliant. CSA Singapore alert AL-2026-048 remains active. Urgency rated HIGHEST by Palo Alto Networks."
  - "Affected: PA-Series (hardware) and VM-Series (virtual) firewalls with User-ID Authentication Portal enabled. NOT affected: Prisma Access, Cloud NGFW, Panorama. First patch wave May 13 (2 days away). Additional releases May 28."
  - "Defender actions: (1) Confirm User-ID Authentication Portal is restricted to trusted internal zones or disabled — CISA deadline has passed. (2) Hunt for compromise — review firewall logs for anomalous captive portal traffic back to April 9. (3) Audit for backdoor installation and lateral movement indicators. (4) Prepare emergency patching for May 13 — schedule maintenance windows now. (5) Monitor Unit 42 and CISA advisories for updated IOCs."
notes: "RETAIN+UPDATE on 2026-05-11 morning. CISA FCEB deadline passed May 9. Patch 2 days away (May 13). Updated China-nexus attribution per SecurityWeek (Earthworm/ReverseSocks5 tooling). Candidates evaluated: LiteLLM CVE-2026-42208 (CVSS 9.8 SQL injection, CISA KEV deadline TODAY May 11, exploited 36h after disclosure, AI infrastructure — strong but patch available since April 19 and narrower audience), cPanel CVE-2026-41940 (CVSS 9.8 auth bypass, 1.5M exposed instances, targeting govts/MSPs, exploited since Feb — patch available since April 28, declining urgency), Dirty Frag (ESP patches rolling out, rxrpc still unpatched — still developing but mitigations work), Ivanti EPMM CVE-2026-6973 (KEV deadline passed May 10, CVSS 7.2, limited exploitation). PAN-OS retains: unpatched state-sponsored zero-day in the critical gap between passed CISA deadline and first patch is still peak urgency for security practitioners."
