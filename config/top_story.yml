key_points:
  - "Attack mechanism — GitHub fork-tag hijack: The threat actor rewrote every historical git tag in the Laravel-Lang GitHub organization to point to commits in a malicious fork they controlled. This exploits a native GitHub feature: tags can reference commits from forks of the same repo. The attacker injected a file `src/helpers.php` into the malicious fork commits; Composer's autoloader executes this file automatically on `composer install` or `composer update` when any of the 233 poisoned tags is resolved. Tags were published in rapid succession — many within seconds of each other — on May 22-23, indicating automated mass-tagging tooling. Any build that ran composer install BEFORE Packagist's takedown is compromised regardless of subsequent package updates — the damage occurs at install time."
  - "Credential stealer payload — 15 specialist collection modules: The ~5,900-line PHP payload targets: (1) Cloud platform access keys for AWS (credentials, config), GCP (service account JSON), Azure (MSAL/OAuth tokens), and DigitalOcean (API tokens); (2) Kubernetes kubeconfig profiles and service account tokens from ~/.kube/; (3) HashiCorp Vault token files and environment variables; (4) Docker daemon configs and registry authentication tokens; (5) CI/CD environment variables and secrets from GitHub Actions ($GITHUB_TOKEN, secrets context), GitLab CI ($CI_JOB_TOKEN), CircleCI, and Jenkins; (6) SSH private keys from ~/.ssh/; (7) Git credentials (~/.gitconfig, ~/.netrc); (8) Shell history files (bash, zsh); (9) Browser saved passwords (Chrome, Firefox profiles); (10) Cryptocurrency wallet files; (11) Password manager database files. The host is fingerprinted using a hash of the file path, hostname, and inode to prevent re-infection of already-exfiltrated hosts. Harvest is AES-256 encrypted before exfiltration; payload self-deletes post-execution."
  - "Affected packages: laravel-lang/lang (7.8k GitHub stars), laravel-lang/http-statuses, laravel-lang/attributes, laravel-lang/actions — community-maintained third-party Laravel localization libraries. These are NOT part of the official Laravel framework. 233 package versions across 700+ GitHub repositories were poisoned. The attacker gained access to the Laravel-Lang GitHub organization account, most likely as a downstream victim of the TanStack supply chain attack cascade — which originated with the TeamPCP (UNC6780) compromise of the Nx Console VS Code extension (version 18.95.0, live on VS Code Marketplace for 18 minutes on May 18, 2026) and the subsequent GitHub internal repo breach (3,800 repos cloned)."
  - "Remediation for affected environments: (1) Check composer.lock for any of the affected packages (laravel-lang/lang, /http-statuses, /attributes, /actions) installed via a tag resolved after May 22. (2) Treat all secrets accessible from any compromised build environment as rotated immediately: all cloud access keys, all Kubernetes service account tokens, all Vault dynamic secrets, all CI/CD environment secrets, all SSH keys present on the build host. (3) Rebuild affected containers or VMs from pre-May 22 known-good images — do not attempt to clean in-place. (4) Review cloud provider access logs (AWS CloudTrail, GCP Audit Logs, Azure Activity Log) and Kubernetes audit logs for unauthorized API calls or resource creation since May 22. (5) Rotate browser-saved passwords and any cryptocurrency wallet seeds on developer machines that ran composer install in an affected project."
  - "Supply chain campaign context — same coordinated wave: This breach is confirmed to be linked to the broader supply chain attack chain. TeamPCP (UNC6780) compromised the Nx Console VS Code extension (nrwl.angular-console v18.95.0) on May 18 — live on the VS Code Marketplace for 18 minutes — and used developer workstation access to clone 3,800 of GitHub's internal repositories. The Laravel-Lang maintainer compromise appears to trace back to the same TanStack supply chain attack cascade. The GitHub fork-tag poisoning technique used in the Laravel-Lang attack applies equivalently to PyPI (via fork PR attacks + index tag injection). Any open-source package ecosystem using git-tag-based version resolution is susceptible to this class of attack. Defenders should treat all package managers — Composer, npm, PyPI, RubyGems — as a threat surface requiring hash pinning and provenance verification."
notes: "REPLACE on 2026-05-23 (PM). CVE-2026-41091 (Defender LPE, CISA June 3) exits top slot after 3 days — CISA deadline messaging is well-established; Defender continues as Action #1 in daily briefing. Laravel-Lang supply chain wins on: recency (Day 1-2 vs Defender Day 3), novelty (GitHub fork-tag hijack is a newly weaponized mechanism), and universal credential-exposure scope (cloud keys, Kubernetes, CI/CD secrets relevant to all defenders regardless of PHP stack). Supply chain theme reinforced by linked TeamPCP/GitHub Nx Console breach same week. Candidates evaluated (PM): CVE-2026-41091 Defender (Day 3, CISA KEV, broad but messaging established — moves to briefing #1); Cisco Secure Workload CVE-2026-20223 (CVSS 10.0, REST API auth bypass, no confirmed wild exploitation, narrower audience); GitHub Nx Console/TeamPCP breach (May 18-20, compelling but 4-5 days old and subsumed into Laravel-Lang supply chain narrative). Laravel-Lang clearly beats incumbent on recency, novelty, and universal defender relevance of credential-stealer payload."
