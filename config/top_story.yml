title: "Drupal Emergency Patch (PSA-2026-05-18): 'Highly Critical' (20/25) Core Vulnerability Lands Today 17:00-21:00 UTC — Unauthenticated, No User Interaction, Exploits Expected Within Hours"
summary: "Drupal will release an emergency security update for all supported core branches today (May 20) between 17:00 and 21:00 UTC. The advance advisory PSA-2026-05-18 carries a 'highly critical' severity rating of 20/25 on Drupal's NIST-aligned model — Access Complexity: None, Authentication: None. Per the Drupal Security Team, the flaw is trivially exploitable, allows an attacker to access all non-public data on an affected site, and could allow modification or deletion of arbitrary data. Patches cover Drupal 11.3.x, 11.2.x, 10.6.x, 10.5.x, with best-effort releases for 11.1.x and 10.4.x, and manual patch files back-ported as far as Drupal 8.9 / 9.5 — an unusual step that signals exceptional severity. Functional exploits are expected within hours of disclosure. Pre-stage minor-version updates now, reserve admin coverage for the patch window, and apply the security release the moment it lands."
source_name: "The Hacker News"
