title: "NGINX Rift (CVE-2026-42945): Day 6 — 5.7 Million Exposed Servers, Exploitation Spreading Over the Weekend, Patch to 1.30.1 Now"
summary: "CVE-2026-42945 is a heap buffer overflow in nginx's ngx_http_rewrite_module that has existed for 18 years (since nginx 0.6.27). An unauthenticated attacker can achieve remote code execution or worker-process crash with a single crafted HTTP request — no authentication, no prior access, no user interaction. Censys now counts roughly 5.7 million internet-exposed nginx servers running potentially vulnerable versions. VulnCheck confirmed active exploitation beginning May 16, three days after the PoC dropped, and weekend reporting (The Register, Help Net Security, SecurityWeek, May 18) shows the attack volume continuing to climb. Affects every nginx Open Source version through 1.30.0 and nginx Plus R32-R36. Upgrade to nginx 1.30.1 / 1.31.0 (or nginx Plus R36 P2) immediately and audit rewrite configurations for the vulnerable PCRE-capture-plus-question-mark pattern."
source_name: "The Hacker News"
