title: "Microsoft Defender Zero-Day (CVE-2026-41091): Actively Exploited Link-Following Flaw Lets Low-Priv Attackers Hit SYSTEM Through the AV Itself — Verify Engine ≥ 1.1.26040.8 Now (CISA KEV, Federal Deadline June 3)"
summary: "CVE-2026-41091 is an actively exploited privilege-escalation zero-day in the Microsoft Malware Protection Engine — the core scanning component of Defender. The bug is a 'link following' weakness: Defender follows attacker-redirected symbolic links or directory junctions while doing file operations under SYSTEM, letting any local low-privilege user redirect the engine's writes into protected system directories and escalate to SYSTEM. CVSS 7.8, local, low complexity, no user interaction. Microsoft confirms exploitation in the wild and CISA added it to KEV May 21 with a federal deadline of June 3, 2026 — US federal agencies must apply the patch or drop the product entirely by that date. Patch ships via Defender's automatic-update channel, but 'automatic' is not the same as 'applied' — verify Malware Protection Engine version is at least 1.1.26040.8 on every Windows host, including endpoints that may have stale signatures or restricted update paths. The threat model is unusual: this is a zero-day in the very tool defenders use to detect attacks, so an unpatched estate is blind to itself."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/microsoft-warns-of-new-defender-zero-days-exploited-in-attacks/"
