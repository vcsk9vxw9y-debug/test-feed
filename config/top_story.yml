key_points:
  - "OIDC token hijack self-propagation mechanism: Mini Shai-Hulud steals OpenID Connect (OIDC) tokens from CI/CD pipeline secrets during package installation. OIDC tokens are short-lived credentials generated by GitHub Actions, GitLab CI, and other platforms to authenticate to external registries (PyPI, npm) without long-lived secrets. The worm harvests these tokens from pipeline memory and uses them to publish backdoored versions of packages the infected pipeline has write access to, making each infected pipeline a new autonomous infection source. TeamPCP seeded each campaign wave via SANDCLOCK credential harvester or prior OIDC token theft; the worm propagated all subsequent spread automatically with no further attacker involvement."
  - "SLSA Build Level 3 attestations defeated — supply chain paradigm shift: Mini Shai-Hulud is the first confirmed malware to defeat SLSA L3 provenance attestations, the supply chain industry's highest-assurance integrity control. SLSA L3 guarantees an artifact was built by a specific CI platform from a verified source commit with no human operator access to the build environment. The worm circumvents this by pushing malicious code directly to the source repository using hijacked OIDC or maintainer tokens, then allowing the legitimate SLSA L3 build pipeline to generate a fully valid attestation for the now-malicious source. The resulting packages carry valid SLSA L3 attestations, pass all provenance verification checks, and are cryptographically indistinguishable from legitimate builds. Defenders must now layer runtime behavioral monitoring and network egress controls alongside attestation checks — attestation alone is no longer a sufficient supply chain defense."
  - "Confirmed poisoned packages (sample): TanStack npm namespace (42 packages including @tanstack/query-core, @tanstack/react-query, @tanstack/router; combined approximately 280 million monthly downloads; poisoned May 11 in six minutes); mistralai 2.4.6 (PyPI); guardrails-ai 0.10.1 (PyPI); durabletask (PyPI, Microsoft Azure Python SDK, 417,000 monthly downloads, backdoored May 19-20 via hijacked OIDC tokens); LiteLLM (PyPI); Telnyx SDK (PyPI); Bitwarden CLI (npm); Aqua Security Trivy (Go/Docker); Checkmarx KICS (Go); UiPath Python SDK (PyPI); OpenSearch Python client (PyPI). Payload in all variants: exfiltrate AWS IAM credentials, HashiCorp Vault secrets, GitHub tokens, CI environment variables, and OIDC tokens; then self-propagate by publishing backdoored versions of newly accessible packages."
  - "Defender remediation steps: (1) Audit all CI/CD pipelines that ran pip install or npm install since May 11 against the confirmed poisoned package list. (2) Rotate immediately: GitHub OIDC tokens and all tokens with package-publish permissions, AWS IAM credentials for CI pipelines, HashiCorp Vault dynamic secrets from CI environments, npm/PyPI API tokens with publish scope. (3) Check your own package release history since May 11 for any unexpected releases — an infected pipeline may have published a backdoored version of your packages without your knowledge. (4) In GitHub Actions, restrict permissions id-token write to only workflows that require it and scope the sub audience claim to the minimum. (5) Implement pip install --require-hashes via pip-tools or npm install with lockfile integrity checks immediately — hash pinning is the most effective currently-available mitigation against this attack class."
  - "Full TeamPCP campaign timeline: March 19 — Aqua Trivy GitHub Actions workflow compromised, SANDCLOCK credential harvester deployed. May 11 — TanStack namespace (42 packages in six minutes), Mini Shai-Hulud worm activated. May 12 — mistralai 2.4.6 and guardrails-ai 0.10.1 PyPI injections. May 18 AM — Nx Console v18.95.0 published to VS Code Marketplace for 18 minutes (2.2 million installs), GitHub employee infected, 3,800 internal repos exfiltrated. May 18 PM — Megalodon: 5,718 commits to 5,561 distinct GitHub repos in 6 hours, malicious CI/CD workflows installed, 449 GB of secrets exfiltrated (575,352 files as of May 21). May 19-20 — durabletask PyPI backdoor via hijacked OIDC tokens. May 22 — Laravel-Lang Composer fork-tag hijack (233 versions, 700+ repos, 15-module credential stealer). May 23 — Mini Shai-Hulud expansion wave active with new poisoned releases confirmed. Single threat actor: TeamPCP (UNC6780) using automated worm as force multiplier across npm, PyPI, Composer, and GitHub Actions."
notes: "REPLACE on 2026-05-24 AM if fresher story emerges. Decision: REPLACE Laravel-Lang (Day 2) with Mini Shai-Hulud (Day 1, breaking May 23). Rationale: recency (Day 1 vs. Day 2), novelty (SLSA L3 defeat and self-replicating worm mechanism vs. manual fork-tag hijack), scope (518M downloads vs. 700 repos), and direct Python-stack relevance (PyPI packages in scope, our stack uses pip/PyPI not Composer). Candidates evaluated (PM May 23): Laravel-Lang Day 2 (established messaging, demoted to briefing action #2); Drupal CVE-2026-9082 CISA KEV T-4 days (strong deadline urgency, narrower PostgreSQL-Drupal audience); Cisco SD-WAN CVE-2026-20182 CVSS 10.0 UAT-8616 (significant, narrower network-operator audience); Megalodon Day 5 (subsumed into Mini Shai-Hulud campaign narrative). Mini Shai-Hulud wins on all four scoring axes."
