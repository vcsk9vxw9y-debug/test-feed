key_points:
  - "LANDMARK FINDING — Vulnerability exploitation is #1 breach vector for the first time in 19 years of DBIR history (31% of breaches): The 2026 DBIR analyzed 22,000+ confirmed breaches — the largest dataset in the report's history — and found software vulnerability exploitation now drives 31% of all breaches, surpassing stolen credentials (now 13%) for the first time since Verizon began publishing the report in 2008. AI is the structural enabler: threat actors are using generative AI to accelerate target selection, CVE analysis, PoC validation, and exploit development, compressing the disclosure-to-mass-exploitation window from months to hours. This creates a situation where the 43-day median patch window represents full exposure for a CVE that AI-assisted attackers are exploiting within days of public disclosure."
  - "REMEDIATION CRISIS — 26% CISA KEV remediation rate in 2025, median patch time 43 days: Organizations remediated only 26% of CISA KEV-listed vulnerabilities in 2025 — down from 38% in 2024 — despite KEV deadlines being mandatory for federal civilian agencies. Median time to complete patching rose from 32 days (2024) to 43 days (2025), meaning the average organization operates with over six weeks of exposure after a CVE is publicly known and confirmed exploited. Against this benchmark: the three KEV deadlines expiring this week (Drupal May 27 / T-2 days, PAN-OS May 28 / T-3 days, Exchange May 29 / T-4 days) all fall inside the 43-day average window, meaning any organization that hasn't already patched is running at or above the statistical risk threshold the DBIR identifies as the dominant breach vector."
  - "SUPPLY CHAIN EXPLOSION — Third-party breaches up 60%, now in 48% of all confirmed breaches: Third-party supply chain involvement in confirmed breaches surged 60% year-over-year and now appears in nearly half of all cases — up from approximately 30% the prior year. The DBIR identifies zero-days and critical infrastructure vulnerabilities, combined with aggressive targeting of third- and fourth-party software dependencies, as the defining escalation of the 2025-2026 threat period. This directly contextualizes the Mini Shai-Hulud supply chain campaign: the attack vector being actively exploited this week is the same vector now statistically present in half of all corporate breaches globally. The worm's OIDC token hijack self-propagation technique — where a single infected pipeline auto-propagates through every package it has publish permissions for — is precisely the 'single vulnerability in a shared component that compromises thousands of downstream enterprises' pattern the DBIR flags as the supply chain amplification mechanism."
  - "AI AS FORCE MULTIPLIER — Mobile social engineering up 40%, shadow AI tripled to 45%: AI is reshaping the attack surface on two dimensions. Offensive: AI-powered personalization is driving a 40% increase in successful mobile social engineering attacks (SMS phishing, vishing, WhatsApp-based BEC), enabling threat actors to generate targeted, convincing pretexts at volume previously only achievable by nation-state operations. Defensive blind spot: employee use of unapproved AI tools ('shadow AI') has tripled to 45% penetration in the enterprise — employees uploading documents, customer data, and internal information to unauthorized AI services — creating a data leakage surface most security programs have not inventoried or governed. AI bot traffic is up 21% month-over-month, also complicating web application security and rate-limiting assumptions."
  - "DEFENDER PLAYBOOK — Three actionable DBIR takeaways for immediate implementation: (1) Reweight patch prioritization as your top risk control — the structural shift to vulnerabilities as #1 breach vector means every additional day inside your patch window above the CISA KEV deadline is statistically your highest-probability breach path. Treat CISA KEV deadlines as hard SLAs, not advisory targets (only 26% current compliance). (2) Inventory and govern shadow AI immediately — 45% employee adoption of unapproved AI tools is the fastest-growing unmanaged data leakage channel; start with a tooling audit and acceptable-use policy with technical controls before year-end. (3) Extend third-party security reviews to cover vendors' software supply chains, not just direct vendors — 48% third-party breach involvement means your organization's risk profile is now substantially determined by indirect exposure you do not directly control."
