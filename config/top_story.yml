title: "NGINX Rift (CVE-2026-42945): 18-Year-Old Bug Enables Unauthenticated RCE on One-Third of the Internet's Web Servers — Patch to 1.30.1 Immediately"
summary: "CVE-2026-42945 is a heap buffer overflow in nginx's ngx_http_rewrite_module that has existed for 18 years (since nginx 0.6.27). An unauthenticated attacker can achieve remote code execution or crash any nginx worker process with a single crafted HTTP request — no authentication, no prior access, no user interaction. NOW CONFIRMED EXPLOITED IN THE WILD — VulnCheck detected active exploitation against honeypots, with worker crashes and possible RCE observed. Affects every nginx Open Source version through 1.30.0 and nginx Plus R32-R36. The vulnerable configuration pattern (rewrite + set/if with PCRE captures and question marks) is extremely common in WordPress, PHP, and API gateway setups. Upgrade to nginx 1.30.1 or 1.31.0 immediately. Audit rewrite configurations for the vulnerable pattern."
source_name: "The Hacker News"
url: "https://thehackernews.com/2026/05/18-year-old-nginx-rewrite-module-flaw.html"
published_at: "2026-05-13T00:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-42945 (NGINX Rift) is a heap buffer overflow in ngx_http_rewrite_module. CVSS v4 9.2 (Critical). When a rewrite directive uses an unnamed PCRE capture ($1, $2) with a replacement containing a question mark, followed by another rewrite, if, or set directive, nginx computes the buffer size with one escaping method but writes using a different one. Characters like +, %, and & expand during re-escaping and overflow the heap allocation."
  - "Exploitation requires ZERO authentication. An attacker who can reach a vulnerable nginx server over HTTP sends a single crafted request to overflow the heap in the worker process. With ASLR disabled, the published PoC achieves full remote code execution. With ASLR enabled, exploitation causes a guaranteed worker process crash (DoS). No prior access, no existing session, no user interaction required."
  - "Scale of exposure is massive: nginx powers approximately one-third of the internet's web servers. Every version of nginx Open Source from 0.6.27 (released 2008) through 1.30.0 is affected, plus nginx Plus R32 through R36. The vulnerable rewrite pattern is common in PHP front controllers, WordPress permalinks, Laravel routing, and API gateways — a large fraction of nginx deployments use it."
  - "Working proof-of-concept published on GitHub by depthfirst (the AI-assisted research team that discovered it on April 18). Full exploit code demonstrates unauthenticated RCE. IN-THE-WILD EXPLOITATION NOW CONFIRMED: VulnCheck detected active exploitation attempts causing worker crashes and possible RCE. Multiple threat actors weaponizing the public PoC. The window for safe patching is closing."
  - "Defender actions: (1) Upgrade nginx to 1.30.1 (stable) or 1.31.0 (mainline) immediately — patches released May 13. (2) Upgrade nginx Plus to R36 P2 or later. (3) Audit nginx configurations for the vulnerable pattern: rewrite with unnamed PCRE captures + question mark in replacement + followed by another rewrite/if/set directive. (4) If immediate patching is not possible, modify rewrite rules to eliminate the vulnerable pattern as a temporary mitigation. (5) Monitor access logs for anomalous requests targeting rewrite endpoints with encoded characters (+, %, &). (6) Inventory ALL nginx instances — including embedded instances in containers, reverse proxies, load balancers, and CDN edge nodes."
notes: "RETAIN+UPDATE on 2026-05-17 (Day 5). NGINX Rift story STRENGTHENED — in-the-wild exploitation now confirmed by VulnCheck (THN reporting May 16). Upgraded from 'scanning expected' to 'actively exploited.' Scale (1/3 of internet), audience relevance, and actionability still unmatched. Kevin Beaumont notes exploitation requires specific config knowledge — full mass exploitation less trivial than feared, but active exploitation is confirmed. Challengers evaluated: CVE-2026-42897 Exchange zero-day (CVSS 8.1, XSS/spoofing, KEV May 15, deadline May 29) — serious but lower severity and narrower impact. Cisco SD-WAN CVE-2026-20182 deadline TODAY (May 17) — elevated in briefing but narrower audience. cPanel CVE-2026-41940 (mass exploitation, 1.5M instances) — weeks old, not breaking. Retained NGINX Rift; original REPLACE decision from 2026-05-14."
