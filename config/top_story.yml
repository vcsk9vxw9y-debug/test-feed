key_points:
  - "CVE-2026-41091 — elevation of privilege in Microsoft Malware Protection Engine (the Defender scanning component). CVSS 7.8, local attack vector, low attack complexity, no user interaction. Affects Malware Protection Engine versions up to and including 1.1.26030.3008. Fixed in 1.1.26040.8. Companion CVE-2026-45498 (DoS, same engine) also actively exploited and KEV-listed."
  - "Root cause is a CWE-59 link-following weakness: when the engine scans a file, it follows symbolic links and directory junctions before access. The file operation runs under SYSTEM. An attacker with any local low-privilege foothold can plant a symlink redirecting Defender's writes into protected system locations, achieving SYSTEM privilege without ever exploiting a kernel bug or escaping a sandbox the conventional way."
  - "Microsoft confirms exploitation in the wild — the advisory carries 'Exploitation Detected.' Active campaigns exploiting this CVE have been tracked under the names 'RedSun' and 'UnDefend.' CISA added CVE-2026-41091 to the Known Exploited Vulnerabilities catalog May 21. Federal deadline: June 3, 2026 — US agencies must patch or discontinue use."
  - "Patch delivery is via Defender's automatic update mechanism — most consumer and enterprise systems will pull the new engine version transparently. However, environments with constrained or delayed update paths (air-gapped networks, locked-down VDI base images, endpoints with stale signature feeds, hosts where Defender has been disabled by GPO) will NOT auto-patch and must be touched explicitly."
  - "Defender actions: (1) Manually trigger an update on every Windows host and verify Microsoft Malware Protection Engine version is >= 1.1.26040.8 (`Get-MpComputerStatus | Select AMEngineVersion` in PowerShell). (2) Audit any endpoint where Defender is disabled, exempted, or replaced by a third-party AV — those hosts are vulnerable and won't pull the patch. (3) Hunt EDR/SIEM telemetry for low-privilege processes creating symbolic links or directory junctions in or pointing into protected paths (Program Files, Windows, ProgramData) followed by Defender scan activity. (4) For domain-joined estates, push the engine update via WSUS/SCCM/Intune as a forced action rather than relying on the trickle. (5) Treat this as an EDR-tooling compromise event: assume that during the exploitation window, Defender's protection on affected hosts was effectively zero."
notes: "RETAIN+UPDATE on 2026-05-23 (AM). Story now Day 2. CISA federal deadline confirmed June 3, 2026. Title updated from '(CISA KEV May 21)' to '(CISA KEV, Federal Deadline June 3)'. Candidates evaluated today: Ubiquiti UniFi OS triple CVSS 10.0 (CVE-2026-34908/09/10, May 22) — strong recency and unauthenticated RCE but narrower audience (~100K exposed endpoints, network hardware admins only, not yet confirmed actively exploited); Langflow CVE-2025-34291 (CVSS 9.4, MuddyWater exploitation, CISA KEV May 21) — high novelty (Iranian state actor targeting AI platforms) but audience is narrower (Langflow operators); Trend Micro Apex One CVE-2026-34926 (security tool weaponized as malware delivery, CISA KEV May 21) — compelling angle but impact tier similar to UniFi. Defender CVE-2026-41091 retains the slot on combined breadth (every Windows host), novelty (zero-day in the defense tool itself), and the qualitatively unusual threat model (blind AV = blind estate). Both Ubiquiti and Langflow/Apex One stories enter the daily briefing."
