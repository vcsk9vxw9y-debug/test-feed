title: "GlassWorm Supply Chain Attack Escalates: 73 Sleeper Extensions Activate on Open VSX — Tropic Trooper Attribution"
summary: "Socket.dev researchers identified 73 new 'sleeper' extensions planted on the Open VSX marketplace by the GlassWorm campaign, with six confirmed activated to deliver malware. The extensions impersonate popular tools (VS Code Pets, IronPLC, Version Lens, HTML-validate, Monochromator, AutoAntigravity) and use extensionPack/extensionDependencies manifest fields to silently install malicious payloads. The campaign is attributed with high confidence to Tropic Trooper APT, using a custom AdaptixC2 Beacon with GitHub as C2. Developers using Open VSX or VS Code should audit installed extensions immediately and scan for AdaptixC2 indicators."
source_name: "SecurityWeek"
url: "https://www.securityweek.com/dozens-of-open-vsx-extension-clones-linked-to-glassworm-malware/"
published_at: "2026-04-28T12:40:24Z"
category: "Supply Chain"
key_points:
  - "73 sleeper extensions were planted on Open VSX, following the original March 2026 wave of 72 malicious extensions. Six have been confirmed activated: impersonations of Monochromator theme, AutoAntigravity, IronPLC, VS Code Pets, HTML-validate, and Version Lens."
  - "Delivery uses two methods: (1) extensionPack or extensionDependencies manifest fields that auto-install malicious dependencies, and (2) embedded code that downloads .vsix files from GitHub, using native binaries or heavily obfuscated JavaScript decoded at runtime."
  - "Attributed with high confidence to Tropic Trooper APT. C2 infrastructure uses a custom AdaptixC2 Beacon listener with GitHub as the command-and-control platform, making traffic harder to distinguish from legitimate developer activity."
  - "Defender actions: (1) Audit all Open VSX extensions against the published IOC list from Socket.dev. (2) Remove or disable the six confirmed malicious extensions. (3) Scan developer workstations for AdaptixC2 indicators. (4) Review extensionPack and extensionDependencies fields in .vsix manifests for unexpected references. (5) Pin extension versions and disable auto-updates in VS Code/Open VSX."
  - "The 'sleeper' technique is novel: extensions sit dormant for weeks after installation before activating, evading initial security scans. This represents a significant evolution in supply chain attack tradecraft targeting developer environments."
notes: "Replaced FIRESTARTER Cisco ASA/FTD backdoor (April 24, day 4) on 2026-04-28 evening. FIRESTARTER's April 30 physical-reset deadline is imminent but the story has been in the hero slot since April 25. GlassWorm escalation is fresher (April 26-28), directly targets the feed's developer/security practitioner audience, features a novel sleeper-activation technique, and has nation-state attribution (Tropic Trooper). Supply chain attacks on developer tooling are higher-signal for this audience than infrastructure-level firmware persistence."
