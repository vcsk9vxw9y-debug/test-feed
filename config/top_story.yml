published_at: "2026-05-06T09:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-0300 is a buffer overflow in the User-ID Authentication Portal (Captive Portal) of PAN-OS. CVSS 9.3 (Critical). Unauthenticated remote attackers achieve root-level code execution on the firewall via specially crafted packets. No authentication or user interaction required."
  - "PATCHES RELEASING TODAY (May 13). Palo Alto Networks began rolling out fixes across PAN-OS release tracks. Full patch window runs through May 28 — some organizations may not receive updates automatically until later depending on support tier. Schedule emergency maintenance windows NOW."
  - "State-sponsored exploitation confirmed by Unit 42, tracked as CL-STA-1132 (China-nexus, per Earthworm/ReverseSocks5 tooling overlap with Volt Typhoon and APT41), active since April 9 — over a month before public disclosure. Campaign targets internet-exposed User-ID Authentication Portals."
  - "CISA FCEB deadline PASSED (May 9). BOD 22-01 deadline is May 27. Organizations without mitigations applied are non-compliant. Affected: PA-Series (hardware) and VM-Series (virtual) firewalls with User-ID Authentication Portal enabled. NOT affected: Prisma Access, Cloud NGFW, Panorama."
  - "Defender actions: (1) Apply PAN-OS patches as they become available TODAY — prioritize internet-exposed firewalls. (2) Until patched, restrict User-ID Authentication Portal to trusted internal zones or disable it. (3) Hunt for compromise — review firewall logs for anomalous captive portal traffic back to April 9. (4) Audit for backdoor installation and lateral movement indicators from CL-STA-1132. (5) Monitor Unit 42 and CISA advisories for updated IOCs and second patch wave May 28."
notes: "RETAIN+UPDATE on 2026-05-13 morning. Patches began releasing TODAY — story transitions from 'mitigate and wait' to 'PATCH NOW.' Peak actionability for defenders. Candidates evaluated: Microsoft Patch Tuesday May 2026 (138 CVEs, Netlogon CVE-2026-41089 CVSS 9.8 wormable RCE + DNS Client CVE-2026-41096 CVSS 9.8 — massive but NO active exploitation, no zero-days), Exim Dead.Letter CVE-2026-45185 (CVSS 9.8 unauthenticated RCE on GnuTLS Exim builds — no active exploitation yet), dnsmasq 6-CVE cluster (DNS poisoning + heap RCE, disclosed May 11 — no active exploitation). PAN-OS retains because patch-day arrival on an actively exploited state-sponsored zero-day with a passed CISA deadline is the most actionable story for security practitioners today."
