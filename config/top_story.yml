title: "TeamPCP Mini Shai-Hulud Self-Replicating Worm — 500+ npm/PyPI Packages Poisoned, 518 Million Downloads Affected, SLSA Build Level 3 Attestations Defeated: Rotate GitHub OIDC Tokens, AWS IAM Keys, and HashiCorp Vault Secrets If pip install or npm install Ran Since May 11"
summary: "TeamPCP (UNC6780), the cybercrime group behind the GitHub internal repository breach (May 18-20, 3,800 internal repos exfiltrated), has deployed a self-replicating supply chain worm dubbed Mini Shai-Hulud that has now poisoned over 500 versions across 170+ npm and PyPI packages with a combined 518 million downloads. The worm's defining capability is OIDC (OpenID Connect) token hijacking for self-propagation: it steals short-lived OIDC tokens from CI/CD pipeline secrets during package installation and immediately uses them to authenticate to PyPI and npm as legitimate maintainers, publishing backdoored versions of additional packages that the infected pipeline has write access to. This creates an automated, self-sustaining infection chain that multiplies without further attacker involvement after each wave. In a historically significant escalation, Mini Shai-Hulud has defeated SLSA Build Level 3 provenance attestations — widely considered the gold standard of supply chain integrity — by hijacking the legitimate CI build process itself to generate valid SLSA L3-signed artifacts for malicious source code, making the resulting packages cryptographically indistinguishable from legitimate builds. The worm payload targets AWS IAM credentials, HashiCorp Vault secrets, GitHub tokens ($GITHUB_TOKEN), and all CI/CD environment variables, exfiltrating them to attacker C2 infrastructure. Confirmed poisoned packages include the TanStack npm namespace (42 packages, approximately 280 million monthly downloads, all poisoned in six minutes on May 11), Mistral AI Python SDK (mistralai 2.4.6), Guardrails AI (0.10.1), the durabletask Microsoft Azure Python SDK (417,000 monthly downloads), LiteLLM, Telnyx SDK, Bitwarden CLI, Aqua Security Trivy, Checkmarx KICS, UiPath Python SDK, and the OpenSearch Python client. As of May 23, fresh poisoned releases are being identified in an active expansion wave. This is the escalating culmination of a single coordinated TeamPCP campaign: Aqua Trivy compromise (March 19) to TanStack poisoning and worm deployment (May 11) to Nx Console VS Code extension GitHub breach (May 18, 3,800 repos) to Megalodon CI/CD workflow backdooring (May 18, 5,561 repos, 449 GB exfiltrated) to Laravel-Lang Composer poisoning (May 22) to Mini Shai-Hulud expansion (May 23). Any Python or JavaScript CI/CD pipeline that installed an affected package since May 11 must be treated as a potential credential-exfiltration and worm-propagation node."
