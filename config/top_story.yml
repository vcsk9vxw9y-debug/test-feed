title: "CVE-2026-41940: cPanel & WHM Authentication Bypass Exploited as Zero-Day — 70M Domains at Risk, PoC Published"
summary: "A critical authentication bypass (CVSS 9.8) in cPanel & WHM was exploited as a zero-day for at least 30 days before an emergency patch on April 28. The CRLF injection flaw in session handling lets unauthenticated attackers forge root sessions and take full control of hosting servers. watchTowr has published a proof-of-concept exploit. All cPanel versions after 11.40 are affected. Administrators must run '/scripts/upcp --force' immediately to apply the emergency patch, then verify with '/usr/local/cpanel/cpanel -V'."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/critical-cpanel-and-whm-bug-exploited-as-a-zero-day-poc-now-available/"
published_at: "2026-04-30T06:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-41940 is a CRLF injection in cPanel & WHM's session-handling code (CVSS 9.8). An attacker manipulates the whostmgrsession cookie to inject 'user=root' into the session file, bypassing authentication entirely. All cPanel versions after 11.40 are affected."
  - "Confirmed zero-day exploitation for at least 30 days before the April 28 emergency patch. KnownHost confirmed in-the-wild attacks against hosting management planes. The Canadian Centre for Cyber Security issued advisory AL26-008."
  - "watchTowr published a full technical analysis and proof-of-concept exploit on April 30, dramatically increasing exploitation risk for unpatched servers. cPanel controls hosting for an estimated 70 million domains worldwide."
  - "Defender actions: (1) Run '/scripts/upcp --force' as root to apply the emergency update immediately. (2) Verify patched version with '/usr/local/cpanel/cpanel -V' — secure versions are 11.136.0.5, 11.134.0.20, 11.132.0.29, 11.130.0.19, 11.126.0.54, 11.118.0.63, 11.110.0.97, or 11.86.0.41. (3) If patching is delayed, block inbound traffic on ports 2083, 2087, 2095, and 2096 at the firewall. (4) Audit WHM access logs for unauthorized root sessions during the 30-day exploitation window."
  - "Exploitation grants full control of the cPanel host: server configurations, databases, email accounts, and all hosted websites. On shared hosting, a single compromised server can cascade to thousands of downstream sites — making this one of the highest-impact hosting vulnerabilities in years."
notes: "Replaced GlassWorm Open VSX supply chain story (April 28, day 2) on 2026-04-30 morning. GlassWorm remains important but had no significant new developments since April 28. CVE-2026-41940 is breaking today with watchTowr PoC publication, has CVSS 9.8 vs supply chain story's qualitative severity, confirmed 30-day zero-day exploitation window, and affects 70M domains — infrastructure-level blast radius. Clear defender actions with specific patch commands. The cPanel story demands immediate action from a massive portion of the hosting industry."
