title: "Microsoft Defender Zero-Day (CVE-2026-41091): Actively Exploited Link-Following Flaw Lets Low-Priv Attackers Hit SYSTEM Through the AV Itself — Verify Engine ≥ 1.1.26040.8 Now (CISA KEV May 21)"
summary: "CVE-2026-41091 is an actively exploited privilege-escalation zero-day in the Microsoft Malware Protection Engine — the core scanning component of Defender. The bug is a 'link following' weakness: Defender follows attacker-redirected symbolic links or directory junctions while doing file operations under SYSTEM, letting any local low-privilege user redirect the engine's writes into protected system directories and escalate to SYSTEM. CVSS 7.8, local, low complexity, no user interaction. Microsoft confirms exploitation in the wild and CISA added it to KEV today (May 21). Companion CVE-2026-45498 is a DoS in the same engine, also actively exploited. Patch ships via Defender's automatic-update channel, but 'automatic' is not the same as 'applied' — verify Malware Protection Engine version is at least 1.1.26040.8 on every Windows host, including endpoints that may have stale signatures or restricted update paths. The threat model is unusual: this is a zero-day in the very tool defenders use to detect attacks, so an unpatched estate is blind to itself."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/microsoft-warns-of-new-defender-zero-days-exploited-in-attacks/"
published_at: "2026-05-21T00:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-41091 — elevation of privilege in Microsoft Malware Protection Engine (the Defender scanning component). CVSS 7.8, local attack vector, low attack complexity, no user interaction. Affects Malware Protection Engine versions up to and including 1.1.26030.3008. Fixed in 1.1.26040.8."
  - "Root cause is a CWE-59 link-following weakness: when the engine scans a file, it follows symbolic links and directory junctions before access. The file operation runs under SYSTEM. An attacker with any local low-privilege foothold can plant a symlink redirecting Defender's writes into protected system locations, achieving SYSTEM privilege without ever exploiting a kernel bug or escaping a sandbox the conventional way."
  - "Microsoft confirms exploitation in the wild — the advisory carries 'Exploitation Detected.' Some reporting refers to the campaigns and tooling around this CVE as 'RedSun' and 'UnDefend.' CISA added CVE-2026-41091 to the Known Exploited Vulnerabilities catalog today, May 21, alongside companion CVE-2026-45498 (DoS in the same engine, also actively exploited)."
  - "Patch delivery is via Defender's automatic update mechanism — most consumer and enterprise systems will pull the new engine version transparently. However, environments with constrained or delayed update paths (air-gapped networks, locked-down VDI base images, endpoints with stale signature feeds, hosts where Defender has been disabled by GPO) will NOT auto-patch and must be touched explicitly."
  - "Defender actions: (1) Manually trigger an update on every Windows host and verify Microsoft Malware Protection Engine version is >= 1.1.26040.8 (`Get-MpComputerStatus | Select AMEngineVersion` in PowerShell). (2) Audit any endpoint where Defender is disabled, exempted, or replaced by a third-party AV — those hosts are vulnerable and won't pull the patch. (3) Hunt EDR/SIEM telemetry for low-privilege processes creating symbolic links or directory junctions in or pointing into protected paths (Program Files, Windows, ProgramData) followed by Defender scan activity. (4) For domain-joined estates, push the engine update via WSUS/SCCM/Intune as a forced action rather than relying on the trickle. (5) Treat this as an EDR-tooling compromise event: assume that during the exploitation window, Defender's protection on affected hosts was effectively zero."
notes: "REPLACE on 2026-05-21. The Drupal PSA-2026-05-18 / CVE-2026-9082 story has now concluded its breaking-news cycle: patch released yesterday (May 20) within the announced 17:00-21:00 UTC window, confirmed as a PostgreSQL-only anonymous SQL injection (narrower than the PSA's wording implied). It moves into the briefing and threat_context. Microsoft Defender CVE-2026-41091 is breaking today: zero-day in the security product itself, actively exploited, added to CISA KEV May 21, broadest possible Windows defender base affected, with a defender-tooling-compromise threat model that's qualitatively more urgent than 'normal' EoP. Candidates evaluated: CVE-2026-9082 Drupal SQL injection (yesterday's story, now mature); CVE-2026-45498 Defender DoS (paired with 41091 but lower-impact); NGINX Rift Day 9 (long-running, briefing only now); GitHub Nx Console / TanStack supply-chain crossover (3,800 internal repos exfiltrated — strong story but the Defender zero-day is broader and more urgent for the average Windows operator); CVE-2026-46333 Linux LPE on Debian/Fedora/Ubuntu (CVSS 5.5, narrower); Exchange CVE-2026-42897 (T-8 days from KEV deadline, no permanent patch, but stable story). Defender wins the slot on combined recency + breadth + qualitative novelty (zero-day in the AV itself)."
