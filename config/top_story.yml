title: "CVE-2026-0300: Palo Alto PAN-OS Zero-Day — Unpatched Firewall RCE Under Active Exploitation, No Fix Until May 13"
summary: "Palo Alto Networks disclosed CVE-2026-0300 on May 6, a CVSS 9.3 buffer overflow in the User-ID Authentication Portal (Captive Portal) of PAN-OS. Unauthenticated remote attackers can send specially crafted packets to gain root access on PA-Series and VM-Series firewalls. Limited active exploitation is confirmed against internet-exposed Authentication Portals. No patch is available — fixes are planned for May 13. Immediately restrict User-ID Authentication Portal access to trusted zones only, or disable it entirely if not required."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/palo-alto-networks-warns-of-actively-exploited-firewall-zero-day/"
published_at: "2026-05-06T09:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-0300 is a buffer overflow in the User-ID Authentication Portal (Captive Portal) of PAN-OS. CVSS 9.3 (Critical). An unauthenticated remote attacker can trigger the overflow by sending specially crafted packets, achieving root-level code execution on the firewall. No authentication or user interaction required."
  - "Palo Alto Networks confirmed limited active exploitation targeting User-ID Authentication Portals exposed to untrusted IP addresses or the public internet. The Cyber Security Agency of Singapore (CSA) issued alert AL-2026-048. Urgency rated HIGHEST by Palo Alto Networks."
  - "Affected systems: PA-Series (hardware) and VM-Series (virtual) firewalls. Prisma Access, Cloud NGFW, and Panorama appliances are NOT affected. The attack surface is any PAN-OS firewall with the User-ID Authentication Portal enabled and reachable from untrusted networks."
  - "Defender actions: (1) Immediately restrict User-ID Authentication Portal access to trusted internal zones only — do not expose to the internet. (2) If the portal is not required, disable it entirely. (3) Monitor firewall logs for anomalous authentication portal traffic. (4) Audit firewall configurations for any signs of compromise. (5) Plan for emergency patching when fixes ship on May 13."
  - "This is an unpatched zero-day on a perimeter security device. Firewalls sit at the network boundary — compromising one gives attackers a privileged position to intercept traffic, pivot into internal networks, and bypass security controls. The 7-day window until patches arrive makes immediate mitigation critical."
notes: "REPLACE on 2026-05-06 morning. Replaced Copy Fail (CVE-2026-31431, 5 days old, patches available for most distros). CVE-2026-0300 is a breaking, actively exploited, UNPATCHED zero-day on Palo Alto firewalls — CVSS 9.3, no fix until May 13. Perimeter device compromise is the highest-impact scenario for security practitioners. Copy Fail demoted to daily briefing critical item (KEV deadline May 15, 9 days out). Other candidates evaluated: MOVEit Automation CVE-2026-4670 (CVSS 9.8, no confirmed exploitation yet), Apache HTTP/2 CVE-2026-23918 (CVSS 8.8, no confirmed exploitation)."
