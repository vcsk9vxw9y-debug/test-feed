title: "CVE-2026-41940: cPanel & WHM Auth Bypass — CISA KEV Deadline Tomorrow, 650K Instances Still Exposed"
summary: "CISA added CVE-2026-41940 to the Known Exploited Vulnerabilities catalog on May 1 with a federal remediation deadline of May 3 — tomorrow. Shadowserver now reports 44,000 unique IPs actively scanning and exploiting the flaw, with approximately 650,000 cPanel/WHM instances still internet-exposed. The CRLF injection (CVSS 9.8) lets unauthenticated attackers forge root sessions. A public PoC from watchTowr and exploitation dating back to February 23 make this the most urgent patching priority for hosting providers. Run '/scripts/upcp --force' immediately."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/critical-cpanel-and-whm-bug-exploited-as-a-zero-day-poc-now-available/"
published_at: "2026-04-30T06:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-41940 is a CRLF injection in cPanel & WHM's session-handling code (CVSS 9.8). An attacker manipulates the whostmgrsession cookie to inject 'user=root' into the session file, bypassing authentication entirely. All cPanel versions after 11.40 are affected."
  - "CISA added CVE-2026-41940 to the KEV catalog on May 1 with a federal remediation deadline of May 3. Shadowserver reports 44,000 unique IPs actively scanning and exploiting the vulnerability, with approximately 650,000 internet-exposed cPanel/WHM instances worldwide."
  - "Exploitation confirmed since February 23 — at least two months before the April 28 emergency patch. watchTowr's published PoC makes exploitation trivial. cPanel controls hosting for an estimated 70 million domains, and a single compromised shared-hosting server can cascade to thousands of downstream sites."
  - "Defender actions: (1) Run '/scripts/upcp --force' as root to apply the emergency update immediately. (2) Verify patched version with '/usr/local/cpanel/cpanel -V' — secure versions are 11.136.0.5, 11.134.0.20, 11.132.0.29, 11.130.0.19, 11.126.0.54, 11.118.0.63, 11.110.0.97, or 11.86.0.41. (3) If patching is delayed, block inbound traffic on ports 2083, 2087, 2095, and 2096 at the firewall. (4) Audit WHM access logs for unauthorized root sessions dating back to February 23."
  - "Multiple government CERTs have issued advisories including the Canadian Centre for Cyber Security (AL26-008). With the CISA KEV deadline hitting May 3 and active mass-scanning underway, unpatched servers face imminent compromise."
notes: "RETAIN+UPDATE on 2026-05-02 morning. Same lead story (CVE-2026-41940) refreshed with CISA KEV addition (May 1, deadline May 3), Shadowserver telemetry (44K attacking IPs, 650K exposed instances), and revised exploitation timeline (confirmed since Feb 23). No candidate story clearly beat the incumbent: Copy Fail Linux LPE is local-only, PyTorch Lightning supply chain is narrower audience, SharePoint zero-day already covered. The imminent CISA deadline makes this even more urgent than when first curated."
