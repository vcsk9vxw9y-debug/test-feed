title: "Bitwarden CLI Backdoored via Hijacked GitHub Action — First npm Trusted Publishing Compromise Deploys Self-Propagating Credential Worm"
summary: "Attackers hijacked Bitwarden's CI/CD pipeline (publish-ci.yml) to publish a malicious @bitwarden/cli@2026.4.0 to npm on April 22, bypassing npm's trusted publishing mechanism — the first known compromise of this security control. The rogue package deployed a multi-stage credential theft worm dubbed 'Shai-Hulud: The Third Coming' that harvests GitHub/npm tokens, SSH keys, .env files, shell history, cloud credentials, and MCP configuration files, then self-propagates by injecting malicious code into the victim's own npm packages and republishing them. The attack was live for approximately 90 minutes (5:57–7:30 PM ET). Bitwarden confirmed no end-user vault data was accessed. Linked to the Checkmarx supply chain campaign and threat actor TeamPCP. Defender actions: check if @bitwarden/cli@2026.4.0 was installed anywhere in your org, treat affected systems as fully compromised, rotate all GitHub tokens, npm tokens, SSH keys, cloud credentials, and CI/CD secrets immediately."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/bitwarden-cli-npm-package-compromised-to-steal-developer-credentials/"
published_at: "2026-04-22T19:30:00Z"
category: "Supply Chain"
key_points:
  - "First npm trusted publishing compromise: Attacker infected Bitwarden's GitHub Action (publish-ci.yml) to publish @bitwarden/cli@2026.4.0 under Bitwarden's legitimate identity, bypassing the security mechanism designed to eliminate long-lived tokens. 78,000 weekly downloads on this package."
  - "Self-propagating worm: The payload ('Shai-Hulud: The Third Coming') downloads the victim's own npm packages, injects malicious code, and republishes them — creating a supply chain cascade. This is the third iteration of the Shai-Hulud campaign targeting developer infrastructure."
  - "Credential harvest scope: GitHub and npm tokens, SSH keys, .env files, shell history, AWS/GCP/Azure credentials, GitHub Actions secrets, and MCP configuration files are all exfiltrated to attacker-controlled domains and as GitHub commits."
  - "Defender actions: (1) Audit for @bitwarden/cli@2026.4.0 across all dev machines, CI runners, and Docker images. (2) Rotate all GitHub tokens, npm tokens, SSH keys, and cloud credentials on affected systems. (3) Audit npm packages you maintain for unauthorized version bumps. (4) Review CI/CD pipeline integrity — check GitHub Action pinning and provenance attestations. (5) Scan for IOCs from Aikido and Socket advisories."
  - "Bitwarden confirmed no vault data exposure. Attack linked to Checkmarx supply chain campaign and threat actor TeamPCP (previously behind Trivy and LiteLLM compromises). CVE being issued for the affected version. 90-minute exposure window limits blast radius but self-propagation means downstream packages may be affected."
notes: "Replaced Vercel breach (day 5+, incremental updates) on 2026-04-24. Bitwarden CLI supply chain attack is fresher (April 22), represents a novel attack vector (first npm trusted publishing bypass), has a self-propagating worm component, and demands immediate credential rotation from the developer audience. The Vercel story remains important but its updates are now incremental scope refinements rather than new actionable intelligence."
