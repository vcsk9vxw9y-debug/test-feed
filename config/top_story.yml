published_at: "2026-05-13T00:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-42945 (NGINX Rift) is a heap buffer overflow in ngx_http_rewrite_module. CVSS v4 9.2 (Critical). When a rewrite directive uses an unnamed PCRE capture ($1, $2) with a replacement containing a question mark, followed by another rewrite, if, or set directive, nginx computes the buffer size with one escaping method but writes using a different one. Characters like +, %, and & expand during re-escaping and overflow the heap allocation."
  - "Exploitation requires ZERO authentication. An attacker who can reach a vulnerable nginx server over HTTP sends a single crafted request to overflow the heap in the worker process. With ASLR disabled, the published PoC achieves full remote code execution; with ASLR enabled, exploitation causes a guaranteed worker process crash (DoS). No prior access, no existing session, no user interaction required."
  - "Scale of exposure quantified: Censys scans now surface approximately 5.7 million internet-exposed nginx servers running potentially vulnerable versions — confirming earlier estimates that nginx powers roughly one-third of the internet's web servers. Every version of nginx Open Source from 0.6.27 (released 2008) through 1.30.0 is affected, plus nginx Plus R32 through R36. The vulnerable rewrite pattern is common in PHP front controllers, WordPress permalinks, Laravel routing, and API gateways."
  - "Day 6 of disclosure (May 13 -> May 18). VulnCheck canaries flagged exploitation attempts beginning May 16 (Saturday). Weekend reporting from The Register, Help Net Security, SecurityWeek, and SOCRadar confirms attackers are wasting no time targeting exposed servers. The depthfirst AI-assisted research team that found Rift also reported four additional nginx memory-corruption issues. The window for safe patching is effectively closed for internet-facing servers."
  - "Defender actions: (1) Upgrade nginx to 1.30.1 (stable) or 1.31.0 (mainline) immediately — patches released May 13. (2) Upgrade nginx Plus to R32 P6 / R36 P4 or later. (3) Audit nginx configurations for the vulnerable pattern: rewrite with unnamed PCRE captures + question mark in replacement + followed by another rewrite/if/set directive. (4) If immediate patching is not possible, replace unnamed captures ($1, $2) with named captures as a temporary mitigation. (5) Monitor access logs for anomalous requests targeting rewrite endpoints with encoded characters (+, %, &). (6) Inventory ALL nginx instances — including containers, reverse proxies, ingress controllers, load balancers, and CDN edge nodes."
notes: "RETAIN+UPDATE on 2026-05-18 (Day 6). NGINX Rift remains the strongest available lead. Censys confirmed scope (5.7M exposed servers) and weekend tier-1 coverage from The Register, Help Net Security, SecurityWeek, SOCRadar reinforce relevance. VulnCheck exploitation confirmed May 16; attack volume continuing into May 18. Challengers evaluated: Ivanti EPMM CVE-2026-6973 (KEV, authenticated RCE chained with Jan credentials) — narrower scope, fewer affected orgs; Exchange CVE-2026-42897 (XSS/spoof, no permanent patch, deadline May 29) — serious but lower severity; Cisco SD-WAN CVE-2026-20182 deadline passed yesterday — story rolling off; Mini Shai-Hulud TanStack/Mistral supply chain (May 12) — significant but already a week old; Grafana GitHub token extortion — supply-chain concern but limited direct defender action. Updated title to lead with Day-6 scale numbers; refreshed summary and key points to reflect today's reporting."
