title: "CVE-2026-0300: Palo Alto PAN-OS Zero-Day — Unpatched Firewall RCE Under Active Exploitation, No Fix Until May 13"
summary: "CVE-2026-0300 is a CVSS 9.3 buffer overflow in the PAN-OS User-ID Authentication Portal granting unauthenticated remote root on PA-Series and VM-Series firewalls. State-sponsored exploitation (Unit 42 cluster CL-STA-1132) has been active since April 9 — nearly a month before public disclosure on May 6. CISA FCEB deadline is TOMORROW (May 9). No patch until May 13 (5 days away). Restrict User-ID Authentication Portal to trusted zones immediately or disable it entirely."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/pan-os-firewall-rce-zero-day-exploited-in-attacks-since-april-9/"
published_at: "2026-05-06T09:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-0300 is a buffer overflow in the User-ID Authentication Portal (Captive Portal) of PAN-OS. CVSS 9.3 (Critical). Unauthenticated remote attackers achieve root-level code execution on the firewall via specially crafted packets. No authentication or user interaction required."
  - "State-sponsored exploitation confirmed. Unit 42 is tracking activity cluster CL-STA-1132, which has been exploiting CVE-2026-0300 since April 9, 2026 — nearly a month before Palo Alto's public disclosure on May 6. Exploitation targets internet-exposed User-ID Authentication Portals."
  - "CISA added CVE-2026-0300 to the KEV catalog on May 6. FCEB agencies must apply mitigations by May 9 — TOMORROW. BOD 22-01 deadline is May 27. CSA Singapore issued alert AL-2026-048. Urgency rated HIGHEST by Palo Alto Networks."
  - "Affected: PA-Series (hardware) and VM-Series (virtual) firewalls with User-ID Authentication Portal enabled. NOT affected: Prisma Access, Cloud NGFW, Panorama. Patches expected May 13 (first wave) and May 28 (additional releases)."
  - "Defender actions: (1) Restrict User-ID Authentication Portal access to trusted internal zones only. (2) Disable the portal entirely if not required. (3) Hunt for compromise — review firewall logs for anomalous captive portal traffic dating back to April 9. (4) Audit configurations for signs of backdoor installation. (5) Plan emergency patching for May 13."
notes: "RETAIN+UPDATE on 2026-05-08 morning. Refreshed countdown: CISA FCEB deadline now TOMORROW (May 9), patch 5 days away (May 13). Candidates evaluated: Dirty Frag (CVE-2026-43284/CVE-2026-43500, universal Linux root LPE disclosed today via broken embargo, PoC available, no patches for most distros yet — strong story but no confirmed active exploitation yet and module-blacklist mitigation available), Canvas/Instructure breach (ShinyHunters, 275M users/9K schools, data leak deadline today — massive but consumer/education sector, no defender action beyond awareness), Cisco SD-WAN CVE-2026-20127 (CVSS 10 but from February, already patched). PAN-OS retains: unpatched state-sponsored zero-day with CISA deadline tomorrow is peak urgency."
