title: "CVE-2026-0300: PAN-OS Patches Dropping NOW — Emergency Patching Window Open, State-Sponsored Exploitation Ongoing"
summary: "Palo Alto Networks began releasing patches today (May 13) for CVE-2026-0300, the CVSS 9.3 buffer overflow in PAN-OS User-ID Authentication Portal exploited by China-nexus CL-STA-1132 since April 9. CISA FCEB deadline passed May 9 — organizations are already non-compliant. Apply patches immediately as they become available for your PAN-OS release track. Until patched, User-ID Authentication Portal must remain restricted to trusted internal zones or disabled. Hunt for compromise back to April 9."
source_name: "Bleeping Computer"
