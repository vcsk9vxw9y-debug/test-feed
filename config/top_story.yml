title: "CVE-2026-41940: cPanel & WHM Auth Bypass — CISA KEV Deadline TODAY, 650K+ Instances Still Exposed"
summary: "The CISA KEV federal remediation deadline for CVE-2026-41940 is today, May 3. Shadowserver continues to report 44,000+ unique IPs actively scanning and exploiting the CRLF injection flaw (CVSS 9.8) that lets unauthenticated attackers forge root sessions. Approximately 650,000 cPanel/WHM instances remain internet-exposed. Picus Security estimates 1.5 million servers were potentially affected. With exploitation confirmed since February 23 and a public PoC from watchTowr, any unpatched cPanel server should be considered at high risk of compromise. Run '/scripts/upcp --force' immediately."
source_name: "Bleeping Computer"
url: "https://www.bleepingcomputer.com/news/security/critical-cpanel-and-whm-bug-exploited-as-a-zero-day-poc-now-available/"
published_at: "2026-04-30T06:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-41940 is a CRLF injection in cPanel & WHM's session-handling code (CVSS 9.8). An attacker manipulates the whostmgrsession cookie to inject 'user=root' into the session file, bypassing authentication entirely. All cPanel versions after 11.40 are affected."
  - "The CISA KEV federal remediation deadline is TODAY, May 3. Shadowserver reports 44,000+ unique IPs actively scanning and exploiting the vulnerability. Picus Security estimates 1.5 million potentially affected servers, with approximately 650,000 still internet-exposed per Shodan telemetry."
  - "Exploitation confirmed since February 23 — at least two months before the April 28 emergency patch. watchTowr's published PoC makes exploitation trivial. cPanel controls hosting for an estimated 70 million domains, and a single compromised shared-hosting server can cascade to thousands of downstream sites."
  - "Defender actions: (1) Run '/scripts/upcp --force' as root to apply the emergency update immediately. (2) Verify patched version with '/usr/local/cpanel/cpanel -V' — secure versions are 11.136.0.5, 11.134.0.20, 11.132.0.29, 11.130.0.19, 11.126.0.54, 11.118.0.63, 11.110.0.97, or 11.86.0.41. (3) If patching is delayed, block inbound traffic on ports 2083, 2087, 2095, and 2096 at the firewall. (4) Audit WHM access logs for unauthorized root sessions dating back to February 23."
  - "Multiple government CERTs have issued advisories including the Canadian Centre for Cyber Security (AL26-008). Cloudflare deployed emergency WAF rules on April 30. With the CISA KEV deadline hitting today and active mass-scanning ongoing, unpatched servers face imminent compromise."
notes: "RETAIN+UPDATE on 2026-05-03 morning. Same lead story (CVE-2026-41940) refreshed — CISA KEV deadline is NOW today May 3 (updated from 'tomorrow'). Added Picus Security 1.5M affected server estimate and Cloudflare emergency WAF deployment. No candidate story clearly beat the incumbent: Cisco SD-WAN CVE-2026-20127 is from February, n8n Ni8mare is from January, Copy Fail Linux LPE is local-only, PyTorch Lightning supply chain is narrower audience. The deadline being TODAY makes this the most urgent thing in cybersecurity right now."
