title: "CVE-2026-31431: Copy Fail Linux Root Exploit — CISA KEV Deadline May 15, Every Distro Since 2017 Affected"
summary: "CISA added CVE-2026-31431 ('Copy Fail') to the KEV catalog on May 1 after confirming active exploitation against U.S. think tanks, European manufacturing firms, and cloud providers. The nine-year-old Linux kernel flaw in the algif_aead crypto subsystem lets any unprivileged local user gain deterministic root access via a 732-byte Python script — no race condition required. Attackers are chaining it with web application and VPN RCE bugs to deploy ransomware. Every major Linux distribution since 2017 is affected. Federal patch deadline is May 15. Apply your distro vendor's kernel update and reboot immediately."
source_name: "The Hacker News"
url: "https://thehackernews.com/2026/05/cisa-adds-actively-exploited-linux-root.html"
published_at: "2026-05-01T10:00:00Z"
category: "Vulnerability/CVE"
key_points:
  - "CVE-2026-31431 is a logic flaw in the Linux kernel's algif_aead module (AF_ALG userspace crypto API) that allows a 4-byte controlled write into the page cache of any readable file. CVSS 7.8 but exploitation is deterministic — a 732-byte Python script achieves root by editing a setuid binary. No race condition, no write-position constraints."
  - "CISA added CVE-2026-31431 to the Known Exploited Vulnerabilities catalog on May 1, 2026, with a federal remediation deadline of May 15. Microsoft, CERT-EU (advisory 2026-005), Tenable, Bugcrowd, and Sysdig have all published detailed analyses. Multiple threat intelligence firms confirm active attacks against U.S. think tanks, European manufacturing companies, and cloud service providers."
  - "Attackers are chaining Copy Fail with remote code execution vulnerabilities in web applications and VPN appliances to gain initial local access, then escalating to root for ransomware deployment and data exfiltration. The deterministic nature of the exploit makes it a reliable post-exploitation primitive across all Linux environments."
  - "Defender actions: (1) Apply kernel patches from your distribution vendor immediately — Ubuntu, RHEL, SUSE, and Amazon Linux all have fixes available. (2) Reboot after patching to load the new kernel. (3) Prioritize internet-facing Linux hosts where chaining with a web RCE is most likely. (4) Audit for unauthorized privilege escalation in system logs dating back to late April. (5) For containerized environments, update the host kernel — container isolation does not prevent exploitation."
  - "Every mainstream Linux distribution shipping a kernel built since 2017 is affected. Microsoft estimates millions of Kubernetes clusters and cloud Linux workloads are vulnerable. The flaw was discovered by researchers at Xint.io and Theori. With a public PoC, confirmed active exploitation, and 11 days until the CISA KEV deadline, this is the highest-priority patch for any organization running Linux."
notes: "REPLACE on 2026-05-04 morning. Previous lead was CVE-2026-41940 (cPanel auth bypass) — CISA KEV deadline passed yesterday May 3, story was 4 days old, urgency shifted to incident response. 'Sorry' ransomware mass-exploitation of cPanel is still developing but the preventive window has closed. Copy Fail (CVE-2026-31431) is the clear replacement: CISA KEV deadline May 15 still 11 days out, confirmed active exploitation chained with RCE for ransomware, deterministic root on every Linux distro since 2017, massive blast radius across cloud and on-prem. Advisories from Microsoft, CISA, CERT-EU, Tenable, Sysdig, Bugcrowd. cPanel moves to daily briefing."
