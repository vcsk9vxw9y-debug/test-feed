title: "Verizon DBIR 2026: Vulnerability Exploitation Overtakes Stolen Credentials as #1 Breach Entry Point for First Time in 19 Years — 31% of Breaches via Unpatched Flaws, Supply Chain Up 60%, Only 26% of CISA KEVs Remediated, Median Patch Window Now 43 Days"
summary: "The Verizon 2026 Data Breach Investigations Report — the 19th annual edition, covering 22,000+ confirmed breaches from November 2024 through October 2025 — delivers a landmark structural finding: exploiting software vulnerabilities has surpassed stolen credentials as the single most common breach entry point for the FIRST TIME in the DBIR's 19-year history. Vulnerability exploitation now accounts for 31% of breaches; credential abuse has fallen to 13%. The structural driver is AI: generative AI tools are collapsing the window between public CVE disclosure and mass exploitation from months to hours, past the point where most organizations' patch cadence can respond. The remediation crisis is quantified: only 26% of CISA Known Exploited Vulnerabilities were fully remediated in 2025 — down from 38% in 2024, a 31% year-over-year decline in coverage even as the KEV catalog grows — while the median time to full patching rose to 43 days (up from 32 in 2024). This 43-day median patch window directly frames the active KEV deadlines now expiring: Drupal CVE-2026-9082 May 27 (T-2 days), PAN-OS CVE-2026-0300 May 28 (T-3 days), Exchange CVE-2026-42897 May 29 (T-4 days) — all inside the window where average organizations remain exposed. The supply chain finding is the most alarming escalation: third-party breaches surged 60% year-over-year and now appear in 48% of all confirmed breaches — the statistical backbone behind the ongoing Mini Shai-Hulud supply chain campaign (Day 3, 1,055 compromised package versions across 502 npm/PyPI packages, toolkit publicly circulating). Additional headline data: ransomware involved in 48% of breaches; mobile social engineering success rate up 40%; shadow AI (unapproved AI tools) in use at 45% of employees — tripled in one year — creating a fast-growing unmanaged data leakage channel; AI bot traffic up 21% month-over-month; human element in 62% of breaches. The DBIR's primary defender takeaway: patching velocity is the new top risk lever — it now determines breach probability more than any other single controllable variable, and the historic shift in #1 breach vector from credentials to vulnerabilities means security programs must re-weight patch prioritization above MFA enrollment in the risk register."
