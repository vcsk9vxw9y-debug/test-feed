title: "Laravel-Lang Supply Chain Breach: 700+ GitHub Repos Poisoned with RCE Credential Stealer — Rotate Cloud Keys, CI/CD Secrets, and SSH Keys If composer install Ran After May 22"
summary: "A threat actor with push access to the Laravel-Lang GitHub organization rewrote every git tag across multiple popular Composer packages within a 15-minute window on May 22, 2026, injecting a remote code execution backdoor into 233 package versions across 700+ repositories. The attack exploits a GitHub mechanism that allows version tags to point to commits from attacker-controlled forks — meaning the malicious code was never committed to the official repos, but was silently executed via Composer's autoloader on any `composer install` or `composer update` that resolved an affected tag. The payload is a ~5,900-line PHP credential stealer organized into 15 specialist collection modules: it targets AWS/GCP/Azure/DigitalOcean access keys, Kubernetes profiles and service account tokens, HashiCorp Vault secrets, Docker registry tokens, CI/CD environment variables (GitHub Actions, GitLab CI, CircleCI, Jenkins), SSH private keys, Git credentials, shell history, browser saved passwords, cryptocurrency wallet files, and password manager databases — encrypts the harvest with AES-256, exfiltrates it to attacker-controlled infrastructure, and then self-deletes to hinder forensic detection. Affected packages include laravel-lang/lang (7.8k GitHub stars), laravel-lang/http-statuses, laravel-lang/attributes, and laravel-lang/actions — widely used third-party localization libraries in the Laravel ecosystem. Packagist de-listed the malicious versions immediately, but any environment that ran `composer install` between May 22 and the takedown must be treated as fully compromised: all secrets accessible from that build environment should be rotated now."
