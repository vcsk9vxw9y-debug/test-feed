# Notable Orgs — canonical org list for the SaaS Breach spotlight roster.
#
# Each entry represents one breached org. The roster on /category/saas-breach
# is built by walking this file in order and counting matching articles in
# the DB via the `aliases` arrays.
#
# Schema (every field required unless marked optional):
#   canonical     : Display name for the row. Single source of truth.
#   platform      : Short label rendered in the row's platform pill (e.g. "Canvas LMS").
#   sector        : Tag rendered on the row (e.g. "education", "devtools").
#   aliases       : List of substrings to match against article title + summary.
#                   Case-insensitive. Match if ANY alias appears.
#   actor         : Threat actor / cluster the breach is attributed to.
#                   Use "Unattributed" if unknown.
#   actor_cluster : One of: shiny, teampcp, qilin, lapsus, unattrib. Drives
#                   the actor-pill swatch color in the template.
#   exposure_value: Display value shown in the roster row (e.g. "275M", "500K+", "codebase").
#   exposure_unit : Short label under the value (e.g. "records", "salesforce records").
#   severity      : critical | high | medium. Drives the rail color.
#   fresh         : true if the incident is within 24h of the most recent article.
#                   The template uses this to render the pulsing coral tick.
#   published_at  : ISO 8601 date of the headline incident.
#   appears_on    : List of category-spotlight slugs this org appears on.
#                   Crossover handling is option B (inclusive) — orgs hit by
#                   ransomware actors whose breach involved SaaS data appear on
#                   BOTH saas-breach AND ransomware spotlights. Topline stats
#                   dedupe on canonical name so no double-counting.
#   notes         : Optional. Operator-only context, not rendered on the page.

- canonical: "Instructure"
  platform: "Canvas LMS"
  sector: "education"
  aliases:
    - "instructure"
    - "canvas lms"
    - "canvas breach"
    - "canvas instructure"
    - "instructure breach"
    - "canvas dump"
  actor: "ShinyHunters"
  actor_cluster: "shiny"
  exposure_value: "275M"
  exposure_unit: "records"
  severity: "critical"
  fresh: true
  published_at: "2026-05-18"
  appears_on:
    - "saas-breach"
  notes: "Largest education-sector SaaS breach of 2026. Identity-infrastructure-grade — Canvas is the LMS for 8,809 K-12 + higher-ed tenants."

