# Notable CVEs — curated CVE list for the Vulnerability/CVE spotlight roster.
#
# The roster is populated by walking this file and matching against the
# article DB via the `aliases` arrays (case-insensitive substring).
#
# Schema (every field required unless marked optional):
#   id              : CVE ID, e.g. "CVE-2026-41091"
#   vendor          : Vendor + product display string ("Microsoft Defender")
#   product         : More specific product line ("Malware Protection Engine")
#   affected        : Affected version range, free text
#   patched_in      : Target version a defender should patch to
#   cvss            : CVSS v3.1 base score (number)
#   cvss_vector     : Vector string ("AV:L/AC:L/PR:L/UI:N")
#   cwe             : Optional CWE identifier ("CWE-59")
#   summary         : One-sentence defender summary
#   status          : actively_exploited | kev_observed | poc_pending
#                     Drives the right-side status pill + tier grouping.
#   kev_listed      : bool — true if on CISA KEV catalog
#   kev_added       : ISO date the CVE was added to KEV (or empty if not)
#   kev_deadline    : ISO date of the KEV federal remediation deadline
#                     (or empty if not on KEV)
#   disclosed       : ISO date of public disclosure
#   patch_state     : shipped | mitigation | unfixed
#                     Drives the colored dot on the patch chip.
#   actor           : Threat actor attribution; "Unattributed" if unknown
#   tags            : Optional list of small chips for the row
#   aliases         : List of substrings used to match articles for this CVE
#   appears_on      : List of spotlight slugs this CVE appears on
#                     (currently always ["vulnerability"]).
#   notes           : Optional operator-only comment, not rendered

