  - severity: "critical"
    title: "Nx Console VS Code extension compromise (nrwl.angular-console 18.95.0) — credential stealer hit 2.2M-install ecosystem"
    description: "On May 18 a malicious nrwl.angular-console v18.95.0 was published to the VS Code Marketplace and went live for ~11 minutes (14:36-14:47 CEST). It fetched a 498 KB payload from a dangling orphan commit in nrwl/nx and harvested GitHub, npm, AWS, HashiCorp Vault, Kubernetes, and 1Password secrets across HTTPS, GitHub API, and DNS tunneling — plus a persistent Python backdoor on macOS using GitHub Search as a dead-drop."
    action: "Audit VS Code extension install logs for nrwl.angular-console 18.95.0 between 14:36 and 14:47 CEST on May 18. If installed, treat the developer's workstation as compromised: rotate every token in their keychain (GitHub, npm, AWS, Vault, kube creds, 1Password), revoke OIDC-issued publish tokens, scrub Python launchd/cron entries on macOS, and rebuild from clean image. Pin VS Code extensions and constrain auto-update for developer fleets."
  - severity: "critical"
    title: "NGINX Rift CVE-2026-42945 — Day 8, exploitation continuing against ~5.7M exposed servers"
    description: "Censys still counts roughly 5.7M internet-exposed nginx servers running vulnerable versions; VulnCheck-confirmed exploitation since May 16 is ongoing per Help Net Security, SecurityWeek, and Security Affairs reporting through May 18-19. Unauthenticated RCE via single HTTP request when rewrite uses unnamed PCRE captures + ? in replacement."
    action: "Upgrade nginx to 1.30.1 (stable) or 1.31.0 (mainline), or nginx Plus to R32 P6 / R36 P4. Audit rewrite configs for the unnamed-PCRE-capture + ? pattern; swap to named captures as a stopgap. Inventory all nginx instances including containers, ingress controllers, and CDN edges. If unpatched at any point, hunt access logs for crafted requests with +, %, or & in encoded paths."
  - severity: "critical"
    title: "Exchange Server CVE-2026-42897 — XSS/spoofing, KEV deadline T-9 days, still no permanent patch"
    description: "Actively exploited via crafted emails targeting OWA. CISA KEV-listed May 15 with federal deadline May 29. Affects Exchange 2016, 2019, and Subscription Edition. Microsoft only offers EEMS/EOMT mitigations; new gap reporting May 19 confirms mitigation is not airtight."
    action: "Apply EEMS/EOMT mitigations on every on-prem Exchange host and verify mitigation modules are enabled. Restrict OWA exposure to authenticated VPN where feasible. Hunt OWA logs for crafted-email payloads and abnormal script execution in mailbox sessions."
  - severity: "high"
    title: "Fox Tempest malware-signing-as-a-service disrupted by Microsoft"
    description: "Microsoft seized infrastructure and revoked 1000+ short-lived (≤72h) code-signing certificates from a Microsoft Artifact Signing abuse ring active since May 2025. The certificates signed binaries spoofing Microsoft Teams, AnyDesk, PuTTY, and Webex, used by Rhysida, Inc, Qilin, and Akira ransomware affiliates."
    action: "Add the revoked certificate thumbprints to EDR blocklists when Microsoft publishes IOCs. Hunt back 12 months for binaries signed by certificates issued through Azure Artifact Signing service tenants. Treat code-signing trust as an additional signal, not a verdict — enforce binary allowlisting and behavioral detection regardless of signing status."
