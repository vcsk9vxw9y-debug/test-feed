    description: "MuddyWater (MOIS-linked, Iranian state actor) executed a broad espionage campaign in Q1 2026 targeting at least nine organizations across nine countries spanning industrial/electronics manufacturing, education, public sector, financial services, and professional services. DLL side-loading used legitimately signed Fortemedia (fmapp.exe) and SentinelOne (sentinelmemoryscanner.exe) binaries to execute malicious DLLs while masquerading as benign software. Victims include a major South Korean electronics manufacturer (week-long dwell, Feb 2026), an international airport in the Middle East, Southeast Asian industrial manufacturers, and a Latin American financial-services provider. Separate exfiltration campaign linked to same actor targeting US, Israel, Saudi Arabia, Turkey (late March – early April 2026)."

