    mitre_id: "T1195.001"
    description: "Threat actors exploit GitHub fork-tag mechanism to rewrite version tags across multiple packages simultaneously, injecting credential-stealing RCE payloads that auto-execute via package manager autoloaders. Laravel-Lang (May 22: 700+ repos, 233 versions, 15-module PHP credential stealer) and TeamPCP GitHub internal breach via poisoned Nx Console VS Code extension (May 18) are confirmed instances of this coordinated technique."

  - name: "Hosting Server Root Escalation via Incorrect Privilege Assignment (LiteSpeed CVE-2026-48172)"
    mitre_id: "T1068"
