trending_techniques:
  - name: "OIDC Token Hijack for Cross-Registry Package Self-Propagation (Mini Shai-Hulud, TeamPCP)"
    mitre_id: "T1195.001"
    description: "Mini Shai-Hulud steals OpenID Connect tokens from CI/CD pipeline secrets during malicious package execution, then immediately uses the tokens to authenticate to PyPI and npm as the legitimate maintainer and publish backdoored versions of packages the infected pipeline has write permissions on. This creates a self-replicating supply chain worm that achieves exponential spread across the ecosystem with no further attacker involvement after initial seeding — and defeats SLSA Build Level 3 attestations by tampering with source rather than build artifacts."
  - name: "Bulk CI/CD Workflow Backdooring via Mass Automated Repository Commits (Megalodon)"
    mitre_id: "T1072"
    description: "Megalodon (TeamPCP, May 18) pushed 5,718 commits to 5,561 distinct GitHub repositories in 6 hours using four rotating author names (build-bot, auto-ci, ci-bot, pipeline-bot) mimicking routine CI maintenance. Two payload variants: SysDiag adds a workflow triggered on every push/PR for maximum execution frequency; Optimize-Build replaces existing workflows with workflow_dispatch triggers creating dormant backdoors fireable via GitHub API on demand. Result: 449 GB of secrets exfiltrated as of May 21 (575,352 files), with the dormant backdoor variant maintaining persistent access to repositories that have since patched the active variant."
  - name: "Open-Source Package Tag Poisoning via Repository Fork Hijack (Laravel-Lang / TeamPCP Wave)"
    mitre_id: "T1195.001"
    description: "Threat actors compromise maintainer accounts or exploit GitHub's fork-tag mechanism to rewrite version tags across multiple packages simultaneously, injecting credential-stealing RCE payloads that auto-execute via package manager autoloaders (Composer, npm, pip). Laravel-Lang (May 22: 700+ repos, 233 versions, 15-module PHP credential stealer targeting cloud keys/Kubernetes/CI/CD secrets) and the TeamPCP GitHub internal breach via poisoned Nx Console VS Code extension (May 18: 3,800 GitHub internal repos exfiltrated) are confirmed instances of the same coordinated supply chain campaign. The fork-tag hijack technique requires no direct commit access — only the ability to create tags pointing to fork commits."
  - name: "AI Platform Initial Access via Unauthenticated RCE (Langflow, MuddyWater)"
    mitre_id: "T1190"
    description: "MuddyWater (Iranian state actor) exploiting CVE-2025-34291 in Langflow AI builder since January 23, 2026 — CVSS 9.4, no authentication, CORS/CSRF/code-execution-endpoint triple weakness. State actors are now treating AI workflow platforms as a new initial-access surface equivalent to VPN/firewall appliances. Flodric botnet also deployed via this vector."
  - name: "Security Tool as Malware Delivery Platform (Apex One CVE-2026-34926)"
    mitre_id: "T1072"
    description: "CVE-2026-34926 in Trend Micro Apex One enables attackers to modify the server key table and push malicious payloads to all connected endpoint agents through the legitimate security product update channel — bypassing behavioral and AV controls by design. The security product update mechanism becomes a trusted malware delivery vehicle."
  - name: "AV Engine Link-Following Privilege Escalation (Defender CWE-59)"
    mitre_id: "T1068"
    description: "CVE-2026-41091 — CWE-59 symlink/junction race in Microsoft Malware Protection Engine running as SYSTEM. Local low-privilege attacker redirects engine file writes into protected system directories. Exploitation confirmed by RedSun and UnDefend campaigns. Unpatched Defender simultaneously enables LPE and removes AV coverage — the security tool's presence becomes a liability."
  - name: "Email-Borne XSS for Browser Session Hijack (Exchange OWA CVE-2026-42897)"
    mitre_id: "T1566.001"
    description: "CVE-2026-42897 — crafted email triggers reflected XSS in Exchange OWA, executing arbitrary JavaScript in victim's browser context. Active exploitation confirmed; CISA KEV deadline May 29 (T-6 days). No permanent patch; EEMS/EOMT mitigation gaps confirmed May 19. Effective against any organization running on-premises Exchange without OWA restricted to VPN/zero-trust."
  - name: "Web Infrastructure RCE via PCRE Heap Overflow (NGINX Rift, Day 12)"
    mitre_id: "T1190"
    description: "CVE-2026-42945 NGINX Rift — Day 12 of exploitation against approximately 5.7 million vulnerable internet-exposed nginx servers. Single unauthenticated HTTP request triggers heap buffer overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. Multiple threat actors using public PoC. Chained with Linux kernel LPE (Copy Fail CVE-2026-31431, Dirty Frag family) for full root compromise."
  - name: "Network Infrastructure Takeover via CVSS 10.0 Authentication Bypass (Cisco SD-WAN, UAT-8616)"
    mitre_id: "T1190"
    description: "CVE-2026-20182 — CVSS 10.0 authentication bypass in Cisco Catalyst SD-WAN vdaemon DTLS peering; attacker spoofs vHub device identity to gain trusted control-plane peer status. Sixth Cisco SD-WAN zero-day exploited in 2026. UAT-8616 (highly sophisticated, overlaps with monitored ORB networks, targets critical infrastructure) uses post-exploitation for SSH key injection, NETCONF manipulation, root LPE via CVE-2022-20775 software version downgrade, and log clearing."
  - name: "State-Sponsored Perimeter Exploitation with Multi-Week Dwell (PAN-OS CL-STA-1132)"
    mitre_id: "T1190"
    description: "CL-STA-1132 (China-nexus) exploiting CVE-2026-0300 in PAN-OS since April 9 — 45-day ongoing campaign, patch window closes May 28 (T-5 days). State actor playbook: exploit perimeter appliance, maintain persistence through patch window, exfiltrate during dwell period. Organizations with unpatched PAN-OS should assume persistent access and lateral movement have occurred."

active_campaigns:
  - actor: "TeamPCP (UNC6780) — Mini Shai-Hulud worm expansion wave"
    targets: "Any CI/CD pipeline (GitHub Actions, GitLab CI, CircleCI) running pip install or npm install with any package that has OIDC-token-based publish permissions; Python and JavaScript package maintainers across PyPI and npm"
    technique: "Mini Shai-Hulud (CVE-2026-45321) self-replicating worm actively expanding May 23. OIDC token hijack propagation: worm steals CI/CD OIDC tokens, uses them to publish backdoored versions of packages the infected pipeline can write to. Confirmed poisoned: TanStack namespace (42 npm packages), mistralai, guardrails-ai, durabletask, LiteLLM, Telnyx SDK, Bitwarden CLI, Aqua Trivy, Checkmarx KICS, UiPath Python SDK, OpenSearch Python client. Payload: AWS IAM credentials, Vault secrets, GitHub tokens, all CI env vars exfiltrated to C2. First malware to defeat SLSA Build Level 3 attestations."
  - actor: "TeamPCP (UNC6780) — Megalodon CI/CD backdoor campaign"
    targets: "Public and private GitHub repositories with GitHub Actions workflows; any organization using GitHub-hosted CI/CD runners"
    technique: "Megalodon (May 18): 5,718 commits to 5,561 distinct GitHub repos in 6 hours using rotating CI-maintenance author names. Two payload variants: SysDiag (active — exfiltrates CI secrets on every push/PR; 449 GB stolen, 575K files as of May 21) and Optimize-Build (dormant — workflow_dispatch backdoor fireable via GitHub API on demand). Ingest server at 216.126.225.129:8443. Dormant backdoors persist in repos that removed the active variant without auditing all workflow files."
  - actor: "Unknown (Laravel-Lang supply chain operators, linked to TeamPCP cascade)"
    targets: "Laravel PHP applications using laravel-lang/lang, /http-statuses, /attributes, /actions; any CI/CD environment with access to cloud credentials, Kubernetes tokens, Vault secrets, SSH keys, or browser-stored passwords"
    technique: "GitHub fork-tag hijack in the laravel-lang organization (May 22): rewrote 233 package version tags to point to malicious fork commits containing src/helpers.php credential stealer. Auto-executed via Composer autoloader on any composer install or update. 15-module, approximately 5,900-line payload exfiltrates cloud keys (AWS/GCP/Azure/DO), Kubernetes tokens, Vault secrets, CI/CD vars, SSH keys, Git creds, shell history, browser passwords — AES-256 encrypted, then self-deletes."
  - actor: "UAT-8616 (highly sophisticated, infrastructure overlap with ORB networks, targets critical infrastructure)"
