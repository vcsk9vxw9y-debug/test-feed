landscape_summary: "AM May 30 — CVE-2026-41089 Windows Netlogon (CVSS 9.8) active exploitation enters Day 19 with functional public exploit completing in under 3 seconds and minimal forensic artifacts; apply KB5087539 and equivalents to all domain controllers now, segment DCs onto isolated VLANs, and block Netlogon RPC at perimeter — no confirmed mass cross-org worm propagation as of this run but ongoing active exploitation is confirmed. CVE-2026-0257 PAN-OS GlobalProtect authentication bypass joined the CISA KEV catalog May 29 with a June 1 federal deadline (T-2 days) — Rapid7 confirmed active exploitation across numerous organizations in two waves since May 17, forging auth-override cookies to establish unauthorized VPN tunnels; patch immediately to PAN-OS 12.1.7/11.2.12/11.1.15/10.2.18-h6 and dedicate a certificate exclusively to the auth-override feature separate from the HTTPS portal service. Exchange CVE-2026-42897 CISA KEV deadline expired yesterday (Day 1 post-deadline, OWA restriction mandatory, no permanent patch), TrapDoor supply chain AI-assistant poisoning enters Day 12 (384+ malicious package versions, CLAUDE.md remains an active attack surface), and Langflow CVE-2025-34291 plus Apex One CVE-2026-34926 (June 4 T-5) and Defender CVE-2026-41091 (June 3 T-4) define the next expiring CISA KEV deadlines for Aegis maintenance prioritization."
