trending_techniques:
  - name: "Open-Source Package Tag Poisoning via Repository Fork Hijack (Laravel-Lang / TeamPCP Wave)"
    mitre_id: "T1195.001"
    description: "Threat actors compromise maintainer accounts or exploit GitHub's fork-tag mechanism to rewrite version tags across multiple packages simultaneously, injecting credential-stealing RCE payloads that auto-execute via package manager autoloaders (Composer, npm, pip). Laravel-Lang (May 22: 700+ repos, 233 versions, 15-module credential stealer targeting cloud keys/Kubernetes/CI-CD secrets) and the TeamPCP GitHub internal breach via poisoned Nx Console VS Code extension (May 18: 3,800 GitHub internal repos exfiltrated) are confirmed instances of the same coordinated supply chain campaign rooted in the TanStack supply chain compromise. The fork-tag hijack technique requires no direct commit access to the target repo — only the ability to create tags pointing to fork commits."
  - name: "AI Platform Initial Access via Unauthenticated RCE (Langflow)"
    mitre_id: "T1190"
    description: "MuddyWater (Iranian state actor) exploiting CVE-2025-34291 in Langflow AI builder since January 23, 2026 — CVSS 9.4, no authentication, CORS/CSRF/code-execution-endpoint triple weakness. State actors are now treating AI workflow platforms as a new initial-access surface equivalent to VPN/firewall appliances. Flodric botnet also deployed via this vector."
  - name: "Security Tool as Malware Delivery Platform (Apex One Compromise)"
    mitre_id: "T1072"
    description: "CVE-2026-34926 in Trend Micro Apex One enables attackers to modify the server key table and push malicious payloads to all connected endpoint agents through the legitimate security product update channel — a software deployment tool abuse pattern that bypasses behavioral and AV controls on agent hosts by design. Security product weaponized as malware delivery mechanism."
  - name: "Network Infrastructure Takeover via Triple Unauthenticated CVSS 10.0 (UniFi OS)"
    mitre_id: "T1190"
    description: "Three CVSS 10.0 flaws in Ubiquiti UniFi OS (CVE-2026-34908/09/10) allow unauthenticated remote attackers to make unauthorized system changes, read arbitrary files, and execute arbitrary commands on UCG/UDM/UNVR/UNAS devices. No exploit-in-the-wild confirmation yet, but attack surface is ~100K internet-exposed endpoints with zero authentication barrier and low complexity."
  - name: "AV Engine Link-Following Privilege Escalation (Defender CWE-59)"
    mitre_id: "T1068"
    description: "CVE-2026-41091 — CWE-59 symlink/junction race in Microsoft Malware Protection Engine running as SYSTEM. Local low-privilege attacker redirects engine file writes into protected system directories. Exploitation confirmed (RedSun/UnDefend campaigns). Uniquely high impact: unpatched Defender simultaneously enables LPE and removes AV coverage — the security tool's presence becomes a liability."
  - name: "Email-Borne XSS for Browser Session Hijack (Exchange OWA)"
    mitre_id: "T1566.001"
    description: "CVE-2026-42897 — crafted email triggers reflected XSS in Exchange OWA, executing arbitrary JavaScript in victim's browser context. Active exploitation confirmed; CISA KEV deadline May 29 (T-6 days). No permanent patch; EEMS/EOMT mitigation gaps confirmed May 19. Effective against any organization running on-premises Exchange without OWA restricted to VPN/zero-trust."
  - name: "Web Infrastructure RCE via PCRE Heap Overflow (NGINX Rift, Day 11)"
    mitre_id: "T1190"
    description: "CVE-2026-42945 NGINX Rift — Day 11 of exploitation against ~5.7M vulnerable internet-exposed nginx servers. Single unauthenticated HTTP request triggers heap buffer overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. Multiple threat actors, public PoC. Chained with Linux kernel LPE (Copy Fail CVE-2026-31431, Dirty Frag family) for full root compromise."
  - name: "State-Sponsored Perimeter Exploitation with Multi-Week Dwell (PAN-OS)"
    mitre_id: "T1190"
    description: "CL-STA-1132 (China-nexus) exploiting CVE-2026-0300 in PAN-OS since April 9 — 45-day ongoing campaign, patch window closes May 28 (T-5 days). State actor playbook: exploit perimeter appliance, maintain persistence through patch window, exfiltrate during dwell period. Organizations with unpatched PAN-OS should assume persistent access and lateral movement have occurred."

