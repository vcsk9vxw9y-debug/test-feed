stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Day 2. Self-replicating worm (TeamPCP / UNC6780) campaign now confirmed at 1,055 compromised versions across 502 unique packages (npm, PyPI, Composer). 25,000+ GitHub repositories have had credentials leaked; TeamPCP created 2,500+ malicious repos using exfiltrated tokens. CRITICAL OVERNIGHT ESCALATION: TeamPCP open-sourced the full toolkit (CI cache-poisoning scripts, OIDC token extractor, credential stealer + propagation logic) to BreachForums supply chain attack contest — copycat attacks from independent actors are now expected. None of our direct requirements.txt dependencies are on the confirmed 502-package poisoned list as of May 24 AM, but the worm is in active expansion and the open-sourced toolkit means new actors will attempt to extend the package list. POSTURE ACTIONS: (1) Implement pip install --require-hashes via pip-tools NOW — this is the single highest-leverage defensive action; (2) Audit all Railway/GitHub Actions CI workflows for unexpected package-publish permissions; (3) Rotate all GitHub OIDC tokens in deployment pipelines; (4) Add runtime egress monitoring to CI pipelines for unexpected network connections during pip/npm install; (5) Search GitHub for Dune-universe-named repos created since May 11 using any of your tokens."
  - id: "CVE-2026-48172"
    package: "litespeed user-end cpanel plugin (web hosting infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "NEW — CVSS 10.0. CISA KEV listed. Incorrect privilege assignment in LiteSpeed User-End cPanel Plugin (versions 2.3–2.4.4) allows any cPanel user to execute arbitrary scripts as root via a single malformed API call targeting lsws.redisAble. No race condition or authentication bypass required — exploitation is trivially simple. Public disclosure May 21; immediately weaponized. A previously unknown state-linked threat actor confirmed targeting government and military entities in Southeast Asia (Philippines, Laos) and MSPs/hosting providers in Canada, South Africa, and the US. Upgrade to WHM Plugin 5.3.1.0 (bundled with cPanel plugin 2.4.7+) immediately, or uninstall the user-end plugin as emergency mitigation: /usr/local/lsws/admin/misc/lscmctl cpanelplugin --uninstall. Not in our direct stack (we run Flask on Railway, not cPanel/LiteSpeed), but directly relevant to any shared hosting or MSP infrastructure in the environment."
  - id: "CVE-2026-20182"
    package: "cisco catalyst sd-wan controller and sd-wan manager (network infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "CVSS 10.0. Authentication bypass via vdaemon DTLS peering (UDP 12346): attacker claims vHub device identity, device-type certificate verification skipped, peer authenticated as trusted control-plane node. Sixth actively exploited SD-WAN zero-day in 2026. UAT-8616 (highly sophisticated, ORB network overlap, critical infrastructure targeting) confirmed exploiting. Post-exploitation: SSH key injection, NETCONF manipulation, root LPE via CVE-2022-20775 software version downgrade, log clearing. Patch per cisco-sa-sdwan-rpa2-v69WY2SW. Hunt /var/log/auth.log for Accepted publickey from unauthorized IPs; review control-connection peering events. If SD-WAN is in network path: patch immediately and treat unpatched period as potential UAT-8616 compromise."
  - id: "CVE-2026-9082"
    package: "drupal core (cms — not in our stack, CISA KEV T-3 days)"
    severity: "critical"
    in_requirements: false
    action: "CISA KEV May 22, federal deadline May 27 — T-3 DAYS. Unauthenticated SQL injection in Drupal Core PostgreSQL EntityQuery condition handler (CVSS 6.5). Allows unauthenticated data exfiltration, modification, privilege escalation, and in some configs RCE. Affects Drupal 8.0 through 11.3.9 on PostgreSQL backends only (MySQL/MariaDB/SQLite not affected). 15,000+ exploitation attempts across 65 countries targeting gaming and financial services. PoC scanner on GitHub since May 22 accelerates exploitation. Patch to 11.3.10 / 10.6.9 / 10.5.10 / 10.4.10 immediately. Not in our stack but flag to any partner orgs running PostgreSQL-backed Drupal — federal deadline T-3 days."
