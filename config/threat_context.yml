stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Day 4. Campaign sustained at 1,055 compromised versions across 502 packages (npm: 1,048, PyPI: 6, Composer: 1). 25,000+ GitHub repos credential-leaked; 2,500+ malicious repos created using exfiltrated tokens. Full toolkit (CI cache-poisoning scripts, OIDC token extractor, credential stealer + propagation logic) publicly circulating for 14 days (GitHub May 12, BreachForums repost May 24 with active $1,000 copycat competition). Copycat actors are fully operational — multi-actor threat, not just original TeamPCP. None of our direct requirements.txt packages are on the confirmed 502-package poisoned list as of May 26 PM, but multi-actor expansion means new waves are not telegraphed in advance. POSTURE ACTIONS: (1) Implement pip install --require-hashes via pip-tools NOW — single highest-leverage defensive action; (2) Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; (3) Rotate all GitHub OIDC tokens in deployment pipelines; (4) Add runtime egress monitoring to CI pipelines during pip/npm install; (5) Search GitHub for Dune-universe-named repos created since May 11 using any of your tokens."

  - id: "CVE-2026-27205"
    package: "flask (web framework — in requirements.txt)"
    severity: "medium"
    in_requirements: true
    action: "Flask information disclosure via missing Vary: Cookie header when session accessed with 'in' operator. AFFECTS FLASK <= 3.1.2 ONLY. Our pinned flask==3.1.3 is CONFIRMED PATCHED — no upgrade needed. Verify deployment is running 3.1.3 and not an older cached Railway image layer. If any caching proxy (CDN, nginx proxy_cache, Varnish) sits upstream of Flask, verify Vary: Cookie is correctly set on all session-bearing responses."

  - id: "CVE-2026-42945"
    package: "nginx (web infrastructure — Railway reverse proxy layer)"
    severity: "critical"
    in_requirements: false
    action: "NGINX Rift — Day 15 of exploitation (up from Day 14). Heap overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. CVSS 9.2 unauthenticated RCE via single HTTP request. Censys: ~5.7M exposed vulnerable nginx servers. Upgrade to nginx 1.30.1 / 1.31.0 or nginx Plus R32 P6 / R36 P4. Verify Railway deployment nginx version. Replace unnamed PCRE captures with named captures in all rewrite configs as stopgap. Chain: NGINX Rift + Copy Fail/Dirty Frag + ssh-keysign-pwn (CVE-2026-46333) = full root compromise with SSH key exfiltration. Active chaining with Linux kernel LPEs ongoing."

  - id: "CVE-2026-31431"
    package: "linux-kernel (host OS — Railway infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "Copy Fail — actively exploited, chained with web RCE for ransomware. KEV deadline PASSED May 15. Distro patches available for kernel >= 6.18.22 / >= 6.19.12 / 7.0. Apply and reboot. Verify Railway host kernel version is patched. Blacklist AF_ALG socket family on non-crypto hosts as mitigation. Urgency remains — active exploitation and active chaining with NGINX Rift Day 15 ongoing. See also CVE-2026-46333 (ssh-keysign-pwn) as an additional local-to-root path now with public working exploits."

  - id: "CVE-2026-43284"
    package: "linux-kernel esp4/esp6 (host OS — Railway infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "Dirty Frag ESP — confirmed actively exploited. Distro patches available. Blacklist esp4 and esp6 kernel modules on all self-managed infrastructure. Verify Railway platform patching status. Chained with NGINX Rift (Day 15) in active RCE -> root exploit chains."

  - id: "CVE-2026-46333"
    package: "linux-kernel ptrace (host OS — Railway infrastructure, all major Linux distros)"
    severity: "high"
    in_requirements: false
    action: "ssh-keysign-pwn — nine-year-old ptrace race condition (present since Linux v4.10, November 2016). Disclosed by Qualys May 20, 2026; four working public exploits now circulating covering chage, ssh-keysign, pkexec, and accounts-daemon attack paths. Any unprivileged shell on a vulnerable host can read /etc/shadow, exfiltrate SSH host private keys, or execute commands as root. Affects default Debian, Ubuntu, Fedora installs. Upstream patches and distro updates available. This extends the NGINX Rift kill chain: RCE via nginx → local shell → ssh-keysign-pwn → root + SSH key theft. Verify Railway host kernel is patched. Patch immediately on all self-managed Linux infrastructure."

  - id: "CVE-2026-9082"
    package: "drupal core (cms — not in our stack, CISA KEV T-1 DAY)"
    severity: "critical"
    in_requirements: false
    action: "CISA KEV May 27 deadline — T-1 DAY, EXPIRES TOMORROW. Unauthenticated SQL injection in Drupal Core PostgreSQL EntityQuery (CVSS 6.5). 15,000+ exploitation attempts across 65 countries. PoC scanner public since May 22; attack volume actively accelerating today. Patch to 11.3.10 / 10.6.9 / 10.5.10 / 10.4.10 immediately. Not in our stack — flag to any partner orgs running PostgreSQL-backed Drupal. Deadline is tomorrow — contact them now."

