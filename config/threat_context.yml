stack_intersection:
  - alert: "TrapDoor (T1195.001 + T1204.002) — CRITICAL STACK THREAT. Our CLAUDE.md file is a direct attack surface for TrapDoor's AI assistant poisoning technique. TrapDoor plants hidden instructions using zero-width Unicode characters invisible to human reviewers but read and executed by Claude Code. Confirmed link to CWE-78 in Claude Code CLI (Phoenix Security April 2026). IMMEDIATE ACTIONS: (1) grep -P '[\x{200B}\x{200C}\x{200D}\x{FEFF}]' CLAUDE.md — any hit is a TrapDoor IOC; (2) Review all open PRs since May 22 for poisoned AI config files; (3) Inspect .git/hooks/ for unexpected scripts; (4) Verify all pip installs since May 22 were hash-verified. INDEPENDENT of Glassworm and Mini Shai-Hulud remediations."

  - alert: "Gitea CVE-2026-27771 (NEW LATE PM) — DEVELOPER INFRASTRUCTURE ALERT. Any developer or CI/CD pipeline pulling container images from a self-hosted Gitea instance running < 1.26.2 may have had private images exfiltrated without authentication or access log trace. Gitea is not in requirements.txt — no action on the Flask app itself. Operator action: (1) Upgrade any Gitea instances to 1.26.2; (2) Audit container registry access logs for unauthenticated pulls back to May 2022; (3) Rotate all secrets, API keys, or configuration values embedded in private container images; (4) If using Gitea for source code alongside container registry, treat source as also potentially accessed — code in private repos may have been read by unauthenticated attackers for the past 4 years. Discovered by autonomous AI pentesting agent — signals AI-accelerated vulnerability discovery against developer infrastructure."

  - alert: "Silent Ransom Group physical USB intrusion (NEW LATE PM, T1052.001) — PHYSICAL SECURITY ALERT. SRG's escalation to in-person USB data exfiltration under IT impersonation is not Flask-specific but directly affects the Aegis operations context: any developer, security analyst, or operator whose workstation is accessible to claimed 'IT visitors' is at risk. SRG currently targets law firms but the technique is transferable to any organization. IMMEDIATE ACTIONS: (1) Enforce USB device blocking via endpoint policy (GPO/MDM) on all developer and operator workstations; (2) Establish a visitor verification protocol requiring pre-arranged tickets and callback verification to IT help desk before granting physical workstation access; (3) Brief all staff that 'IT personnel' arriving to fix remote access issues after a prior phishing email or call is the SRG attack pattern; (4) Audit endpoint logs for unexpected USB device insertions since January 2026."

  - alert: "mouse5212-super-formatter — DIRECT STACK THREAT. Malicious npm package explicitly targets /mnt/user-data, the dedicated directory used by Anthropic's Claude AI tool. Any developer running Claude Code in an environment where npm packages execute during CI/CD is at risk of /mnt/user-data exfiltration. 676 downloads; attacker leaked own GitHub token (OX Security 'malware slop'). Audit npm package execution in any CI environment running Claude Code. SEPARATE threat from TrapDoor — independent actor, independent vector, both targeting Claude AI infrastructure."

  - alert: "BadHost CVE-2026-48710 — AI TOOLING STACK ALERT. Starlette host-header auth bypass is not in our requirements.txt (Flask/gunicorn, not FastAPI/Starlette). No action on the Threat-Feed app itself. However: if Aegis uses MCP servers, Claude Code with MCP integrations, or any FastAPI-based tool in development workflow, those endpoints may be vulnerable. Patch to Starlette >= 1.0.1 on any MCP gateway or AI inference server. Run badhost.org scanner on any FastAPI/vLLM/LiteLLM endpoint before patching to confirm exposure."

