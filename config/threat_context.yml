landscape_summary: "PM May 29 — CVE-2026-41089 Windows Netlogon (CVSS 9.8) active in-the-wild exploitation confirmed: functional public exploit completes in under 3 seconds with minimal forensic artifacts, enabling unauthenticated SYSTEM code execution on every Windows domain controller running Server 2012 through 2025 with autonomous worm propagation DC-to-DC — apply KB5087539 and equivalents immediately, this is the highest-urgency infrastructure patch of the current cycle. The Exchange CVE-2026-42897 CISA KEV deadline expired today with no permanent patch; OWA restriction to VPN/zero-trust remains the only reliable defense and federal agencies are now in non-compliance. Sysdig TRT reported the first confirmed real-world LLM-agent-driven post-exploitation chain (CVE-2026-39987 Marimo, CVSS 9.3): an AI agent autonomously extracted AWS credentials, retrieved SSH keys from AWS Secrets Manager, and drained an internal PostgreSQL database across four pivots in under one hour — this confirms AI-augmented adversaries are now operational and capable of outpacing human IR response cadences across cloud credential surfaces. TrapDoor (Day 11, T1195.001 against our CLAUDE.md), SymJack (MCP server hijack), NGINX Rift (Day 19, active kill chain with Copy Fail + ssh-keysign-pwn), and four CISA KEV deadlines within T-6 days (Langflow CVE-2025-34291, Apex One CVE-2026-34926, Defender CVE-2026-41091 T-5) collectively define the highest-priority defensive surface for the Aegis maintenance window."
