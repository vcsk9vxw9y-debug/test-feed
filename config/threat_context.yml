stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Day 3. Campaign sustained at 1,055 compromised versions across 502 packages (npm: 1,048, PyPI: 6, Composer: 1). 25,000+ GitHub repos credential-leaked; 2,500+ malicious repos created using exfiltrated tokens. Full toolkit (CI cache-poisoning scripts, OIDC token extractor, credential stealer + propagation logic) publicly circulating since May 12 (GitHub, BreachForums repost May 24) — copycat actors have had the weaponized code for 13 days. No new Day 3 wave confirmed yet, but multi-actor threat class means new waves are not telegraphed in advance. Verizon DBIR 2026 (published May 25) statistically validates the risk: supply chain breaches up 60% and now account for 48% of all corporate breaches. None of our direct requirements.txt packages are on the confirmed 502-package poisoned list as of May 25 AM, but the open-sourced toolkit enables new actors to extend the target list. POSTURE ACTIONS: (1) Implement pip install --require-hashes via pip-tools NOW — single highest-leverage defensive action; (2) Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; (3) Rotate all GitHub OIDC tokens in deployment pipelines; (4) Add runtime egress monitoring to CI pipelines during pip/npm install; (5) Search GitHub for Dune-universe-named repos created since May 11 using any of your tokens."
  - id: "CVE-2026-27205"
    package: "flask (web framework — in requirements.txt)"
    severity: "medium"
    in_requirements: true
    action: "Flask information disclosure via missing Vary: Cookie header when session accessed with 'in' operator. AFFECTS FLASK <= 3.1.2 ONLY. Our pinned flask==3.1.3 is CONFIRMED PATCHED — no upgrade needed. Verify deployment is running 3.1.3 and not an older cached Railway image layer. If any caching proxy (CDN, nginx proxy_cache, Varnish) sits upstream of Flask, verify Vary: Cookie is correctly set on all session-bearing responses."
