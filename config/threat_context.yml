stack_intersection:
  - alert: "CVE-2026-39987 Marimo + LLM Agent Attack (T1059.006) — NEW AI ATTACK CLASS ALERT. Sysdig confirmed the first real-world LLM-agent-driven post-exploitation chain today (May 29). While Marimo is not in our requirements.txt, the attack technique is directly relevant: any cloud credentials (AWS IAM keys, GitHub PATs, Railway tokens) accessible from a development host can be extracted and replayed by an AI agent to autonomously pivot into internal systems. The 4-pivot, under-1-hour chain demonstrates that AI-augmented attackers now operate faster than human IR teams can respond. ACTIONS: (1) Audit AWS Secrets Manager and any credential stores accessible from CI/CD or development hosts; (2) Apply least-privilege IAM — credentials stored in environment variables on CI hosts should not have access to Secrets Manager or other lateral pivot points; (3) Enable CloudTrail alerting on GetSecretValue calls from unexpected source IPs or principals."

  - alert: "SymJack (T1195.001) — DIRECT CLAUDE CODE THREAT. Adversa AI confirmed SymJack against Claude Code specifically: malicious repository symlinks silently insert attacker-controlled MCP servers into Claude Code configuration during approved file operations. IMMEDIATE ACTIONS: (1) Update Claude Code to the latest hardened build — updated versions resolve symlinks before the approval prompt and show real destination paths; (2) Audit ~/.claude/mcp_servers and all .mcp.json files for unexpected server entries added after cloning any external repository; (3) Treat any unrecognized MCP server in configuration as a potential SymJack IOC and rotate all credentials from that session; (4) Never approve AI agent file operations from untrusted or unfamiliar repositories without manually inspecting symlink destinations. INDEPENDENT OF TRAPDOOR — separate attack vector, separate remediation."

  - alert: "TrapDoor (T1195.001 + T1204.002) — CRITICAL STACK THREAT. Our CLAUDE.md file is a direct attack surface for TrapDoor's AI assistant poisoning technique. TrapDoor plants hidden zero-width Unicode instructions invisible to human reviewers but read and executed by Claude Code. Confirmed link to CWE-78 in Claude Code CLI (Phoenix Security April 2026). IMMEDIATE ACTIONS: (1) grep -rP '[\u200B\u200C\u200D\uFEFF]' CLAUDE.md — any hit is a TrapDoor IOC; (2) Review all open PRs since May 19 for poisoned AI config files; (3) Inspect .git/hooks/ for unexpected scripts; (4) Verify all pip installs since May 19 were hash-verified. INDEPENDENT of Glassworm, Mini Shai-Hulud, and SymJack remediations."

  - alert: "Gitea CVE-2026-27771 — DEVELOPER INFRASTRUCTURE ALERT. Any developer or CI/CD pipeline pulling container images from a self-hosted Gitea instance running < 1.26.2 may have had private images exfiltrated without authentication or access log trace. Gitea is not in requirements.txt — no action on the Flask app itself. Operator action: (1) Upgrade any Gitea instances to 1.26.2; (2) Audit container registry access logs for unauthenticated pulls back to May 2022; (3) Rotate all secrets, API keys, or configuration values embedded in private container images."

  - alert: "Silent Ransom Group physical USB intrusion (T1052.001) — PHYSICAL SECURITY ALERT. SRG's escalation to in-person USB data exfiltration under IT impersonation directly affects the Aegis operations context: any developer, security analyst, or operator accessible to claimed 'IT visitors' is at risk. IMMEDIATE ACTIONS: (1) Enforce USB device blocking via endpoint policy (GPO/MDM) on all developer and operator workstations; (2) Establish visitor verification protocol requiring pre-arranged tickets and callback verification to IT help desk before granting physical workstation access; (3) Brief all staff that 'IT personnel' arriving to fix remote access issues after a prior phishing email or call is the SRG attack pattern."

  - alert: "mouse5212-super-formatter — DIRECT STACK THREAT. Malicious npm package explicitly targets /mnt/user-data, the dedicated directory used by Anthropic's Claude AI tool. Any developer running Claude Code in an environment where npm packages execute during CI/CD is at risk of /mnt/user-data exfiltration. Audit npm package execution in any CI environment running Claude Code. SEPARATE threat from TrapDoor and SymJack — independent actor, independent vector."

  - alert: "BadHost CVE-2026-48710 — AI TOOLING STACK ALERT. Starlette host-header auth bypass is not in our requirements.txt (Flask/gunicorn, not FastAPI/Starlette). No action on the Threat-Feed app itself. However: if Aegis uses MCP servers, Claude Code with MCP integrations, or any FastAPI-based tool in development workflow, those endpoints may be vulnerable. Patch to Starlette >= 1.0.1 on any MCP gateway or AI inference server."

