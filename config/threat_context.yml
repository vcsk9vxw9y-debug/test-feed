    package: "nginx (web infrastructure — Railway reverse proxy layer)"
    severity: "critical"
    in_requirements: false
    action: "NGINX Rift — Day 14 of exploitation (up from Day 13). Heap overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. CVSS 9.2 unauthenticated RCE via single HTTP request. Censys: ~5.7M exposed vulnerable nginx servers. Upgrade to nginx 1.30.1 / 1.31.0 or nginx Plus R32 P6 / R36 P4. Verify Railway deployment nginx version. Replace unnamed PCRE captures with named captures in all rewrite configs as stopgap. Chain: NGINX Rift + Copy Fail/Dirty Frag = full root compromise. Active chaining with Linux kernel LPEs ongoing."
