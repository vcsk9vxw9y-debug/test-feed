trending_techniques:
  - name: "OIDC Token Hijack for Cross-Registry Package Self-Propagation (Mini Shai-Hulud / TeamPCP) — Toolkit Day 14 in Public Circulation"
    mitre_id: "T1195.001"
    description: "Mini Shai-Hulud steals OpenID Connect tokens from CI/CD pipeline runner memory during malicious package execution, then authenticates to PyPI and npm as the legitimate maintainer to publish backdoored versions of packages the infected pipeline has write permissions on — autonomous self-propagation with no further attacker involvement. Toolkit publicly circulating for 14 days (May 12 GitHub release, May 24 BreachForums repost with $1,000 copycat competition); copycat campaigns are fully operational. Campaign Day 4: 1,055 versions / 502 packages / 25,000+ repos credential-leaked. Verizon DBIR 2026 confirms supply chain is now in 48% of all corporate breaches."

  - name: "Ghost CMS SQLi Admin-Key Extraction for Site-Wide JavaScript Injection and ClickFix Social Engineering (CVE-2026-26980)"
    mitre_id: "T1190"
    description: "CVE-2026-26980 (CVSS 9.4) — unauthenticated blind SQL injection in Ghost CMS Content API extracts admin API key directly from the database, enabling full administrative control. Attackers inject obfuscated JavaScript into all published articles; visitors are fingerprinted and served fake Cloudflare CAPTCHA ClickFix pages (T1204.002) instructing them to paste malware execution commands into Windows Run/Terminal. 700+ sites confirmed compromised including Harvard, Oxford, DuckDuckGo. Two competing threat actor groups operating concurrently. Patch available since February 2026 (Ghost 6.19.1) — mass exploitation is a patching failure."

  - name: "Linux Kernel ptrace Race Condition for Local Root and SSH Private Key Theft (CVE-2026-46333 / ssh-keysign-pwn)"
    mitre_id: "T1068"
    description: "CVE-2026-46333 — nine-year-old (v4.10, November 2016) race condition in Linux kernel __ptrace_may_access() during process shutdown. Combined with pidfd_getfd() syscall, any unprivileged local user can read /etc/shadow, exfiltrate SSH host private keys (via ssh-keysign exploit path), or execute commands as root via hijacked dbus/systemd connections. Qualys published four working exploits covering chage, ssh-keysign, pkexec, and accounts-daemon paths; all circulating publicly since May 20. Affects default Debian, Ubuntu, Fedora. Extends the NGINX Rift (T1190) → local shell → LPE kill chain with SSH key exfiltration as a bonus capability."

  - name: "BitLocker Recovery Environment Bypass via Malicious USB Boot Object (YellowKey)"
    mitre_id: "T1200"
    description: "CVE-2026-45585 (YellowKey, CVSS 6.8) — attacker places a crafted FsTx folder on a USB drive or EFI partition, boots a BitLocker-protected Windows 11 machine into WinRE, and triggers vulnerable Transactional NTFS replay behavior that grants unrestricted shell access to the encrypted volume. Requires physical access; cannot be exploited remotely at scale. PoC released May 13 by Nightmare Eclipse. No patch until June 10 Patch Tuesday. Demonstrates that BitLocker's recovery environment is now an established attack surface — TPM+PIN is the mitigating control."

  - name: "Trusted Windows Process Abuse for Privilege Escalation (GreenPlasma / CTFMON)"
    mitre_id: "T1068"
    description: "GreenPlasma (no CVE assigned, companion to YellowKey and MiniPlasma) exploits ctfmon.exe (CTF Input Method Editor / speech recognition loader, runs as SYSTEM-level trusted process) to escalate privileges on Windows 11 and Windows Server 2022/2026. PoC released May 13 by Nightmare Eclipse. No mitigation available from Microsoft; no patch until June 10. Third in a tranche of three unpatched Nightmare Eclipse zero-days targeting Windows security assumptions (Cloud Filter driver, BitLocker recovery, CTFMON)."

  - name: "Bulk CI/CD Workflow Backdooring via Mass Automated Repository Commits (Megalodon / TeamPCP)"
    mitre_id: "T1072"
    description: "Megalodon (TeamPCP, May 18, Day 8) pushed 5,718 commits to 5,561 distinct GitHub repos in 6 hours using four rotating CI-maintenance author names (build-bot, auto-ci, ci-bot, pipeline-bot). Two payload variants: SysDiag (active exfiltration on every push/PR; 449 GB, 575K files stolen) and Optimize-Build (dormant workflow_dispatch backdoor fireable via GitHub API). Dormant backdoors persist in repos that patched the active variant without auditing all workflow files."

  - name: "Open-Source Package Tag Poisoning via Repository Fork Hijack (Laravel-Lang / TeamPCP Wave)"
    mitre_id: "T1195.001"
    description: "Threat actors exploit GitHub's fork-tag mechanism to rewrite version tags across multiple packages simultaneously, injecting credential-stealing RCE payloads that auto-execute via package manager autoloaders (Composer, npm, pip). Laravel-Lang (May 22: 700+ repos, 233 versions, 15-module PHP credential stealer) and TeamPCP GitHub internal breach via poisoned Nx Console VS Code extension (May 18: 3,800 GitHub internal repos exfiltrated) are confirmed instances of the same coordinated supply chain campaign."

  - name: "Hosting Server Root Escalation via Incorrect Privilege Assignment (LiteSpeed CVE-2026-48172)"
    mitre_id: "T1068"
    description: "CVE-2026-48172 — CVSS 10.0 incorrect privilege assignment in LiteSpeed User-End cPanel Plugin. Single malformed API call to lsws.redisAble elevates any cPanel user to root. State-linked actor immediately weaponized for targeted campaigns against SE Asian government/military entities and MSP/hosting providers. Web server management plugins are now an established initial-access surface for state actors targeting hosting infrastructure."

  - name: "AI Platform Initial Access via Unauthenticated RCE (Langflow / MuddyWater)"
    mitre_id: "T1190"
    description: "MuddyWater (Iranian state actor, MOIS) exploiting CVE-2025-34291 in Langflow AI builder since January 23, 2026 — CVSS 9.4, no authentication, CORS/CSRF/code-execution-endpoint triple weakness. State actors now treat AI workflow platforms as a new initial-access surface equivalent to VPN/firewall appliances. Flodric botnet also deployed via this vector. CISA KEV June 4 deadline (T-9 days)."

  - name: "Security Tool as Malware Delivery Platform (Apex One CVE-2026-34926)"
    mitre_id: "T1072"
    description: "CVE-2026-34926 in Trend Micro Apex One enables attackers to modify the server key table and push malicious payloads to all connected endpoint agents through the legitimate security product update channel — bypassing behavioral and AV controls by design. CISA KEV June 4 deadline (T-9 days)."

  - name: "AV Engine Link-Following Privilege Escalation (Defender CWE-59)"
    mitre_id: "T1068"
    description: "CVE-2026-41091 — CWE-59 symlink/junction race in Microsoft Malware Protection Engine running as SYSTEM. Day 16 of exploitation by RedSun and UnDefend campaigns. CISA KEV June 3 deadline (T-8 days). Unpatched Defender simultaneously enables LPE and degrades AV coverage."

  - name: "Email-Borne XSS for Browser Session Hijack (Exchange OWA CVE-2026-42897)"
    mitre_id: "T1566.001"
    description: "CVE-2026-42897 — crafted email triggers reflected XSS in Exchange OWA, executing arbitrary JavaScript in victim's browser context. CISA KEV deadline May 29 (T-3 days). No permanent patch; EEMS/EOMT mitigation gaps confirmed May 19. Effective against any on-premises Exchange without OWA restricted to VPN/zero-trust."

  - name: "Web Infrastructure RCE via PCRE Heap Overflow (NGINX Rift, Day 15)"
    mitre_id: "T1190"
    description: "CVE-2026-42945 NGINX Rift — Day 15 of exploitation. Single unauthenticated HTTP request triggers heap buffer overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. ~5.7M exposed vulnerable nginx servers. Chained with Linux kernel LPEs (Copy Fail CVE-2026-31431, Dirty Frag CVE-2026-43284, ssh-keysign-pwn CVE-2026-46333) for full root compromise with SSH key exfiltration."

  - name: "Network Infrastructure Takeover via CVSS 10.0 Authentication Bypass (Cisco SD-WAN / UAT-8616)"
    mitre_id: "T1190"
    description: "CVE-2026-20182 — CVSS 10.0 authentication bypass in Cisco Catalyst SD-WAN vdaemon DTLS peering; attacker spoofs vHub device identity to gain trusted control-plane peer status. UAT-8616 (critical infrastructure targeting, ORB network overlap) uses post-exploitation for SSH key injection, NETCONF manipulation, root LPE via CVE-2022-20775, and log clearing."

  - name: "State-Sponsored Perimeter Exploitation with 47-Day Dwell (PAN-OS / CL-STA-1132)"
    mitre_id: "T1190"
    description: "CL-STA-1132 (China-nexus) exploiting CVE-2026-0300 in PAN-OS since April 9 — Day 47 ongoing campaign, patch window closes May 28 (T-2 days). Defines the state actor playbook: exploit perimeter appliance, establish persistence, exfiltrate during full patch window dwell period. The 47-day dwell is the critical finding: organizations with unpatched PAN-OS since April 9 should assume persistent access, mapped network, and ongoing lateral movement."

