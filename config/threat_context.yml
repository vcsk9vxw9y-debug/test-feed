landscape_summary: "The May 24 AM run marks Day 2 of the Mini Shai-Hulud supply chain campaign with a critical overnight escalation: TeamPCP has open-sourced the full worm toolkit (CI cache-poisoning scripts, OIDC token extractor, credential stealer + propagation logic) to a BreachForums supply chain attack contest, transforming this from a single-actor campaign into a multi-actor threat class. Campaign totals now stand at 1,055 compromised versions across 502 npm/PyPI packages, 25,000+ GitHub repositories with leaked credentials, and 2,500+ malicious repositories created using exfiltrated tokens — for our Python/Flask stack, pip install --require-hashes via pip-tools is the single highest-leverage unresolved defensive action and must be implemented before the next deployment cycle. Two deadline-driven critical items dominate the Windows/infrastructure tier: Drupal CVE-2026-9082 (CISA KEV, federal deadline May 27, T-3 days, 15,000+ active exploitation attempts against PostgreSQL backends) and Exchange CVE-2026-42897 (CISA May 29, T-5 days, no permanent patch, confirmed mitigation gaps). A new critical item enters today: CVE-2026-48172 in LiteSpeed cPanel Plugin (CVSS 10.0, CISA KEV) is being actively weaponized by a state-linked actor targeting SE Asian government/military entities and MSPs in Canada, South Africa, and the US — any shared hosting or MSP infrastructure in the environment using LiteSpeed cPanel plugin 2.3–2.4.4 must be patched or the plugin uninstalled immediately. MiniPlasma (public PoC Windows LPE via Cloud Filter driver, no CVE assigned, no patch until June 10 Patch Tuesday) is a persistent risk for all Windows development and CI/CD hosts."
