stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Campaign sustained: main worm wave ran April 29 – May 12, 2026; toolkit public 17 days now. Final confirmed stats: 1,055 compromised versions across 502 packages (npm: 1,048, PyPI: 6, Composer: 1); 25,000+ GitHub repos credential-leaked; 2,500+ malicious repos created via exfiltrated tokens. Full toolkit on GitHub and BreachForums (May 24 repost, $1,000 copycat competition Day 5). SLSA BYPASS CONFIRMED: malicious npm packages carry valid SLSA Build Level 3 provenance attestations via stolen OIDC tokens — invalidates SLSA BL3 as standalone trust signal for packages installed since May 12. GitHub shipped mandatory npm staged publishing 2FA gate (May 22, now GA). GLASSWORM, TRAPDOOR, AND SYMJACK ARE INDEPENDENT — separate remediations required. None of our direct requirements.txt packages on confirmed 502-package poisoned list. POSTURE ACTIONS: (1) pip install --require-hashes via pip-tools — highest-leverage PyPI defense; (2) Do not rely on SLSA Build Level 3 attestations alone for npm packages since May 12; (3) Enable npm staged publishing 2FA gate for any package we publish; (4) Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; (5) Rotate all GitHub OIDC tokens."

  - id: "TrapDoor-2026"
    package: "npm/PyPI/Crates.io ecosystem — TrapDoor cross-ecosystem supply chain + AI coding assistant poisoning campaign (no CVE assigned)"
    severity: "critical"
    in_requirements: false
    action: "Active since May 19 — CAMPAIGN DAY 11. First detected May 22 by Socket.dev. 34 malicious packages, 384+ versions across npm, PyPI, AND Crates.io. Socket detection median 5min 27sec. PRIMARY THREAT VECTOR FOR OUR STACK: TrapDoor plants malicious .cursorrules and CLAUDE.md files using zero-width Unicode characters (U+200B, U+200C, U+200D) to hide malicious instructions tricking Claude Code, Cursor, and Copilot into running a fake 'security scan' that silently exfiltrates developer credentials. Confirmed link to prior CWE-78 command injection in Claude Code CLI (Phoenix Security, April 2026). Poisoned PRs submitted to browser-use, langchain-ai/langchain, langflow-ai/langflow. Persistence: Git hooks, shell hooks, systemd, cron, SSH key injection via trap-core.js shared payload. INDEPENDENT OF SYMJACK — TrapDoor uses hidden Unicode in AI config files; SymJack uses symlinks in repos to install MCP servers. Both target Claude Code but via entirely different vectors. IMMEDIATE ACTIONS: (1) grep -rP '[\u200B\u200C\u200D\uFEFF]' . on all CLAUDE.md and .cursorrules files — any hit is a TrapDoor IOC; (2) Review all PRs opened since May 19; (3) Inspect .git/hooks/; (4) Rotate AWS IAM keys, GitHub PATs, npm/PyPI publish tokens on any environment that ran unverified packages since May 19."

  - id: "CVE-2026-39987"
    package: "marimo (Python reactive notebook — not in requirements.txt, affects ML/data science developer infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "FIRST CONFIRMED REAL-WORLD LLM AGENT POST-EXPLOITATION — reported May 29, 2026 by Sysdig TRT. CVSS 9.3. Unauthenticated WebSocket RCE: /terminal/ws endpoint skips all authentication, granting any unauthenticated attacker a full PTY shell. Exploited within 10 hours of April disclosure. Observed attack chain: Marimo RCE -> extract AWS credentials from environment -> replay through fanned-out egress pool -> retrieve SSH private key from AWS Secrets Manager -> 8 parallel SSH sessions to SSH bastion -> drain internal PostgreSQL DB schema + full contents. Four pivots, complete chain under 1 hour. LLM agent indicators confirmed by Sysdig: improvised DB dump with no prior schema knowledge, Chinese-language planning comments ('See what else we can do') in command stream, sub-second command dispatch across 6 IPs, machine-parseable structured output at every step. Marimo is NOT in our requirements.txt (Flask/gunicorn stack). Upgrade to Marimo >= 0.20.5. Audit AWS Secrets Manager access logs for anomalous GetSecretValue calls since May 10. Rotate all cloud credentials accessible from any internet-exposed Marimo instance."

  - id: "CVE-2026-27771"
    package: "gitea (self-hosted Git + container registry — not in requirements.txt, affects developer infrastructure)"
    severity: "high"
    in_requirements: false
    action: "Unauthenticated private container image pull — CVE-2026-27771 (CVSS 8.2), disclosed May 27 by NoScope via autonomous AI penetration testing agent. Gitea's container registry served private image manifests and layers to anonymous requests regardless of 'private' repository designation. Flaw present ~4 years across all Gitea versions prior to 1.26.2. ~30,000 self-hosted Gitea deployments exposed across 30+ countries — healthcare, aerospace, retail, ISP. Gitea is NOT in our requirements.txt (Flask/gunicorn stack on Railway), but any developer or CI/CD pipeline pulling container images from a self-hosted Gitea instance is at risk. Upgrade to Gitea 1.26.2; temporary workaround: [service].REQUIRE_SIGNIN_VIEW=true in gitea.ini. Audit registry access logs for unauthenticated pulls back to May 2022 minimum. Rotate all secrets embedded in any private container images hosted on Gitea < 1.26.2."

  - id: "CVE-2026-48710"
    package: "starlette (Python ASGI framework — NOT in requirements.txt, but affects FastAPI/vLLM/LiteLLM/MCP servers)"
    severity: "high"
    in_requirements: false
    action: "BadHost — host-header authentication bypass in Starlette < 1.0.1. Disclosed May 22 by X41 D-Sec via OSTIF audit. Starlette rebuilds URLs from the HTTP Host header without validating it; attackers inject unauthenticated paths into the Host header to bypass path-based authentication middleware with a single malformed request. MCP servers are especially exposed: they expose unauthenticated OAuth discovery endpoints by design. 325M weekly Starlette downloads. Patch to Starlette >= 1.0.1. Starlette is NOT in our requirements.txt — no action on the Threat-Feed Flask app. Audit any MCP servers, FastAPI sidecars, or AI inference endpoints in developer or CI/CD environment. Directly relevant if Aegis or operators use Claude Code with MCP servers."

