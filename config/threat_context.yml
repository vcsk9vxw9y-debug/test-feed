    package: "microsoft malware protection engine (defender — windows infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "CISA KEV June 3 deadline — T-10 DAYS. Day 14 of active exploitation by RedSun and UnDefend campaigns. LPE via CWE-59 link-following: local low-priv user redirects Defender engine writes (running as SYSTEM) into protected directories via symlink/junction. Verify engine >= 1.1.26040.8 (Get-MpComputerStatus | Select AMEngineVersion). Force update via WSUS/Intune for delayed-update estates (VDI, air-gapped, GPO-disabled). Hunt EDR for low-privilege symlink creation in protected directories co-occurring with Defender scan events (RedSun/UnDefend IOC pattern)."
