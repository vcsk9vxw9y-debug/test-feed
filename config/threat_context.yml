    package: "vscode extension supply chain (developer tooling)"
    severity: "critical"
    in_requirements: false
    action: "nrwl.angular-console v18.95.0 (Nx Console) was a malicious VS Code Marketplace publication on May 18 (14:36-14:47 CEST, ~11 min exposure). Multi-stage credential stealer harvesting GitHub, npm, AWS, HashiCorp Vault, Kubernetes, and 1Password secrets across HTTPS / GitHub API / DNS tunneling, plus persistent Python backdoor on macOS using GitHub Search as a dead-drop. 2.2M-install ecosystem. Audit developer VS Code extension install logs for the affected window; treat any hit as full workstation compromise — rotate every token in the developer's keychain, revoke OIDC-issued publish tokens, rebuild from clean image."
