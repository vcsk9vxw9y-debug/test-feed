trending_techniques:
  - name: "Physical Social Engineering with In-Person USB Data Exfiltration (Silent Ransom Group)"
    mitre_id: "T1052.001"
    description: "Silent Ransom Group (Russia-linked, FBI Flash May 26) has escalated from remote phishing to physically sending operatives into target offices posing as IT support staff. After a phone or phishing email pretext establishes a 'remote session failure,' an SRG operative arrives in person and inserts a USB data-exfiltration device directly into the victim's workstation. No malware, no encryption, no ransomware payload — no alerts, no lockscreens. Data is exfiltrated via the physical medium and published on SRG's public leak site as ransom leverage. 38+ law firms already leaked; 100+ total victims. Combines T1566.001 (initial phishing pretext), T1036 (impersonating IT personnel), and T1052.001 (exfiltration over USB physical medium)."

  - name: "Unauthenticated Container Registry Data Access via Broken Access Control (Gitea CVE-2026-27771)"
    mitre_id: "T1213"
    description: "CVE-2026-27771 (CVSS 8.2) in Gitea < 1.26.2 allowed unauthenticated attackers to pull private container images from self-hosted Gitea deployments — no account or credential required. The container registry access control model did not enforce 'private' repository authentication on OCI registry endpoints. Flaw present for ~4 years across 30,000+ deployments. Discovered by NoScope using an autonomous AI penetration testing agent (April 2026) — notable as an early signal of AI-driven vulnerability discovery at scale against developer infrastructure. Private container images routinely embed application secrets, API keys, and configuration; successful exploitation enables direct credential harvesting without any authentication footprint."

  - name: "AI Coding Assistant Credential Exfiltration via Poisoned CLAUDE.md and .cursorrules Files (TrapDoor)"
    mitre_id: "T1195.001"
    description: "TrapDoor (active since May 19, detected May 22 by Socket.dev) plants malicious CLAUDE.md and .cursorrules files containing zero-width Unicode characters (U+200B, U+200C, U+200D) with hidden instructions that trick Claude Code, Cursor, and GitHub Copilot into running a fake 'security scan' that silently exfiltrates developer credentials — AWS IAM keys, GitHub PATs, SSH private keys, crypto wallet keystores. Confirmed link to prior CWE-78 command injection flaws in Claude Code CLI (Phoenix Security, April 2026): TrapDoor delivers the same attack class via supply chain rather than direct repository access. Poisoned PRs submitted to browser-use, LangChain, and LangFlow open-source projects. Socket median detection 5min 27sec."

  - name: "AI Agent Server Authentication Bypass via Host-Header Injection (BadHost CVE-2026-48710)"
    mitre_id: "T1190"
    description: "CVE-2026-48710 (BadHost, disclosed May 22 by X41 D-Sec) — Starlette < 1.0.1 rebuilds URLs by stitching scheme, Host header, and request path without validating the Host header, allowing a single malformed HTTP request to inject unauthenticated paths and bypass path-based authentication middleware. FastAPI, vLLM, LiteLLM, and MCP servers are all affected. MCP servers are especially vulnerable because they expose unauthenticated OAuth discovery endpoints by design — a predictable, reliable entry point. 325M weekly Starlette downloads. Patched in Starlette 1.0.1."

  - name: "Supply Chain Provenance Attestation Bypass via Stolen OIDC/Sigstore Tokens (Mini Shai-Hulud SLSA Escalation)"
    mitre_id: "T1553.002"
    description: "Mini Shai-Hulud (TeamPCP) escalated by producing malicious npm packages with valid SLSA Build Level 3 provenance attestations — the first documented instance of a supply chain worm bypassing SLSA integrity verification. Stolen OIDC tokens (exfiltrated from CI/CD pipeline runner memory during package installation) were used with the legitimate Sigstore signing stack to generate cryptographically valid attestations for backdoored packages. SLSA provenance attests to the build pipeline identity, not pipeline behavior. GitHub shipped mandatory npm staged publishing 2FA gate as defensive response; GitHub internal repos confirmed breached (3,800 repos) via poisoned Nx Console extension."

  - name: "AI-Assisted State-Sponsored Backdoor Development via SEO Poisoning (Nimbus Manticore / Operation Epic Fury)"
    mitre_id: "T1608.006"
    description: "IRGC-linked Nimbus Manticore developed and deployed the MiniFast backdoor during Operation Epic Fury (US military campaign against Iran, Feb-May 2026) using AI-assisted development. Three campaign waves: Wave 1 (Feb 2026): fake career offer ZIP archives delivering MiniJunk DLL via AppDomain hijacking; Wave 2 (Mar 2026): trojanized Zoom installer deploying MiniFast; Wave 3 (Apr-May 2026): SEO-poisoned fake SQL Developer download page (getsqldeveloper[.]com) delivering MiniFast. Targets aviation, software, telecom, and energy sectors across US, Europe, Middle East."

  - name: "DLL Side-Loading via Legitimately Signed Binaries for State Espionage (MuddyWater Q1 2026)"
    mitre_id: "T1574.002"
    description: "MuddyWater (MOIS-linked, Iranian state actor) executed a broad espionage campaign in Q1 2026 targeting at least nine organizations across nine countries spanning industrial/electronics manufacturing, education, public sector, financial services, and professional services. DLL side-loading used legitimately signed Fortemedia (fmapp.exe) and SentinelOne (sentinelmemoryscanner.exe) binaries to execute malicious DLLs while masquerading as benign software. Victims include a major South Korean electronics manufacturer (week-long dwell, Feb 2026), an international airport in the Middle East, Southeast Asian industrial manufacturers, and a Latin American financial-services provider."

  - name: "OIDC Token Hijack for Cross-Registry Package Self-Propagation (Mini Shai-Hulud / TeamPCP)"
    mitre_id: "T1195.001"
    description: "Mini Shai-Hulud steals OpenID Connect tokens from CI/CD pipeline runner memory during malicious package execution, then authenticates to PyPI and npm as the legitimate maintainer to publish backdoored versions of every package the infected pipeline has write permissions on — autonomous self-propagation requiring no further attacker involvement. Toolkit 16 days public. Final campaign stats: 1,055 versions / 502 packages / 25,000+ repos credential-leaked. GitHub has shipped mandatory 2FA staged publishing gate as defensive response."

  - name: "Multi-Vector Developer Supply Chain Botnet with Quadruple-Channel Blockchain C2 Resilience (Glassworm — C2 Disrupted May 26)"
    mitre_id: "T1195.001"
    description: "Glassworm (Russia-likely) targeted software developers via trojanized VSCode/Cursor/Windsurf/Positron extensions on OpenVSX marketplace, malicious npm/PyPI packages with postinstall hooks, and 300+ GitHub repos poisoned via stolen credentials. C2 used four redundant channels: Solana blockchain, BitTorrent DHT, Google Calendar dead-drops (T1102), direct VPS. CrowdStrike + Google + Shadowserver disrupted all four channels simultaneously May 26 14:00 UTC. Previously infected machines remain infected — C2 severing orphans bots but does not remove persistence. IOC artifacts: os.node, darwin.node files on disk."

  - name: "Ghost CMS SQLi Admin-Key Extraction for Site-Wide JavaScript Injection and ClickFix Social Engineering (CVE-2026-26980)"
    mitre_id: "T1190"
    description: "CVE-2026-26980 (CVSS 9.4) — unauthenticated blind SQL injection in Ghost CMS Content API extracts admin API key, enabling bulk JavaScript injection into all articles. Visitors served fake Cloudflare CAPTCHA ClickFix pages (T1204.002) instructing them to paste malware execution commands. 700+ sites compromised including Harvard, Oxford, DuckDuckGo. Two competing threat actor groups operating concurrently."

  - name: "Linux Kernel ptrace Race Condition for Local Root and SSH Private Key Theft (CVE-2026-46333 / ssh-keysign-pwn)"
    mitre_id: "T1068"
    description: "CVE-2026-46333 — nine-year-old (v4.10, November 2016) race condition in Linux kernel __ptrace_may_access() during process shutdown. Combined with pidfd_getfd(), any unprivileged local user can read /etc/shadow, exfiltrate SSH host private keys, or execute commands as root. Qualys published four working exploits covering chage, ssh-keysign, pkexec, and accounts-daemon; all circulating publicly for 8 days. Affects default Debian, Ubuntu, Fedora. Extends NGINX Rift (T1190) -> local shell -> LPE kill chain with SSH key exfiltration."

  - name: "BitLocker Recovery Environment Bypass via Malicious USB Boot Object (YellowKey)"
    mitre_id: "T1200"
    description: "CVE-2026-45585 (YellowKey, CVSS 6.8) — crafted FsTx folder on USB/EFI partition boots BitLocker-protected Windows into WinRE and triggers vulnerable NTFS replay granting unrestricted shell access to encrypted volume. Physical access required. PoC released May 13 by Nightmare Eclipse. No patch until June 10 (T-13 days). TPM+PIN is the mitigating control."

  - name: "Trusted Windows Process Abuse for Privilege Escalation (GreenPlasma / CTFMON)"
    mitre_id: "T1068"
    description: "GreenPlasma (no CVE, companion to YellowKey and MiniPlasma) exploits ctfmon.exe (SYSTEM-level trusted process) to escalate privileges on Windows 11 and Server 2022/2026. PoC released May 13 by Nightmare Eclipse. No mitigation; no patch until June 10 (T-13 days)."

  - name: "Bulk CI/CD Workflow Backdooring via Mass Automated Repository Commits (Megalodon / TeamPCP)"
    mitre_id: "T1072"
    description: "Megalodon (TeamPCP, May 18): 5,718 commits to 5,561 distinct GitHub repos in 6 hours using four rotating CI-maintenance author names (build-bot, auto-ci, ci-bot, pipeline-bot). Two payload variants: SysDiag (active exfiltration — 449 GB, 575K files stolen) and Optimize-Build (dormant workflow_dispatch backdoor fireable via GitHub API). Dormant backdoors persist in repos that patched the active variant without auditing all workflow files."

