landscape_summary: "Drupal PSA-2026-05-18 dominates today's landscape: a 'highly critical' (20/25) unauthenticated core vulnerability lands today between 17:00 and 21:00 UTC, with patches back-ported as far as Drupal 8.9 / 9.5 — Drupal expects exploits within hours of disclosure. NGINX Rift (CVE-2026-42945) enters Day 8 with sustained exploitation against ~5.7M exposed servers per Censys, and tier-1 reporting through May 19 confirms attack volume is not slowing. The Nx Console VS Code extension compromise (May 18, nrwl.angular-console 18.95.0, ~11-min window, 2.2M-install ecosystem) and Microsoft's disruption of the Fox Tempest malware-signing-as-a-service (May 19, >1000 certs revoked) frame this week as a developer-tooling-and-trust week. For our stack: not directly Drupal-affected, but nginx patching and rewrite-config audit remain the most urgent items; audit developer VS Code extension installs for the Nx Console window; close the requirements.txt hash-pinning gap before the next supply-chain wave; verify Railway kernel patching for Copy Fail and Dirty Frag mitigations."
