    technique: "NEW LATE PM. Physical escalation: SRG operatives physically enter target offices posing as IT support staff, leveraging a prior phishing email or phone call as pretext ('I'm here to fix the remote access problem'). When the victim cannot complete a remote desktop session, the operative inserts a USB data-exfiltration device directly into the workstation. No malware, no ransomware, no encryption — completely invisible on endpoint security tools and SIEM until ransom email arrives threatening to publish stolen data. 38+ law firms data published; 100+ total attack count; surging sharply in Q1 2026. FBI Flash alert IC3 reference: 260526. Activity includes: Orrick Herrington & Sutcliffe (Jan 2026, data published), Jones Day, Wood Smith Henning & Berman, Ropers Majeski (May 6, 2026)."

