  - id: "CVE-2026-42945"
    package: "nginx (web infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "NGINX Rift — heap buffer overflow in ngx_http_rewrite_module. CVSS 9.2. Day 8 of disclosure. Exploitation continues — Censys still counts ~5.7M exposed nginx servers; VulnCheck-confirmed exploitation since May 16; tier-1 reporting through May 18-19 (Help Net Security, SecurityWeek, Security Affairs, The Register) shows attack volume sustained. Unauthenticated RCE via single HTTP request when rewrite uses unnamed PCRE captures + ? in replacement. Affects nginx 0.6.27 through 1.30.0 and nginx Plus R32-R36. Upgrade to 1.30.1 / 1.31.0 (or nginx Plus R32 P6 / R36 P4) immediately. Not in requirements.txt but nginx is in the Railway deployment path / any reverse-proxy layer. Audit every nginx instance and rewrite configuration; swap unnamed captures for named captures as a stopgap."
