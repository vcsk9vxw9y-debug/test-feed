trending_techniques:
  - name: "AI Coding Assistant Credential Exfiltration via Poisoned CLAUDE.md and .cursorrules Files (TrapDoor)"
    mitre_id: "T1195.001"
    description: "TrapDoor (first detected May 22 by Socket.dev) introduces a novel AI coding assistant poisoning technique: malicious .cursorrules and CLAUDE.md configuration files laced with zero-width Unicode characters (U+200B, U+200C, U+200D) contain hidden instructions that trick AI coding assistants (Claude Code, Cursor, GitHub Copilot) into running a fake 'security scan' that silently exfiltrates developer credentials — AWS IAM keys, GitHub PATs, SSH private keys, crypto wallet keystores. The attacker submitted poisoned PRs to prominent AI/LLM open-source projects (LangChain, MetaGPT, OpenHands). Persistence via trap-core.js: Git hooks, shell hooks, systemd, cron, SSH authorized_keys injection. This represents a new attack surface: AI assistant configuration files as a delivery mechanism for credential theft (T1204.002 — User Execution: Malicious File, via AI tool as the execution agent) combined with supply chain delivery (T1195.001) across npm, PyPI, and Crates.io."

  - name: "Supply Chain Provenance Attestation Bypass via Stolen OIDC/Sigstore Tokens (Mini Shai-Hulud SLSA Escalation)"
    mitre_id: "T1553.002"
    description: "Mini Shai-Hulud (TeamPCP) escalated by producing malicious npm packages with valid SLSA Build Level 3 provenance attestations — the first documented instance of a supply chain worm bypassing SLSA integrity verification. Stolen OIDC tokens (exfiltrated from CI/CD pipeline runner memory during package installation) were used with the legitimate Sigstore signing stack to generate cryptographically valid attestations for backdoored packages. SLSA provenance attests to the build pipeline identity, not pipeline behavior — this attack demonstrates that OIDC-based attestation trust is only as strong as the secrecy of OIDC tokens in the pipeline that issues them."

  - name: "AI-Assisted State-Sponsored Backdoor Development via SEO Poisoning (Nimbus Manticore / Operation Epic Fury)"
    mitre_id: "T1608.006"
    description: "IRGC-linked Nimbus Manticore developed and deployed the MiniFast backdoor during Operation Epic Fury (US military campaign against Iran, Feb-May 2026) using AI-assisted development — a confirmed first for mid-conflict real-time malware iteration. Three campaign waves: Wave 1 (Feb 2026): fake career offer ZIP archives delivering MiniJunk DLL via AppDomain hijacking; Wave 2 (Mar 2026): trojanized Zoom installer deploying MiniFast; Wave 3 (Apr-May 2026): SEO-poisoned fake SQL Developer download page (getsqldeveloper[.]com) delivering MiniFast. Targets aviation, software, telecom, and energy sectors across US, Europe, Middle East."

  - name: "OIDC Token Hijack for Cross-Registry Package Self-Propagation (Mini Shai-Hulud / TeamPCP) — Toolkit Day 16 Public"
    mitre_id: "T1195.001"
    description: "Mini Shai-Hulud steals OpenID Connect tokens from CI/CD pipeline runner memory during malicious package execution, then authenticates to PyPI and npm as the legitimate maintainer to publish backdoored versions of every package the infected pipeline has write permissions on — autonomous self-propagation requiring no further attacker involvement. Toolkit 16 days public (May 12 GitHub, May 24 BreachForums with $1,000 copycat competition Day 5); campaign Day 6 AM: 1,055 versions / 502 packages / 25,000+ repos credential-leaked. NEW: worm now produces valid SLSA Build Level 3 attestations for backdoored packages via stolen OIDC/Sigstore tokens (T1553.002)."

  - name: "Multi-Vector Developer Supply Chain Botnet with Quadruple-Channel Blockchain C2 Resilience (Glassworm — C2 Disrupted May 26)"
    mitre_id: "T1195.001"
    description: "Glassworm (Russia-likely) targeted software developers via trojanized VSCode/Cursor/Windsurf/Positron extensions on OpenVSX marketplace, malicious npm/PyPI packages with postinstall hooks, and 300+ GitHub repos poisoned via stolen credentials. Malware established persistence via VS Code and Claude Code extension hook injection; Windows HKCU/HKLM Run keys; macOS com.user.nodestart LaunchAgent. C2 used four redundant channels: Solana blockchain, BitTorrent DHT, Google Calendar dead-drops (T1102), direct VPS. CrowdStrike + Google + Shadowserver disrupted all four channels simultaneously May 26 14:00 UTC. Previously infected machines remain infected — C2 severing orphans bots but does not remove persistence. IOC artifacts: os.node, darwin.node files on disk."

  - name: "Ghost CMS SQLi Admin-Key Extraction for Site-Wide JavaScript Injection and ClickFix Social Engineering (CVE-2026-26980)"
    mitre_id: "T1190"
    description: "CVE-2026-26980 (CVSS 9.4) — unauthenticated blind SQL injection in Ghost CMS Content API extracts admin API key, enabling bulk JavaScript injection into all articles. Visitors served fake Cloudflare CAPTCHA ClickFix pages (T1204.002) instructing them to paste malware execution commands. 700+ sites compromised including Harvard, Oxford, DuckDuckGo. Two competing threat actor groups operating concurrently."

  - name: "Linux Kernel ptrace Race Condition for Local Root and SSH Private Key Theft (CVE-2026-46333 / ssh-keysign-pwn)"
    mitre_id: "T1068"
    description: "CVE-2026-46333 — nine-year-old (v4.10, November 2016) race condition in Linux kernel __ptrace_may_access() during process shutdown. Combined with pidfd_getfd(), any unprivileged local user can read /etc/shadow, exfiltrate SSH host private keys, or execute commands as root. Qualys published four working exploits covering chage, ssh-keysign, pkexec, and accounts-daemon; all circulating publicly for 8 days. Affects default Debian, Ubuntu, Fedora. Extends NGINX Rift (T1190) -> local shell -> LPE kill chain with SSH key exfiltration."

  - name: "BitLocker Recovery Environment Bypass via Malicious USB Boot Object (YellowKey)"
    mitre_id: "T1200"
    description: "CVE-2026-45585 (YellowKey, CVSS 6.8) — crafted FsTx folder on USB/EFI partition boots BitLocker-protected Windows into WinRE and triggers vulnerable NTFS replay granting unrestricted shell access to encrypted volume. Physical access required. PoC released May 13 by Nightmare Eclipse. No patch until June 10 (T-13 days). TPM+PIN is the mitigating control."

  - name: "Trusted Windows Process Abuse for Privilege Escalation (GreenPlasma / CTFMON)"
    mitre_id: "T1068"
    description: "GreenPlasma (no CVE, companion to YellowKey and MiniPlasma) exploits ctfmon.exe (SYSTEM-level trusted process) to escalate privileges on Windows 11 and Server 2022/2026. PoC released May 13 by Nightmare Eclipse. No mitigation; no patch until June 10 (T-13 days). Third in Nightmare Eclipse's three-zero-day tranche targeting Windows security assumptions."

  - name: "Bulk CI/CD Workflow Backdooring via Mass Automated Repository Commits (Megalodon / TeamPCP)"
    mitre_id: "T1072"
    description: "Megalodon (TeamPCP, May 18): 5,718 commits to 5,561 distinct GitHub repos in 6 hours using four rotating CI-maintenance author names (build-bot, auto-ci, ci-bot, pipeline-bot). Two payload variants: SysDiag (active exfiltration — 449 GB, 575K files stolen) and Optimize-Build (dormant workflow_dispatch backdoor fireable via GitHub API). Dormant backdoors persist in repos that patched the active variant without auditing all workflow files."

  - name: "Open-Source Package Tag Poisoning via Repository Fork Hijack (Laravel-Lang / TeamPCP Wave)"
    mitre_id: "T1195.001"
    description: "Threat actors exploit GitHub fork-tag mechanism to rewrite version tags across multiple packages simultaneously, injecting credential-stealing RCE payloads that auto-execute via package manager autoloaders. Laravel-Lang (May 22: 700+ repos, 233 versions, 15-module PHP credential stealer) and TeamPCP GitHub internal breach via poisoned Nx Console VS Code extension (May 18) are confirmed instances of this coordinated technique."

  - name: "Hosting Server Root Escalation via Incorrect Privilege Assignment (LiteSpeed CVE-2026-48172)"
    mitre_id: "T1068"
    description: "CVE-2026-48172 — CVSS 10.0 incorrect privilege assignment in LiteSpeed User-End cPanel Plugin. Single malformed API call to lsws.redisAble elevates any cPanel user to root. State-linked actor immediately weaponized for targeted campaigns against SE Asian government/military entities and MSP/hosting providers."

  - name: "AI Platform Initial Access via Unauthenticated RCE (Langflow / MuddyWater)"
    mitre_id: "T1190"
    description: "MuddyWater (Iranian state actor, MOIS) exploiting CVE-2025-34291 in Langflow AI builder since January 23, 2026 — CVSS 9.4, no authentication required. State actors now treat AI workflow platforms as a new initial-access surface equivalent to VPN/firewall appliances. Flodric botnet also deployed via this vector. CISA KEV June 4 deadline (T-7 days)."

