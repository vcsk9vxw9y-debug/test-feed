stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Day 6 AM. Campaign sustained at 1,055 compromised versions across 502 packages (npm: 1,048, PyPI: 6, Composer: 1). 25,000+ GitHub repos credential-leaked; 2,500+ malicious repos created using exfiltrated tokens. Full toolkit 16 days public (GitHub May 12, BreachForums repost May 24 with $1,000 copycat competition now Day 5). NEW ESCALATION THIS RUN: Mini Shai-Hulud has produced malicious npm packages with valid SLSA Build Level 3 provenance attestations by using stolen OIDC tokens with the legitimate Sigstore stack — the first documented supply chain worm to bypass SLSA integrity verification. SLSA provenance confirms which pipeline produced the artifact, not whether the pipeline behaved legitimately; this invalidates SLSA Build Level 3 as a standalone trust signal for packages installed since May 12. GLASSWORM TAKEDOWN PROVIDES NO COVERAGE — Glassworm and Mini Shai-Hulud are distinct campaigns. ALSO NOTE: TrapDoor (new campaign, first detected May 22) is a THIRD INDEPENDENT supply chain campaign targeting PyPI/npm/Crates.io — all three developer supply chain threats require independent remediation. None of our direct requirements.txt packages are on the confirmed 502-package poisoned list as of May 28 AM, but multi-actor expansion with active copycat incentivization makes new targets unpredictable. POSTURE ACTIONS: (1) pip install --require-hashes via pip-tools — highest-leverage PyPI defense; (2) Do not rely on SLSA Build Level 3 attestations alone for npm packages since May 12 — stolen OIDC tokens can produce valid attestations for backdoored packages; (3) Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; (4) Rotate all GitHub OIDC tokens; (5) Add runtime egress monitoring during pip install in CI."

  - id: "TrapDoor-2026"
    package: "npm/PyPI/Crates.io ecosystem — TrapDoor cross-ecosystem supply chain + AI coding assistant poisoning campaign (no CVE assigned)"
    severity: "critical"
    in_requirements: false
    action: "NEW THIS RUN (first detected May 22 by Socket.dev). 34 malicious packages, 384+ versions across npm, PyPI, AND Crates.io. PRIMARY THREAT VECTOR FOR OUR STACK: TrapDoor plants malicious .cursorrules and CLAUDE.md files using zero-width Unicode characters (U+200B, U+200C, U+200D) to hide malicious instructions that trick AI coding assistants (Claude Code, Cursor, Copilot) into running a fake 'security scan' that silently exfiltrates developer credentials. Attacker submitted poisoned PRs to prominent AI projects (LangChain, MetaGPT, OpenHands) — our CLAUDE.md file is a direct and novel attack surface. Persistence mechanisms: Git hooks, shell hooks, systemd, cron, SSH key injection via trap-core.js shared payload. Stolen credentials validated via AWS and GitHub API calls to filter high-value secrets. Targets: crypto, DeFi, Solana, and AI development communities. None of our requirements.txt packages confirmed on TrapDoor's malicious package list; however, our use of PyPI for pip installs and presence of CLAUDE.md in the repo makes this directly applicable. IMMEDIATE ACTIONS: (1) Audit CLAUDE.md and all .cursorrules files in the repo and any open PRs for zero-width Unicode: grep -rP '[\\x{200B}\\x{200C}\\x{200D}\\x{FEFF}]' . — any hit is a TrapDoor IOC; (2) Review all PRs opened since May 22 for poisoned AI config files from unknown contributors; (3) Inspect .git/hooks/ for unexpected scripts added since May 22; (4) Rotate AWS IAM keys, GitHub PATs, npm/PyPI publish tokens on any environment that ran unverified PyPI packages since May 22; (5) Cross-reference installed packages against Socket.dev TrapDoor IOC advisory."

  - id: "CVE-2026-27205"
    package: "flask (web framework — in requirements.txt)"
    severity: "medium"
    in_requirements: true
    action: "Flask information disclosure via missing Vary: Cookie header when session accessed with 'in' operator. AFFECTS FLASK <= 3.1.2 ONLY. Our pinned flask==3.1.3 is CONFIRMED PATCHED — no upgrade needed. Verify deployment is running 3.1.3 and not an older cached Railway image layer. If any caching proxy (CDN, nginx proxy_cache, Varnish) sits upstream of Flask, verify Vary: Cookie is correctly set on all session-bearing responses."

  - id: "CVE-2026-42945"
    package: "nginx (web infrastructure — Railway reverse proxy layer)"
    severity: "critical"
    in_requirements: false
    action: "NGINX Rift — Day 17 of exploitation. Heap overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. CVSS 9.2 unauthenticated RCE via single HTTP request. Censys: ~5.7M exposed vulnerable nginx servers. Upgrade to nginx 1.30.1 / 1.31.0 or nginx Plus R32 P6 / R36 P4. Verify Railway deployment nginx version. Replace unnamed PCRE captures with named captures in all rewrite configs as stopgap. Chain: NGINX Rift + Copy Fail/Dirty Frag + ssh-keysign-pwn (CVE-2026-46333) = full root compromise with SSH key exfiltration. Active chaining with Linux kernel LPEs ongoing — Day 17."

