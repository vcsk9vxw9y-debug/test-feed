    mitre_id: "T1553.002"
    description: "Mini Shai-Hulud (TeamPCP) escalated by producing malicious npm packages with valid SLSA Build Level 3 provenance attestations — the first documented instance of a supply chain worm bypassing SLSA integrity verification. Stolen OIDC tokens (exfiltrated from CI/CD pipeline runner memory during package installation) were used with the legitimate Sigstore signing stack to generate cryptographically valid attestations for backdoored packages. SLSA provenance attests to the build pipeline identity, not pipeline behavior. PM UPDATE: GitHub shipped npm staged publishing 2FA gate (May 22, now GA) to block stolen-token publish vector; GitHub internal repos confirmed breached (3,800 repos) via poisoned Nx Console extension."

