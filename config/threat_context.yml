stack_intersection:
  - alert: "TrapDoor (T1195.001 + T1204.002) — CRITICAL NEW STACK THREAT. Our CLAUDE.md file is a direct and novel attack surface for TrapDoor's AI assistant poisoning technique. TrapDoor plants hidden instructions in CLAUDE.md using zero-width Unicode characters that are invisible to human reviewers but are read and executed by Claude Code. IMMEDIATE ACTIONS: (1) Audit our CLAUDE.md file for zero-width Unicode: grep -P '[\\x{200B}\\x{200C}\\x{200D}\\x{FEFF}]' CLAUDE.md; (2) Review all open PRs in the repo since May 22 for poisoned AI config files from external contributors; (3) Inspect .git/hooks/ for unexpected scripts added since May 22; (4) Verify all pip installs since May 22 were hash-verified against requirements.txt; (5) This is a THIRD independent supply chain threat — Glassworm and Mini Shai-Hulud remediations do not cover TrapDoor."

  - alert: "Mini Shai-Hulud SLSA provenance bypass (T1553.002) — SUPPLY CHAIN TRUST MODEL UPDATE. Mini Shai-Hulud now produces malicious npm packages with valid SLSA Build Level 3 attestations via stolen OIDC/Sigstore tokens. While our Python dependencies use PyPI (not npm), this demonstrates that SLSA attestations can be forged by anyone who controls the OIDC token for a package's signing pipeline. pip install --require-hashes via pip-tools remains the highest-leverage defense for our PyPI dependencies — hash-pinning to known-good hashes predating the compromise window is not affected by SLSA attestation forgery. However, do not introduce new npm dependencies to our stack without additional supply chain review beyond SLSA provenance."

  - alert: "Mini Shai-Hulud (CVE-2026-45321, T1195.001) — Day 6 AM. Campaign sustained at 1,055 versions / 502 packages / 25,000+ repos. Toolkit 16 days public; BreachForums copycat competition Day 5. Our Python/Flask app installs from PyPI via pip; requirements.txt packages remain off the confirmed poisoned list but multi-actor expansion is unpredictable. pip install --require-hashes via pip-tools is THE SINGLE HIGHEST-LEVERAGE UNRESOLVED DEFENSIVE ACTION. Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; rotate all GitHub OIDC tokens; add runtime egress monitoring during pip install."

  - alert: "Glassworm developer botnet (T1195.001) — C2 DISRUPTED May 26 but developer machines REMAIN INFECTED with active persistence. Our Python/Flask CI/CD and developer workstations are confirmed Glassworm target profile. IMMEDIATE ACTIONS: (1) Audit Windows HKCU/HKLM Run keys and macOS ~/Library/LaunchAgents/ for persistence artifacts; (2) Search for os.node and darwin.node files — confirmed Glassworm artifacts; (3) Audit VS Code, Cursor, Windsurf, Positron extension directories for unexpected extensions installed since early 2026; (4) Rotate all developer credentials from IDE config and .env files — GitHub PATs, AWS IAM keys, npm/PyPI publish tokens; (5) Run EDR scan for outbound connections to Solana RPC endpoints or BitTorrent DHT at startup."

