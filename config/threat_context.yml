stack_intersection:
  - alert: "Mini Shai-Hulud (CVE-2026-45321, T1195.001) — CRITICAL POSTURE ITEM, MULTI-ACTOR TOOLKIT 14 DAYS PUBLIC. Campaign Day 4: 1,055 versions / 502 packages / 25,000+ repos credential-leaked. Full toolkit public since May 12; BreachForums $1,000 copycat contest active since May 24. Our Python/Flask app installs from PyPI via pip; requirements.txt packages remain off the confirmed poisoned list, but multi-actor expansion and copycat incentivization mean new waves are not telegraphed. IMMEDIATE ACTIONS: (1) pip install --require-hashes via pip-tools — THE SINGLE HIGHEST-LEVERAGE UNRESOLVED DEFENSIVE ACTION; (2) Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; (3) Rotate all GitHub OIDC tokens; (4) Add runtime egress monitoring to CI pipelines during pip install; (5) npm ci --audit on any JavaScript dependencies."

  - alert: "Megalodon CI/CD backdoor (T1072, Day 8) — audit ALL .github/workflows/ files for unexpected new workflows or modified triggers. Search git log on .github/workflows/ since May 18 for commits from build-bot, auto-ci, ci-bot, pipeline-bot author names — these are Megalodon IOCs. Check for workflow_dispatch triggers not operator-added. Search git log for Megalodon ingest server IP: 216.126.225.129."

  - alert: "CVE-2026-27205 Flask (in requirements.txt, in_requirements: true) — flask==3.1.3 is CONFIRMED PATCHED (CVE affects <= 3.1.2 only). No action required on Flask itself. Verify Railway deployment is running pinned 3.1.3 and not an older cached image. If any caching proxy sits upstream, verify Vary: Cookie is correctly set on session-bearing responses."

  - alert: "CVE-2026-42945 NGINX Rift (Day 15) — verify nginx version in Railway deployment and any reverse-proxy layer. If nginx < 1.30.1 / 1.31.0, upgrade immediately. Audit all rewrite configs for unnamed PCRE captures with '?' in replacement string. Active RCE-to-root chaining with Copy Fail + Dirty Frag + ssh-keysign-pwn is Day 15 ongoing — three-path kill chain to root."

  - alert: "CVE-2026-46333 ssh-keysign-pwn (NEW — Day 6 of public exploit circulation) — nine-year-old Linux kernel ptrace race condition with four working Qualys exploits now public. Any unprivileged shell on Railway's Linux host can reach root AND exfiltrate SSH host private keys. Verify Railway platform has applied kernel patches (upstream patches and distro updates available). If Railway is on a pre-patch kernel, any compromise of a co-tenant or our own process can escalate to root + full SSH key theft. This extends the NGINX Rift kill chain: RCE → shell → ssh-keysign-pwn → root + SSH key exfiltration."

  - alert: "Copy Fail (CVE-2026-31431) + Dirty Frag (CVE-2026-43284) — KEV deadlines passed. Verify Railway platform host kernel is patched (>= 6.18.22 / >= 6.19.12 / 7.0). Confirm esp4/esp6/AF_ALG blacklist mitigations persist across kernel updates. Active chaining with NGINX Rift Day 15 and now ssh-keysign-pwn (CVE-2026-46333) makes this a three-path RCE-to-root kill chain."

  - alert: "CVE-2026-41091 Defender LPE (CISA June 3, T-8 days) — Day 16 of RedSun/UnDefend exploitation. Run Get-MpComputerStatus | Select AMEngineVersion on all Windows development or CI/CD hosts; flag any host at < 1.1.26040.8 as actively at risk."

  - alert: "Windows YellowKey (CVE-2026-45585) + GreenPlasma + MiniPlasma — three unpatched Nightmare Eclipse zero-days, all June 10 Patch Tuesday (T-15 days). Any Windows developer machine is at risk. YellowKey: apply WinRE mitigation (remove autofstx.exe from BootExecute) and enable TPM+PIN BitLocker. GreenPlasma/MiniPlasma: AppLocker/WDAC blocking untrusted process execution from user context is the primary mitigation."

  - alert: "CVE-2026-42897 Exchange OWA (CISA May 29 deadline, T-3 days) — if any on-prem Exchange is in partner infrastructure, escalate immediately. Confirmed mitigation gaps as of May 19; OWA restriction to VPN/zero-trust is the most reliable current defense."

  - alert: "Laravel-Lang supply chain attack (T1195.001, May 22) — not in our Python/Flask stack. However, the GitHub fork-tag poisoning technique is directly transferable to PyPI. With the Mini Shai-Hulud toolkit now 14 days public and multi-actor, this attack class is live across all package ecosystems. pip install --require-hashes is THE SINGLE MOST URGENT UNRESOLVED POSTURE ITEM in our stack."

  - alert: "Ghost CMS CVE-2026-26980 ClickFix campaign (active today) — not in our Python/Flask stack. However, the SQLi → admin key theft → JavaScript injection → ClickFix social engineering kill chain demonstrates that web application SQL injection vulnerabilities are being immediately weaponized for end-user credential theft at scale. Audit any web application component with SQL injection risk. Bleach is in our requirements.txt for HTML sanitization — verify bleach==6.3.0 has no outstanding XSS bypass CVEs, as our rendering pipeline is a downstream ClickFix-style risk surface."

  - alert: "Verizon DBIR 2026 (published May 25) — supply chain breaches up 60% and now in 48% of all corporate breaches; only 26% of CISA KEVs remediated in 2025; median patch time 43 days. These statistics describe our current threat environment precisely: we operate in the ecosystem most affected by the #1 breach vector shift. Every unresolved KEV deadline and every unimplemented hash-pinning requirement represents statistical exposure at the DBIR-quantified level."

  - alert: "TeamPCP GitHub internal breach (May 18) via poisoned Nx Console VS Code extension — audit all VS Code extensions on developer workstations for updates published on or near May 18. Extensions with filesystem/network access and narrow publish windows (< 30 minutes) should be treated as suspicious. Developer machines with Nx Console installed between May 18 12:30-12:48 UTC should be treated as potentially compromised."

landscape_summary: "The May 26 PM run marks a two-deadline crunch: Drupal CVE-2026-9082 expires TOMORROW (May 27, T-1 day) with 15,000+ active exploitation attempts and a public PoC accelerating scan rates, while PAN-OS CVE-2026-0300 patch window closes the following day (May 28, T-2 days) after CL-STA-1132's 47-day China-nexus state actor campaign — any unpatched PAN-OS since April 9 must be treated as persistently compromised. NEW TODAY: Ghost CMS CVE-2026-26980 (CVSS 9.4, patched February 2026 and still unpatched across 700+ sites) is being exploited at scale by two competing threat groups to inject ClickFix social-engineering malware into Harvard, Oxford, DuckDuckGo and 697+ other compromised sites; and CVE-2026-46333 (ssh-keysign-pwn, nine-year-old Linux kernel ptrace race condition) now has four working Qualys exploits in public circulation — unprivileged shell to root plus SSH private key exfiltration, directly extending the NGINX Rift (Day 15) kill chain against Railway's host infrastructure. For our Python/Flask stack on Railway: pip install --require-hashes via pip-tools remains the single highest-leverage unresolved defensive action after 14 days of the Mini Shai-Hulud toolkit in public circulation with active BreachForums copycat incentivization; CVE-2026-46333 now adds an SSH key exfiltration risk to the existing NGINX Rift + Copy Fail + Dirty Frag Linux kill chain that Aegis must verify is patched at the Railway platform layer."
