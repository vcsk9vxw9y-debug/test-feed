  - alert: "TeamPCP GitHub internal breach (May 18-20, UNC6780) via poisoned Nx Console VS Code extension — audit all VS Code extensions installed on developer workstations for suspicious updates published on or after May 18, particularly any extension updated in a very narrow time window. Extensions with filesystem or network access should be verified against known-good versions. Developer workstations with the Nx Console installed between May 18 12:30-12:48 UTC should be treated as potentially compromised."
  - alert: "Langflow CVE-2025-34291 (MuddyWater) — not in our stack. Flag to any partner orgs running Langflow; if internet-exposed since January 23, treat as compromised and rotate all workspace credentials."

landscape_summary: "The May 22-23 Laravel-Lang supply chain breach (T1195.001) is the PM run's highest-novelty development: 700+ GitHub repos poisoned via fork-tag hijack, deploying a 15-module PHP credential stealer targeting cloud platform keys (AWS/GCP/Azure/DigitalOcean), Kubernetes tokens, HashiCorp Vault secrets, CI/CD environment variables, SSH private keys, and browser-stored passwords — any composer install environment resolving an affected tag between May 22 and Packagist takedown is fully compromised and requires immediate credential rotation across all secret classes. This attack is part of a coordinated supply chain campaign (TanStack -> TeamPCP/Nx Console GitHub breach May 18 -> Laravel-Lang May 22) targeting the PHP/IDE-extension/npm ecosystem, confirming that open-source package tag poisoning via repository fork hijack (T1195.001) is an actively weaponized technique — directly transferable to PyPI and our Python dependency chain, making requirements.txt hash pinning the single highest-leverage unresolved posture item in our stack. In parallel: CVE-2026-41091 Defender LPE (CISA June 3, T-11 days) and CVE-2026-42897 Exchange OWA XSS (CISA May 29, T-6 days, no permanent patch, confirmed mitigation gaps) remain the highest-urgency Windows-ecosystem action items; Cisco Secure Workload CVE-2026-20223 (CVSS 10.0, unauthenticated cross-tenant REST API access) is a new critical item patched this cycle requiring immediate upgrade if Secure Workload is present; NGINX Rift CVE-2026-42945 enters Day 11 with ~5.7M servers still exposed and active chaining with Linux kernel LPE for full root compromise."
