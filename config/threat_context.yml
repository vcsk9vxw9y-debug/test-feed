  - alert: "CVE-2026-42945 NGINX Rift (Day 19) — verify nginx version in Railway deployment. If nginx < 1.30.1 / 1.31.0, upgrade immediately. Audit rewrite configs for unnamed PCRE captures with '?' in replacement. Active RCE-to-root chaining with Copy Fail + Dirty Frag + ssh-keysign-pwn is Day 19 ongoing."

