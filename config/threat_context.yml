stack_intersection:
  - alert: "Mini Shai-Hulud PyPI/npm worm (CVE-2026-45321, T1195.001) — CRITICAL FOR OUR STACK. Our Python/Flask app installs dependencies from PyPI via pip. While our direct requirements.txt packages (flask, feedparser, apscheduler, pyyaml, gunicorn, requests, bleach, python-dateutil) are NOT on the confirmed poisoned list as of May 23, the worm is in ACTIVE EXPANSION with new packages being identified hourly. The self-replicating OIDC token mechanism means any CI/CD pipeline running our pip install is at risk of becoming a propagation node if a transitive dependency becomes infected. IMMEDIATE ACTIONS: (1) implement pip install --require-hashes via pip-tools — this is the single highest-leverage defensive action available right now; (2) audit Railway and GitHub Actions workflows for unexpected package-publish permissions; (3) rotate all GitHub OIDC tokens used in deployment pipelines; (4) add runtime egress monitoring to CI pipelines to detect unexpected network connections during package install."
  - alert: "CVE-2026-45321 Megalodon CI/CD backdoor (T1072) — audit all .github/workflows/ files for unexpected new workflows or modified triggers. Check git log on .github/workflows/ since May 18 for any commits from build-bot, auto-ci, ci-bot, or pipeline-bot author names — these are Megalodon IOCs. Review Railway deployment workflows for any workflow_dispatch triggers that were not operator-added."
  - alert: "CVE-2026-41091 Defender LPE (CISA June 3, T-11 days) — any Windows development or CI/CD hosts are in scope. Run `Get-MpComputerStatus | Select AMEngineVersion` immediately; flag any host at < 1.1.26040.8 as actively at risk."
  - alert: "CVE-2026-42945 NGINX Rift (Day 12) — verify nginx version in Railway deployment and any reverse-proxy layer. If nginx < 1.30.1, upgrade immediately. Audit all rewrite configs for unnamed PCRE captures with '?' in replacement string."
  - alert: "CVE-2026-27205 Flask (in requirements.txt) — flask==3.1.3 is CONFIRMED PATCHED (CVE affects <= 3.1.2 only). No action required on Flask itself. Verify deployment layer is running pinned 3.1.3 and not an older cached image. If any caching proxy sits upstream, verify Vary: Cookie is correctly set on all session-bearing responses."
  - alert: "CVE-2026-42897 Exchange OWA (CISA May 29 deadline, T-6 days) — if any on-prem Exchange is in partner infrastructure, escalate immediately. Confirmed mitigation gaps; OWA restriction to VPN is the most reliable current defense."
  - alert: "Copy Fail (CVE-2026-31431) + Dirty Frag (CVE-2026-43284) — KEV deadlines passed. Verify Railway platform host kernel is patched (>= 6.18.22 / >= 6.19.12 / 7.0). Confirm esp4/esp6/AF_ALG blacklist mitigations persist across kernel updates."
  - alert: "Laravel-Lang supply chain attack (T1195.001, May 22, Day 2) — not in our Python/Flask stack (we use pip/PyPI, not Composer/Packagist). However, the GitHub fork-tag poisoning technique is directly transferable to PyPI. The Mini Shai-Hulud worm now confirms this is an ACTIVE threat against PyPI. Requirements.txt hash pinning (pip install --require-hashes) is NOW THE SINGLE MOST URGENT UNRESOLVED POSTURE ITEM in our stack — implement before next deployment cycle."
  - alert: "TeamPCP GitHub internal breach (May 18-20, UNC6780) via poisoned Nx Console VS Code extension — audit all VS Code extensions on developer workstations for updates published on or near May 18. Extensions with filesystem or network access and a very narrow publish window (< 30 minutes) should be treated as suspicious. Developer machines with Nx Console installed between May 18 12:30-12:48 UTC should be treated as potentially compromised."

landscape_summary: "The May 23 PM run is dominated by the TeamPCP Mini Shai-Hulud self-replicating worm (CVE-2026-45321), which has poisoned 500+ versions across 170+ npm and PyPI packages (518M combined downloads) and is in active expansion today. The worm's OIDC token hijack propagation and first-ever defeat of SLSA Build Level 3 attestations represent a supply chain paradigm shift — for our Python/Flask stack, pip install --require-hashes via pip-tools is the single highest-leverage unresolved defensive action, and all CI/CD OIDC tokens must be rotated immediately. This is the fifth escalation wave of the TeamPCP campaign (Trivy March 19 to TanStack May 11 to Nx Console/GitHub breach May 18 to Megalodon 5,561 repos May 18 to Laravel-Lang May 22 to Mini Shai-Hulud expansion May 23). In parallel: Drupal CVE-2026-9082 (CISA KEV, federal deadline May 27 T-4 days, 15,000 exploitation attempts targeting PostgreSQL backends) is the highest-urgency new KEV entry today; CVE-2026-42897 Exchange OWA XSS (CISA May 29 T-6 days, no permanent patch, confirmed mitigation gaps) and CVE-2026-41091 Defender LPE (CISA June 3 T-11 days, RedSun/UnDefend campaigns) remain the top Windows-ecosystem action items; Cisco SD-WAN CVE-2026-20182 (CVSS 10.0, sixth SD-WAN zero-day of 2026, UAT-8616 attribution) is a new critical item for organizations with SD-WAN in their network path; and NGINX Rift CVE-2026-42945 enters Day 12 with approximately 5.7M servers still exposed and active chaining with Linux kernel LPE for full root compromise."
