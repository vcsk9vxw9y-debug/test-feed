  - id: "CVE-2026-46333"
    package: "linux-kernel ptrace (host OS — Railway infrastructure, all major Linux distros)"
    severity: "high"
    in_requirements: false
    action: "ssh-keysign-pwn — nine-year-old ptrace race condition (present since Linux v4.10, November 2016). Disclosed by Qualys May 20, 2026; four working public exploits now circulating for 8 days covering chage, ssh-keysign, pkexec, and accounts-daemon attack paths. Any unprivileged shell on a vulnerable host can read /etc/shadow, exfiltrate SSH host private keys, or execute commands as root. Affects default Debian, Ubuntu, Fedora installs. Upstream patches and distro updates available. This extends the NGINX Rift kill chain: RCE via nginx -> local shell -> ssh-keysign-pwn -> root + SSH key theft. Verify Railway host kernel is patched."

