trending_techniques:
  - name: "OIDC Token Hijack for Cross-Registry Package Self-Propagation (Mini Shai-Hulud / TeamPCP) — Toolkit Now Public"
    mitre_id: "T1195.001"
    description: "Mini Shai-Hulud steals OpenID Connect tokens from CI/CD pipeline runner memory during malicious package execution, then uses them to authenticate to PyPI and npm as the legitimate maintainer and publish backdoored versions of packages the infected pipeline has write permissions on — autonomous self-propagation with no further attacker involvement. Day 2: TeamPCP has open-sourced the full toolkit on BreachForums. Copycat actors now have the CI cache-poisoning scripts, OIDC extractor, and credential stealer. Campaign confirmed at 1,055 versions / 502 packages / 25,000+ repos credential-leaked."
  - name: "Bulk CI/CD Workflow Backdooring via Mass Automated Repository Commits (Megalodon / TeamPCP)"
    mitre_id: "T1072"
    description: "Megalodon (TeamPCP, May 18, Day 6) pushed 5,718 commits to 5,561 distinct GitHub repos in 6 hours using four rotating CI-maintenance author names (build-bot, auto-ci, ci-bot, pipeline-bot). Two payload variants: SysDiag (active exfiltration on every push/PR; 449 GB, 575K files stolen) and Optimize-Build (dormant workflow_dispatch backdoor fireable via GitHub API). Dormant backdoors persist in repos that patched the active variant without auditing all workflow files."
  - name: "Open-Source Package Tag Poisoning via Repository Fork Hijack (Laravel-Lang / TeamPCP Wave)"
    mitre_id: "T1195.001"
    description: "Threat actors exploit GitHub's fork-tag mechanism to rewrite version tags across multiple packages simultaneously, injecting credential-stealing RCE payloads that auto-execute via package manager autoloaders (Composer, npm, pip). Laravel-Lang (May 22: 700+ repos, 233 versions, 15-module PHP credential stealer) and TeamPCP GitHub internal breach via poisoned Nx Console VS Code extension (May 18: 3,800 GitHub internal repos exfiltrated) are confirmed instances of the same coordinated supply chain campaign."
  - name: "Hosting Server Root Escalation via Incorrect Privilege Assignment (LiteSpeed CVE-2026-48172)"
    mitre_id: "T1068"
    description: "CVE-2026-48172 — CVSS 10.0 incorrect privilege assignment in LiteSpeed User-End cPanel Plugin allows any cPanel user to execute arbitrary scripts as root via a single malformed API call to lsws.redisAble. No race condition or authentication gap required. A previously unknown state-linked threat actor immediately weaponized this for targeted campaigns against SE Asian government/military entities and MSP/hosting providers across multiple countries. Demonstrates that web server management plugins are now an active initial-access surface for state actors targeting hosting infrastructure."
  - name: "Windows Cloud Filter Driver LPE via Incomplete CVE Patch (MiniPlasma)"
    mitre_id: "T1068"
    description: "MiniPlasma — no CVE assigned (targeting originally-reported CVE-2020-17103 Windows Cloud Filter driver, cldflt.sys). Public PoC released May 13 by researcher Nightmare-Eclipse, who claims Microsoft silently rolled back the original 2020 patch. Achieves SYSTEM privileges on fully patched Windows 11 Pro (May 2026 Patch Tuesday). No emergency patch; fix expected June 10 Patch Tuesday. BleepingComputer confirmed exploitation against standard user account. Any Windows endpoint without third-party LPE mitigations (AppLocker, WDAC, behavior-based EDR) is at risk until June 10."
  - name: "AI Platform Initial Access via Unauthenticated RCE (Langflow / MuddyWater)"
    mitre_id: "T1190"
    description: "MuddyWater (Iranian state actor, MOIS) exploiting CVE-2025-34291 in Langflow AI builder since January 23, 2026 — CVSS 9.4, no authentication, CORS/CSRF/code-execution-endpoint triple weakness. State actors now treat AI workflow platforms as a new initial-access surface equivalent to VPN/firewall appliances. Flodric botnet also deployed via this vector. CISA KEV June 4 deadline (T-11 days)."
  - name: "Security Tool as Malware Delivery Platform (Apex One CVE-2026-34926)"
    mitre_id: "T1072"
    description: "CVE-2026-34926 in Trend Micro Apex One enables attackers to modify the server key table and push malicious payloads to all connected endpoint agents through the legitimate security product update channel — bypassing behavioral and AV controls by design. Security product update mechanism becomes a trusted malware delivery vehicle. CISA KEV June 4 deadline (T-11 days)."
  - name: "AV Engine Link-Following Privilege Escalation (Defender CWE-59)"
    mitre_id: "T1068"
    description: "CVE-2026-41091 — CWE-59 symlink/junction race in Microsoft Malware Protection Engine running as SYSTEM. Local low-privilege attacker redirects engine file writes into protected system directories. Day 14 of exploitation by RedSun and UnDefend campaigns. CISA KEV June 3 deadline (T-10 days). Unpatched Defender simultaneously enables LPE and degrades AV coverage — the security tool's presence becomes a liability."
  - name: "Email-Borne XSS for Browser Session Hijack (Exchange OWA CVE-2026-42897)"
    mitre_id: "T1566.001"
    description: "CVE-2026-42897 — crafted email triggers reflected XSS in Exchange OWA, executing arbitrary JavaScript in victim's browser context. Active exploitation confirmed; CISA KEV deadline May 29 (T-5 days). No permanent patch; EEMS/EOMT mitigation gaps confirmed May 19. Effective against any organization running on-premises Exchange without OWA restricted to VPN/zero-trust."
  - name: "Web Infrastructure RCE via PCRE Heap Overflow (NGINX Rift, Day 13)"
    mitre_id: "T1190"
    description: "CVE-2026-42945 NGINX Rift — Day 13 of exploitation against ~5.7 million vulnerable internet-exposed nginx servers. Single unauthenticated HTTP request triggers heap buffer overflow in ngx_http_rewrite_module via unnamed PCRE captures with '?' in replacement. Multiple threat actors using public PoC. Chained with Linux kernel LPE (Copy Fail CVE-2026-31431, Dirty Frag CVE-2026-43284) for full root compromise."
  - name: "Network Infrastructure Takeover via CVSS 10.0 Authentication Bypass (Cisco SD-WAN / UAT-8616)"
    mitre_id: "T1190"
    description: "CVE-2026-20182 — CVSS 10.0 authentication bypass in Cisco Catalyst SD-WAN vdaemon DTLS peering; attacker spoofs vHub device identity to gain trusted control-plane peer status. Sixth Cisco SD-WAN zero-day in 2026. UAT-8616 (overlaps with monitored ORB networks, targets critical infrastructure) uses post-exploitation for SSH key injection, NETCONF manipulation, root LPE via CVE-2022-20775 software version downgrade, and log clearing."
  - name: "State-Sponsored Perimeter Exploitation with Multi-Week Dwell (PAN-OS / CL-STA-1132)"
    mitre_id: "T1190"
    description: "CL-STA-1132 (China-nexus) exploiting CVE-2026-0300 in PAN-OS since April 9 — 46-day ongoing campaign, patch window closes May 28 (T-4 days). State actor playbook: exploit perimeter appliance, maintain persistence through patch window, exfiltrate during dwell period. Organizations with unpatched PAN-OS since April 9 should assume persistent access and lateral movement."

