    technique: "Exploiting CVE-2026-20182 CVSS 10.0 authentication bypass via vdaemon DTLS peering spoofing since at least early May 2026. Post-exploitation: SSH key injection into /etc/authorized_keys, NETCONF configuration manipulation, software version downgrade to trigger CVE-2022-20775 for root, malicious account creation, extensive log clearing. Sixth SD-WAN zero-day UAT-8616 has exploited in 2026 — ongoing systematic targeting of Cisco SD-WAN estate."
