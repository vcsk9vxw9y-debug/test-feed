landscape_summary: "AM May 29 — Exchange CVE-2026-42897 CISA KEV deadline expires TODAY EOD with no permanent patch and confirmed EEMS/EOMT gaps since May 19; OWA restriction to VPN/zero-trust is the only reliable defense and is mandatory now for every on-premises Exchange deployment. SymJack (Adversa AI, SecurityWeek) is a new AI coding agent attack technique that uses renamed symlinks in malicious repositories to silently install attacker-controlled MCP servers during approved file operations — confirmed against Claude Code, Cursor, Copilot, Gemini CLI, Grok Build, and Codex CLI; hardened Claude Code builds resolve symlinks before approval, but unupdated installations remain exposed. CVE-2026-41089 Windows Netlogon (CVSS 9.8, wormable, May 12 Patch Tuesday — Day 17 unpatched) enables unauthenticated domain controller RCE with autonomous propagation in the same class as MS08-067; FortiClient CVE-2026-35616 (CISA KEV Day 53) EKZ infostealer campaign continues delivering browser credential theft via weaponized EMS update pushes; TrapDoor AI assistant poisoning campaign (Day 10, 34 packages/384+ versions across npm/PyPI/Crates.io) and all concurrent developer-targeting threats remain active and unresolved for our Python/Flask development stack."
