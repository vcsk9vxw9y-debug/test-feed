stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Self-replicating worm (TeamPCP / UNC6780) actively poisoning npm and PyPI packages via OIDC token hijack. 170+ packages / 518M downloads affected. None of our direct requirements.txt dependencies are on the confirmed poisoned list as of May 23, but the worm is in active expansion. CRITICAL POSTURE ACTION: implement pip install --require-hashes via pip-tools NOW — this is the single most effective available mitigation. Audit all CI/CD pipelines (Railway GitHub Actions, any deployment scripts) for unexpected package-publish permissions. Rotate all GitHub OIDC tokens used in Railway/GH Actions workflows. Verify no unexpected versions of our own packages (if any) have been published since May 11. Worm defeats SLSA Build Level 3 attestations by injecting into source repos — attestation alone insufficient. Add runtime egress monitoring to CI pipelines."
  - id: "CVE-2026-20182"
    package: "cisco catalyst sd-wan controller and sd-wan manager (network infrastructure)"
    severity: "critical"
    in_requirements: false
    action: "CVSS 10.0. Authentication bypass via vdaemon DTLS peering (UDP 12346): attacker claims vHub device identity, device-type certificate verification is skipped, peer authenticated as trusted control-plane node. Sixth actively exploited SD-WAN zero-day in 2026. UAT-8616 (highly sophisticated, targets critical infrastructure, ORB network overlap) confirmed exploiting. Post-exploitation: SSH key injection, NETCONF configuration manipulation, root privilege escalation via CVE-2022-20775 software version downgrade, extensive log clearing. Patch: Cisco advisory cisco-sa-sdwan-rpa2-v69WY2SW. Hunt /var/log/auth.log for Accepted publickey from unauthorized IPs; review control-connection peering events. If SD-WAN is in network path: patch immediately and treat unpatched period as potential UAT-8616 compromise."
  - id: "CVE-2026-9082"
    package: "drupal core (cms — not in our stack, CISA KEV T-4 days)"
    severity: "critical"
    in_requirements: false
    action: "CISA KEV May 22, federal deadline May 27 (T-4 DAYS). Unauthenticated SQL injection in Drupal Core PostgreSQL EntityQuery condition handler. CVSS 6.5 (understated — allows unauthenticated data exfiltration, modification, and in some configs privilege escalation or RCE). Affects Drupal 8.0 to 11.3.9 on PostgreSQL backends only (MySQL/MariaDB/SQLite not affected). 15,000 exploitation attempts across 65 countries targeting gaming and financial services. Patch to 11.3.10+ or apply SA-CORE-2026-004. Not in our stack but flag to any partner orgs running PostgreSQL-backed Drupal — deadline T-4 days."
