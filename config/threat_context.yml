stack_intersection:
  - alert: "CVE-2026-41091 Defender LPE — any Windows development or CI/CD hosts are in scope. Run `Get-MpComputerStatus | Select AMEngineVersion` immediately; flag any host at < 1.1.26040.8 as actively at risk. CISA June 3 deadline."
  - alert: "CVE-2026-42945 NGINX Rift (Day 11) — verify nginx version in Railway deployment and any reverse-proxy layer. If nginx < 1.30.1, upgrade immediately. Audit rewrite configs for unnamed PCRE captures."
  - alert: "CVE-2026-27205 Flask (in requirements.txt) — flask==3.1.3 is PATCHED (CVE affects <= 3.1.2 only). No action required on flask itself. Confirm deployment is running 3.1.3. If any caching proxy (CDN, nginx proxy_cache) sits upstream, verify Vary: Cookie is being set correctly on session-bearing responses."
  - alert: "CVE-2026-42897 Exchange OWA — May 29 deadline is T-6 days. If any on-prem Exchange in partner infrastructure, escalate immediately. Mitigation gaps confirmed; OWA restriction to VPN is the most reliable current defense."
  - alert: "Copy Fail (CVE-2026-31431) + Dirty Frag family — KEV deadlines passed. Verify Railway platform kernel is patched (>= 6.18.22 / 6.19.12 / 7.0). Confirm esp4/esp6/rxrpc blacklist mitigations persist across kernel updates. Non-compliant if unpatched."
  - alert: "Langflow CVE-2025-34291 (MuddyWater) — not in our stack (we use Flask, not Langflow). Flag to any partner orgs running Langflow; if they have been internet-exposed since January 23, treat as compromised and rotate all workspace credentials."
  - alert: "requirements.txt hash pinning gap remains open — Mini Shai-Hulud (TanStack/Mistral/UiPath supply chain) set the precedent for poisoned PyPI packages. Adding hash pinning (pip install --require-hashes or pip-tools with hashes) closes the biggest single gap in our supply-chain posture."

landscape_summary: "CVE-2026-41091 (Defender LPE, CISA June 3) and CVE-2026-42897 (Exchange OWA XSS, CISA May 29 — T-6 days) are the highest-urgency Windows-ecosystem items this week; three CVSS 10.0 UniFi OS vulnerabilities (CVE-2026-34908/09/10, ~100K internet-exposed, unauthenticated RCE) patched May 22 demand immediate firmware updates across network infrastructure before exploitation begins. MuddyWater (Iranian state actor) has been actively exploiting Langflow CVE-2025-34291 (CVSS 9.4) since January 2026 for enterprise initial access — CISA KEV June 4 — while CVE-2026-34926 in Trend Micro Apex One has been weaponized to turn endpoint security platforms into malware delivery channels, a pattern that demands treating any unpatched security tool as a potential delivery mechanism rather than a control. For our stack: flask==3.1.3 is confirmed safe from CVE-2026-27205 (affects <= 3.1.2 only); nginx CVE-2026-42945 (Day 11) remains the most urgent infrastructure item; Exchange May 29 deadline and requirements.txt hash pinning are the two highest-leverage unresolved posture items."
