stack_cves:
  - id: "CVE-2026-45321"
    package: "npm/PyPI ecosystem — Mini Shai-Hulud self-replicating supply chain worm (CI/CD pipeline threat)"
    severity: "critical"
    in_requirements: false
    action: "Day 6 PM. Campaign sustained at 1,055 compromised versions across 502 packages (npm: 1,048, PyPI: 6, Composer: 1). 25,000+ GitHub repos credential-leaked; 2,500+ malicious repos created using exfiltrated tokens. Full toolkit 16 days public (GitHub May 12, BreachForums repost May 24 with $1,000 copycat competition now Day 5). SLSA BYPASS CONFIRMED: Mini Shai-Hulud produces malicious npm packages with valid SLSA Build Level 3 provenance attestations by using stolen OIDC tokens with the legitimate Sigstore stack — the first documented supply chain worm to bypass SLSA integrity verification. SLSA provenance confirms which pipeline produced the artifact, not whether the pipeline behaved legitimately; this invalidates SLSA Build Level 3 as a standalone trust signal for packages installed since May 12. NEW PM: GitHub confirmed 3,800 internal repositories exfiltrated via poisoned Nx Console VS Code extension (v18.95.0, live 11-18 minutes); GitHub has shipped mandatory npm staged publishing 2FA gate (May 22, now GA for all packages) — this control blocks the stolen CI token publish vector. GLASSWORM TAKEDOWN PROVIDES NO COVERAGE. ALSO NOTE: TrapDoor is a THIRD INDEPENDENT supply chain campaign. None of our direct requirements.txt packages on the confirmed 502-package poisoned list as of May 28 PM. POSTURE ACTIONS: (1) pip install --require-hashes via pip-tools — highest-leverage PyPI defense; (2) Do not rely on SLSA Build Level 3 attestations alone for npm packages since May 12; (3) Enable npm staged publishing 2FA gate for any package we publish; (4) Audit Railway/GitHub Actions workflows for unexpected package-publish permissions; (5) Rotate all GitHub OIDC tokens."

  - id: "TrapDoor-2026"
    package: "npm/PyPI/Crates.io ecosystem — TrapDoor cross-ecosystem supply chain + AI coding assistant poisoning campaign (no CVE assigned)"
    severity: "critical"
    in_requirements: false
    action: "Active since May 19, first detected May 22 by Socket.dev. 34 malicious packages, 384+ versions across npm, PyPI, AND Crates.io. Socket detection median 5min 27sec. PRIMARY THREAT VECTOR FOR OUR STACK: TrapDoor plants malicious .cursorrules and CLAUDE.md files using zero-width Unicode characters (U+200B, U+200C, U+200D) to hide malicious instructions that trick AI coding assistants (Claude Code, Cursor, Copilot) into running a fake 'security scan' that silently exfiltrates developer credentials. Confirmed link to prior CWE-78 command injection vulnerabilities in Claude Code CLI (Phoenix Security, April 2026) — TrapDoor now delivers the same class of attack via supply chain rather than direct repo access. Attacker submitted poisoned PRs to browser-use, langchain-ai/langchain, langflow-ai/langflow. Persistence mechanisms: Git hooks, shell hooks, systemd, cron, SSH key injection via trap-core.js shared payload. Stolen credentials validated via AWS and GitHub API calls to filter high-value secrets. None of our requirements.txt packages confirmed on TrapDoor list. IMMEDIATE ACTIONS: (1) grep -rP '[\x{200B}\x{200C}\x{200D}\x{FEFF}]' . on all CLAUDE.md and .cursorrules files — any hit is a TrapDoor IOC; (2) Review all PRs opened since May 22; (3) Inspect .git/hooks/; (4) Rotate AWS IAM keys, GitHub PATs, npm/PyPI publish tokens on any environment that ran unverified packages since May 22."

  - id: "CVE-2026-48710"
    package: "starlette (Python ASGI framework — NOT in requirements.txt, but affects FastAPI/vLLM/LiteLLM/MCP servers)"
    severity: "high"
    in_requirements: false
    action: "BadHost — host-header authentication bypass in Starlette < 1.0.1. Disclosed May 22 by X41 D-Sec via OSTIF audit. Starlette rebuilds URLs from the HTTP Host header without validating it; attackers inject unauthenticated paths into the Host header to bypass path-based authentication middleware with a single malformed request. MCP servers are especially exposed: they expose unauthenticated OAuth discovery endpoints by design, providing a predictable, reliable entry point. 325M weekly Starlette downloads. Patch to Starlette >= 1.0.1. Free scanner at badhost.org; Semgrep/CodeQL rules from X41 repository. Starlette is NOT in our requirements.txt — no action required on the Threat-Feed Flask app. However, audit any MCP servers, FastAPI sidecars, or AI inference endpoints in the developer or CI/CD environment. This is directly relevant if Aegis or any operator uses Claude Code with MCP servers — the MCP gateway may be vulnerable."

