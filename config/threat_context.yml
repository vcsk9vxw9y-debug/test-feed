landscape_summary: "May 28 AM — Three simultaneous developer-targeting supply chain campaigns active: (1) Mini Shai-Hulud (TeamPCP, Day 6, 502 packages/1,055 versions) has escalated to produce malicious npm packages with valid SLSA Build Level 3 provenance attestations by exploiting stolen OIDC/Sigstore tokens, invalidating SLSA as a standalone trust signal for packages since May 12; (2) Glassworm (Russia-likely, C2 severed May 26) left infected developer machines across the industry — persistence artifacts (os.node, darwin.node, Windows Run keys, macOS com.user.nodestart LaunchAgents) require manual remediation even without active C2; (3) TrapDoor (unknown actor, NEW THIS RUN, first detected May 22) introduces an unprecedented AI coding assistant poisoning technique — malicious CLAUDE.md and .cursorrules files with zero-width Unicode hidden instructions hijack Claude Code, Cursor, and Copilot into exfiltrating developer credentials under the guise of a security scan, with PRs submitted to LangChain, MetaGPT, and OpenHands — our CLAUDE.md file is a direct attack surface requiring immediate audit. Also critical today: PAN-OS CVE-2026-0300 Phase 2 patches released (all 10.2/11.1/11.2/12.1 trains now patched, Day 49 of CL-STA-1132 China-nexus exploitation — unpatched instances since April 9 must run IR simultaneously with patching); Exchange CVE-2026-42897 CISA KEV deadline expires TOMORROW (May 29) with no permanent patch and confirmed EEMS/EOMT mitigation gaps — OWA restriction to VPN/zero-trust is the only reliable current defense. For our Python/Flask stack on Railway: pip install --require-hashes via pip-tools and immediate CLAUDE.md zero-width Unicode audit are the two highest-leverage unresolved defensive actions."
