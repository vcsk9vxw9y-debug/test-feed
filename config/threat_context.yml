landscape_summary: "May 28 late PM — Two new threat developments since the 18:00 UTC run: Silent Ransom Group (FBI Flash May 26) has physically escalated from remote phishing to sending operatives into law firm offices with USB data-exfiltration devices — no malware, no encryption, no alerts; 38+ firms leaked on SRG public site with 100+ total victims and Q1 2026 surging sharply; and Gitea CVE-2026-27771 (CVSS 8.2, May 27) exposed private container images without authentication across 30,000 deployments for approximately four years, discovered by an autonomous AI pentesting agent. Time-critical: Exchange CVE-2026-42897 CISA KEV deadline is TOMORROW May 29 EOD with no permanent patch and confirmed EEMS/EOMT gaps — OWA restriction to VPN/zero-trust is the only reliable defense; PAN-OS CVE-2026-0300 Phase 2 patches (all trains) released today (May 28, Day 49 of CL-STA-1132 China-nexus exploitation) — unpatched instances since April 9 require parallel incident response alongside patching. For our Python/Flask stack: pip install --require-hashes remains the single highest-leverage unresolved defensive action; TrapDoor zero-width Unicode CLAUDE.md audit is still pending; Gitea CVE-2026-27771 adds private container image rotation to the action list for any operator running Gitea-hosted images in developer or CI/CD workflow."
