landscape_summary: "NGINX Rift (CVE-2026-42945) enters Day 6 with Censys quantifying ~5.7M exposed vulnerable servers and tier-1 weekend reporting (The Register, Help Net Security, SecurityWeek) confirming attack volume continuing to climb after VulnCheck flagged exploitation on May 16. Mini Shai-Hulud (May 12) has now poisoned 373 versions across 169 npm + 2 PyPI package names by chaining GitHub Actions cache poisoning with OIDC-token theft — a credential-rotation-immune supply-chain primitive. Ivanti EPMM CVE-2026-6973 shows the credential-chain pattern: January-harvested admin creds reused to land May's authenticated RCE. Cisco SD-WAN CVE-2026-20182 federal deadline lapsed yesterday; Exchange CVE-2026-42897 KEV deadline lands May 29. For our stack: nginx patching and rewrite-config audit remain the most urgent items; close the requirements.txt hash-pinning gap before the next supply-chain wave; verify Railway kernel patching for Copy Fail and Dirty Frag mitigations."
