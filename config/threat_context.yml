stack_intersection:
  - alert: "CVE-2026-39987 Marimo + LLM Agent Attack (T1059.006) — NEW AI ATTACK CLASS ALERT. Sysdig confirmed the first real-world LLM-agent-driven post-exploitation chain (May 29). While Marimo is not in requirements.txt, the attack technique directly threatens our cloud credential surface: any AWS IAM keys, GitHub PATs, or Railway tokens accessible from a dev or CI host can be extracted and autonomously pivoted by an AI agent into internal systems in under 1 hour. ACTIONS: (1) Audit AWS Secrets Manager for anomalous GetSecretValue calls from unexpected IPs/principals; (2) Apply least-privilege IAM — env-var credentials on CI hosts must not have Secrets Manager or other lateral pivot permissions; (3) Enable CloudTrail alerting on GetSecretValue from unexpected sources."

  - alert: "SymJack (T1195.001) — DIRECT CLAUDE CODE THREAT. Adversa AI confirmed SymJack targets Claude Code specifically: malicious repo symlinks silently insert attacker-controlled MCP servers into Claude Code config during approved file ops. IMMEDIATE ACTIONS: (1) Update Claude Code to latest hardened build — resolves symlinks before approval prompt and shows real destination paths; (2) Audit ~/.claude/mcp_servers and all .mcp.json files for unexpected entries added after cloning any external repo; (3) Rotate all credentials from any session where an unexpected MCP server was discovered. INDEPENDENT OF TRAPDOOR."

  - alert: "TrapDoor (T1195.001 + T1204.002) — CRITICAL STACK THREAT. Our CLAUDE.md is a direct attack surface for TrapDoor's AI assistant poisoning. Confirmed link to CWE-78 in Claude Code CLI (Phoenix Security April 2026). IMMEDIATE ACTIONS: (1) grep -rP '[​‌‍﻿]' CLAUDE.md — any hit is TrapDoor IOC; (2) Review all open PRs since May 19; (3) Inspect .git/hooks/; (4) Verify all pip installs since May 19 were hash-verified. INDEPENDENT of Glassworm, Mini Shai-Hulud, and SymJack remediations."

  - alert: "CVE-2026-0257 PAN-OS GlobalProtect (T1190) — PERIMETER INFRASTRUCTURE ALERT. CISA KEV deadline JUNE 1 (T-2 DAYS). If operator or partner infrastructure uses PAN-OS with GlobalProtect auth-override enabled and the auth-override certificate is shared with the HTTPS service, treat as actively targeted. Patch to 12.1.7/11.2.12/11.1.15/10.2.18-h6. Dedicate a separate certificate exclusively to auth-override. Hunt GlobalProtect access logs for DESKTOP-GP01 machine name and Dromatics Systems source IPs since May 17. SEPARATE from CL-STA-1132 CVE-2026-0300 campaign."

