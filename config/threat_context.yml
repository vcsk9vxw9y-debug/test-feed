landscape_summary: "The May 25 AM run opens Day 3 of the Mini Shai-Hulud multi-actor supply chain campaign (1,055 versions / 502 packages / 25,000+ GitHub repos credential-leaked) with no new wave confirmed but the full TeamPCP toolkit in public circulation for 13 days — for our Python/Flask stack, pip install --require-hashes via pip-tools remains the single highest-leverage unresolved defensive action and must be implemented before the next deployment cycle. Today's publication of the Verizon DBIR 2026 provides statistical context for the current threat environment: vulnerability exploitation has overtaken stolen credentials as the #1 breach entry point for the first time in 19 years (31% of breaches), supply chain breaches surged 60% and now appear in 48% of all corporate breaches, and only 26% of CISA KEV items were remediated in 2025 — the three active KEV deadlines expiring this week (Drupal CVE-2026-9082 May 27 T-2 days, PAN-OS CVE-2026-0300 May 28 T-3 days with CL-STA-1132 China-nexus state actor at Day 46 of active exploitation, Exchange CVE-2026-42897 May 29 T-4 days with no permanent patch and confirmed mitigation gaps) are all inside the 43-day median patch window where the DBIR says the average organization remains exposed. A new three-zero-day tranche from Nightmare Eclipse (YellowKey CVE-2026-45585 BitLocker bypass, GreenPlasma CTFMON LPE, MiniPlasma Cloud Filter SYSTEM LPE) carries no patches until June 10 Patch Tuesday — any Windows developer or CI/CD host is at risk from PoC code in public circulation since May 13."
