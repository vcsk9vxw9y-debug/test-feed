# Notable Actors — curated APT/nation-state actor list for the
# Nation State/APT spotlight roster.
#
# Schema:
#   name              : Canonical actor name ("UAT-8616", "APT29", etc.)
#   origin            : Display string for the origin pill
#                       ("CN · state-sponsored", "unattributed nexus")
#   status            : active | warm | dormant
#                       Drives the right-side status pill + tier grouping.
#                       - active : in-the-wild activity last 7 days
#                       - warm   : ongoing activity within 8-30 days
#                       - dormant: pre-positioned / quiet (>30d)
#   tracked_by        : Optional research org that publishes coverage
#   description       : One-sentence capability profile
#   activity          : One-sentence summary of current/recent activity
#   ttps              : List of {id, label} dicts — MITRE ATT&CK techniques
#   victim_count      : Display string for the victim chip ("15+", "9", "12")
#   victim_label      : Label under the count ("confirmed victims", "tracked sectors")
#   last_seen         : Humanized last-seen display ("today", "4d ago", "2026-04")
#   sectors           : 12-cell heat map. Each entry is one of:
#                         "active"  — coral pulse (current campaign)
#                         3         — heavy historic targeting
#                         2         — medium historic targeting
#                         1         — light historic targeting
#                         0         — no observed targeting
#                       Fixed 12-key order rendered in the strip:
#                         government, defense, telecom, energy, finance,
#                         healthcare, education, critical_infra,
#                         manufacturing, retail, media, nonprofit
#   tags              : Optional small chips (e.g. "CISA ED 26-03")
#   aliases           : List of substrings for article matching
#   appears_on        : ["nation-state-apt"]

